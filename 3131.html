<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 1주차 3차시 - 조건문과 흐름 제어 (실습형)</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1, h2 { margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.1rem; font-size: 1.15rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.2rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 0.95rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 0.8rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .code-breakdown { background: #252525; padding: 1.2rem; border-left: 5px solid #61dafb; margin: 1.1rem 0; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
  
  /* 정답 박스 및 버튼 스타일 수정 */
  .practice-box { 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px dashed #444; 
    padding: 1.2rem; 
    border-radius: 12px; 
    margin-top: 1rem; 
    text-align: center;
  }
  .check-answer-btn {
    background: #facc15;
    color: #000;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .check-answer-btn:hover { background: #eab308; transform: scale(1.05); }
  .answer-content { 
    display: none; 
    margin-top: 1rem; 
    color: #f87171; 
    font-weight: bold; 
    font-size: 1.15rem; 
    text-align: left;
  }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  // --- 인트로 ---
  { 
    type: "title", 
    title: "JavaScript 입문: 1주차 3차시", 
    subtitle: "<span class='highlight' style='font-size:2rem;'>조건문과 흐름 제어</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 프로그램의 선택 (if, else 기초 및 유효성 검사)<br>2교시: 복잡한 판단 (else if, 중첩 조건문 및 실무 로직)</span>" 
  },
  {
    type: "content",
    title: "🎯 오늘의 학습 목표",
    items: [
      "프로그램이 스스로 판단하는 <span class='highlight'>분기 처리</span>의 원리를 이해합니다.",
      "기본적인 <span class='highlight'>if, else</span> 문법으로 참/거짓 반응을 구현합니다.",
      "실무의 핵심인 <span class='highlight'>데이터 유효성 검증(Validation)</span>을 실습합니다.",
      "여러 갈래 길을 만드는 <span class='highlight'>else if</span>와 복잡한 <span class='highlight'>중첩 조건문</span>을 정복합니다."
    ]
  },

  // --- 1교시: if, else 기초 ---
  { 
    type: "content", 
    title: "1교시. 프로그램의 갈림길: if 문", 
    items: [
      "모든 지능형 시스템의 시작은 '조건문'입니다.",
      "소괄호 <code>( )</code> 안에는 지난 시간에 배운 <b>비교/논리 연산자</b>가 들어갑니다.",
      "결과가 <span class='accent'>true</span>일 때만 <code>{ }</code> 안의 코드가 실행됩니다.",
      "<div class='code-breakdown'><b>if (age >= 20) { console.log('성인입니다'); }</b></div>"
    ]
  },
  { 
    type: "content", 
    title: "🛤️ 반대의 경우: else 문", 
    items: [
      "조건이 <span class='warn'>false</span>일 때 실행할 '나머지 상황'을 정의합니다.",
      "<code>if</code> 조건 외의 모든 케이스를 한 번에 처리합니다.",
      "예: '20세 이상인가?' -> 아니면(else) -> '미성년자입니다'."
    ]
  },
  { 
    type: "code", 
    title: "[실습 1] 합격/불합격 판독기", 
    desc: "점수가 60점 이상이면 합격, 미만이면 불합격을 콘솔에 찍어보세요.", 
    code: `let score = 75;

if (score [    ] 60) {
    console.log("PASS");
} [       ] {
    console.log("FAIL");
}`, 
    answer: "정답: >= / else" 
  },
  { 
    type: "code", 
    title: "[실습 2] 홀수/짝수 구분 시스템", 
    desc: "지난 시간 배운 나머지 연산자(%)를 if문과 결합해봅시다.", 
    code: `let num = 13;

if (num % 2 === [    ]) {
    console.log("짝수입니다.");
} else {
    console.log("홀수입니다.");
}`, 
    answer: "정답: 0 (설명: 2로 나눈 나머지가 0이면 짝수입니다.)" 
  },
  { 
    type: "content", 
    title: "🛡️ 실무 핵심: 데이터 유효성 검증", 
    items: [
      "사용자는 언제나 우리가 원하는 대로 데이터를 넣지 않습니다.",
      "아이디를 빈칸으로 두거나, 비밀번호를 너무 짧게 입력하는 경우를 막아야 합니다.",
      "이런 방어 코드를 <span class='highlight'>Validation(검증)</span>이라고 부릅니다."
    ]
  },
  { 
    type: "code", 
    title: "[실습 3] 로그인 입력 검증", 
    desc: "아이디가 입력되지 않았을 때 경고를 띄우는 로직을 완성하세요.", 
    code: `let userId = ""; // 비어있는 상태

if (userId === [    ]) {
    console.log("아이디를 반드시 입력해야 합니다!");
} else {
    console.log("로그인 시도 중...");
}`, 
    answer: '정답: "" (빈 문자열 체크)' 
  },
  { 
    type: "code", 
    title: "[실습 4] 숫자 부호 판별기", 
    desc: "어떤 숫자가 양수인지 음수인지 기초적인 판단을 내려봅시다.", 
    code: `let n = -5;

if (n > 0) {
    console.log("양수입니다.");
} else {
    console.log("음수 또는 0입니다.");
}`, 
    answer: "실행 결과: 음수 또는 0입니다." 
  },
  { 
    type: "content", 
    title: "☕ 쉬는 시간 (10분)", 
    items: [
      "기본적인 2분기(A 아니면 B) 구조를 익혔습니다.",
      "다음 시간에는 '0'까지 완벽히 구분하는 3분기 이상의 구조를 배웁니다."
    ]
  },

  // --- 2교시: else if & 다중 조건 ---
  { 
    type: "content", 
    title: "2교시. 여러 갈래 길: else if", 
    items: [
      "세상에는 예/아니오 외에도 수많은 중간 선택지가 존재합니다.",
      "<code>else if</code>를 통해 조건의 사슬을 만들 수 있습니다.",
      "위에서부터 순서대로 검사하며, <b>가장 먼저 참이 된 블록 하나</b>만 실행됩니다."
    ]
  },
  { 
    type: "code", 
    title: "[실습 5] 양수, 음수, 그리고 제로", 
    desc: "단순히 두 갈래가 아닌 세 갈래로 숫자를 판별해봅시다.", 
    code: `let n = 0;

if (n > 0) {
    console.log("양수");
} [       ] (n < 0) {
    console.log("음수");
} [       ] {
    console.log("제로(0)");
}`, 
    answer: "정답: else if / else" 
  },
  { 
    type: "code", 
    title: "[실습 6] 학점 세분화 시스템", 
    desc: "A, B, C, F 등급을 나누는 전형적인 else if 실습입니다.", 
    code: `let score = 82;

if (score >= 90) {
    console.log("A");
} else if (score >= 80) {
    console.log("B");
} else if (score >= 70) {
    console.log("C");
} else {
    console.log("F");
}`, 
    answer: "실행 결과: B (80점 이상 조건에 걸림)" 
  },
  { 
    type: "content", 
    title: "🔍 중첩 조건문 (Nested If)", 
    items: [
      "조건문 안에 또 다른 조건문을 넣을 수 있습니다.",
      "먼저 큰 분류를 하고, 그 안에서 세부 분류를 할 때 사용합니다.",
      "예: (로그인 했는가?) -> 참 -> (관리자인가?) -> 관리자 전용 메뉴 출력"
    ]
  },
  { 
    type: "code", 
    title: "[실습 7] 중첩 로그인 로직", 
    desc: "로그인 여부와 관리자 권한을 동시에 체크하는 중첩 구조를 완성하세요.", 
    code: `let isLogin = true;
let isAdmin = false;

if (isLogin) {
    console.log("로그인 상태입니다.");
    if (isAdmin) {
        console.log("관리자 모드를 시작합니다.");
    } [       ] {
        console.log("일반 사용자 화면입니다.");
    }
} else {
    console.log("로그인이 필요합니다.");
}`, 
    answer: "정답: else (설명: 로그인 된 상태 안에서 관리자가 아닌 경우입니다.)" 
  },
  { 
    type: "content", 
    title: "⚠️ 흔히 하는 실수: = vs ===", 
    items: [
      "<code>if (score = 100)</code> 라고 쓰면 어떻게 될까요?",
      "비교가 아니라 <b>재할당</b>이 일어나면서 조건문이 항상 참이 되어버립니다!",
      "<div class='warn'>반드시 <b>===</b> 세 개를 써서 비교하는 습관을 가져야 합니다.</div>"
    ]
  },
  { 
    type: "code", 
    title: "[실습 8] 에러 찾기 미션", 
    desc: "아래 코드에서 버그를 찾아 수정해보세요.", 
    code: `let memberLevel = "Silver";

// "Silver" 등급인 사람에게만 쿠폰을 주고 싶습니다.
if (memberLevel = "Silver") { 
    console.log("쿠폰 발송!");
}
// 실제 결과: memberLevel이 "Bronze"여도 쿠폰이 나갑니다!`, 
    answer: '수정: memberLevel === "Silver" (비교 연산자 사용)' 
  },
  { 
    type: "content", 
    title: "🖥️ 실무 응용: 상황별 응답 로직", 
    items: [
      "<b>에러 메시지 처리:</b> 서버 응답 코드(200, 404, 500)에 따른 메시지 분기",
      "<b>게임 캐릭터 상태:</b> HP가 0이면 '게임오버', 30 이하면 '경고음', 그 외 '정상'",
      "<b>할인율 적용:</b> 나이, 구매금액, 멤버십 등급을 조합한 복합 계산"
    ]
  },
  { 
    type: "code", 
    title: "[실습 9] 복합 조건 판별 (AND/OR)", 
    desc: "놀이공원 야간 개장 입장 조건 (나이가 20세 이상 '이거나' VIP 티켓 소지)", 
    code: `let age = 15;
let hasVipTicket = true;

if (age >= 20 [    ] hasVipTicket === true) {
    console.log("야간 개장 입장 가능!");
} else {
    console.log("입장이 제한됩니다.");
}`, 
    answer: "정답: || (OR 연산자)" 
  },
  { 
    type: "code", 
    title: "[실습 10] 챗봇 명령어 설계 맛보기", 
    desc: "메시지에 따라 다른 대답을 하는 로직입니다.", 
    code: `let message = "도움말";

if (message === "안녕") {
    console.log("안녕하세요! 저는 JS봇입니다.");
} else if (message === "도움말") {
    console.log("명령어 안내: 안녕, 날씨, 도움말");
} else {
    console.log("정의되지 않은 명령어입니다.");
}`, 
    answer: "명령어를 하나씩 바꿔가며 실행해보세요." 
  },
  { 
    type: "code", 
    title: "[최종 미션] ATM 인출 로직", 
    desc: "통장 잔액과 인출 요청액을 비교하여 결과를 출력하는 로직을 완성하세요.", 
    code: `let balance = 50000; // 잔액
let requestAmount = 60000; // 인출 요청액

if (requestAmount [    ] balance) {
    console.log("잔액이 부족합니다.");
} else if (requestAmount === 0) {
    console.log("금액을 입력해주세요.");
} else {
    balance -= requestAmount; // 잔액 차감
    console.log("인출 성공! 남은 잔액: " + balance);
}`, 
    answer: "정답: > (인출액이 잔액보다 크면 인출 불가!)" 
  },
  { 
    type: "content", 
    title: "📝 오늘의 요약", 
    items: [
      "<b>if-else:</b> 가장 단순한 참/거짓 분기 시스템",
      "<b>else if:</b> 다중 선택지를 만드는 효율적인 사슬",
      "<b>중첩(Nest):</b> 조건 안의 조건으로 더 세밀한 판단 가능",
      "<b>Validation:</b> 잘못된 데이터를 걸러내는 방어벽"
    ]
  },
  { 
    type: "title", 
    title: "1주차 기초 과정 마스터! 🎉", 
    subtitle: "<span class='highlight'>변수, 연산자, 조건문</span>이 자바스크립트의 모든 것입니다.<br><br><span style='color:#777;'>2주차 예고: 이제 노가다는 끝! '반복문(Loop)'으로 가봅시다.</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem; margin-bottom:1.5rem; color:#61dafb; line-height:1.2;">${data.title}</h1>
        <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.6rem; line-height:1.6; color:#ccc; margin-top:2rem;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2rem; margin-top:0;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  } else if (data.type === 'code') {
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.1rem; color:#facc15; border-bottom:1px solid #333; padding-bottom:1rem; margin-bottom:1rem; margin-top:0;">${data.title}</h2>
        <p style="font-size:1.15rem; margin-bottom:1rem; color:#aaa;">${data.desc}</p>
        <div style="position:relative;">
          <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        </div>
        <div class="practice-box">
          <button class="check-answer-btn" onclick="showAnswer(this)">정답 확인</button>
          <div class="answer-content">
            💡 ${data.answer}
          </div>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function showAnswer(btn) {
  const answerDiv = btn.nextElementSibling;
  answerDiv.style.display = 'block';
  btn.style.display = 'none';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide();
  } else if (e.key === 'ArrowLeft') {
    prevSlide();
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
