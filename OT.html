<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why JavaScript? - Interactive Slides</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1, h2 { margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2.5rem; margin-bottom: 1.5rem; font-size: 1.4rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '🚀'; position: absolute; left: 0; }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 60px;
    height: 60px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #f7df1e; color: #000; border-color: #f7df1e; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; }
  .highlight { color: #f7df1e; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .instruction-tip {
    position: absolute;
    bottom: 2.5rem;
    left: 4rem;
    font-size: 0.9rem;
    color: #444;
  }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app">
  </div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<div class="instruction-tip">키보드 방향키(←, →)나 스페이스바를 사용해보세요!</div>

<script>
const slideData = [
  { 
    type: "title", 
    title: "왜 자바스크립트인가?", 
    subtitle: "<span class='highlight' style='font-size:2.2rem;'>Why JavaScript?</span><br><br><span style='color:#888; font-size:1.2rem;'>세상을 움직이는 가장 강력한 언어의 가치</span>" 
  },
  {
    type: "content",
    title: "01. 웹의 유일한 주인공 (Frontend)",
    items: [
      "모든 웹 브라우저가 기본적으로 탑재한 <span class='highlight'>유일한 프로그래밍 언어</span>입니다.",
      "HTML이 뼈대, CSS가 디자인이라면 JS는 웹에 <span class='accent'>동작</span>을 부여합니다.",
      "인스타그램, 유튜브 등 우리가 쓰는 모든 웹 서비스의 핵심입니다."
    ]
  },
  {
    type: "content",
    title: "02. 한계를 넘은 확장성 (Full-Stack)",
    items: [
      "<span class='highlight'>Node.js</span>의 탄생으로 이제 서버 개발까지 가능해졌습니다.",
      "언어 하나로 <span class='accent'>프론트엔드와 백엔드</span>를 모두 개발할 수 있는 효율성을 제공합니다.",
      "가장 적은 노력으로 전체 서비스를 구축할 수 있는 지름길입니다."
    ]
  },
  {
    type: "content",
    title: "03. 거대한 생태계와 정보량",
    items: [
      "전 세계에서 가장 많은 개발자가 사용하는 언어 1위를 다툽니다.",
      "수백만 개의 오픈소스 라이브러리(<span class='highlight'>NPM</span>)를 즉시 가져다 쓸 수 있습니다.",
      "막히는 부분은 구글과 AI에게 물어보면 1초 만에 정답이 나옵니다."
    ]
  },
  {
    type: "content",
    title: "04. 무엇이든 만드는 만능 도구",
    items: [
      "<b>React Native:</b> 하나의 코드로 iOS와 안드로이드 앱을 동시에 만듭니다.",
      "<b>Electron:</b> 슬랙(Slack), 디스코드 같은 설치형 프로그램도 JS로 만듭니다.",
      "<b>Three.js:</b> 브라우저에서 돌아가는 화려한 3D 그래픽을 구현합니다."
    ]
  },
  {
    type: "content",
    title: "05. 압도적인 채용 수요",
    items: [
      "스타트업부터 네카라쿠배까지, <span class='highlight'>JS 숙련자</span>를 찾지 않는 곳이 없습니다.",
      "러닝 커브가 낮아 입문하기 좋고, 숙련되었을 때의 몸값은 매우 높습니다.",
      "가장 취업 시장에서 활발하게 거래되는 기술 스택입니다."
    ]
  },
  {
    type: "title", 
    title: "아이디어를 현실로 만드는 자유", 
    subtitle: "<span class='accent'>상상하는 모든 것을 구현할 수 있는 도구,</span><br><br><span class='highlight' style='font-size:2.5rem;'>JavaScript의 세계에 오신 것을 환영합니다!</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:4rem; margin-bottom:1.5rem; color:#f7df1e;">${data.title}</h1>
        <div style="width:120px; height:5px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.8rem; color:#ccc;">${data.subtitle}</p>
      </div>`;
  } else {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.8rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2.5rem;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  // 버튼 가시성 제어
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

// --- 키보드 입력 제어 기능 ---
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide(); // 오른쪽 방향키 또는 스페이스바: 다음 슬라이드
  } else if (e.key === 'ArrowLeft') {
    prevSlide(); // 왼쪽 방향키: 이전 슬라이드
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
