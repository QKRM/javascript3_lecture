<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Scope Riddle Quiz</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #0f172a; color: #f8fafc; font-family: 'Fira Code', 'Pretendard', monospace; }
  .slide-container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; position: relative; }
  .slide-content { max-width: 1000px; width: 100%; background: #1e293b; padding: 3rem; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; min-height: 650px; display: flex; flex-direction: column; }
  h2 { color: #38bdf8; font-size: 2rem; margin-top: 0; border-bottom: 2px solid #334155; padding-bottom: 1rem; }
  pre { background: #020617; padding: 1.5rem; border-radius: 12px; color: #f1f5f9; font-size: 1.2rem; line-height: 1.5; border: 1px solid #1e293b; margin: 1.5rem 0; position: relative; }
  .answer-box { background: #064e3b; border: 2px solid #10b981; padding: 1.2rem; border-radius: 12px; margin-top: auto; display: none; }
  .answer-box.show { display: block; animation: fadeIn 0.3s; }
  .btn-answer { background: #38bdf8; color: #0f172a; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; align-self: flex-start; margin-top: 1rem; }
  .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white; width: 50px; height: 50px; cursor: pointer; border-radius: 50%; transition: 0.3s; }
  .nav-btn:hover { background: #38bdf8; color: #000; }
  #prevBtn { left: 2rem; } #nextBtn { right: 2rem; }
  .page-num { position: absolute; bottom: 2rem; right: 3rem; color: #64748b; }
  .highlight { color: #fbbf24; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const quizData = [
  {
    title: "Level 1: 울타리 안과 밖",
    code: `let box = "사과";
{
    let box = "포도";
    console.log("A:", box);
}
console.log("B:", box);`,
    question: "A와 B에 출력될 값은 각각 무엇일까요?",
    answer: "A: 포도, B: 사과",
    desc: "중괄호 { } 블록 내부에서 선언된 변수는 외부의 변수와 이름이 같더라도 별개의 존재입니다. 이를 '변수 가려짐(Shadowing)'이라고 부릅니다."
  },
  {
    title: "Level 2: 중첩된 울타리",
    code: `const gold = "100개";
{
    {
        console.log("결과:", gold);
    }
}`,
    question: "이 코드는 에러가 날까요, 아니면 값이 출력될까요?",
    answer: "결과: 100개",
    desc: "안쪽 블록에서는 바깥쪽(전역 포함)에서 선언된 변수를 자유롭게 참조할 수 있습니다. 밖에서 안으로는 못 보지만, 안에서 밖으로는 보입니다!"
  },
  {
    title: "Level 3: 재할당의 함정",
    code: `let score = 10;
{
    score = 20; 
    let bonus = 5;
}
console.log(score);
console.log(bonus);`,
    question: "최종적으로 출력되는 두 값은 무엇일까요?",
    answer: "20, 그리고 에러(ReferenceError) 발생",
    desc: "score는 밖에서 선언되었으므로 안에서 수정(재할당)이 가능합니다. 하지만 bonus는 블록 안에서 선언되었으므로 밖으로 나오는 순간 소멸합니다."
  },
  {
    title: "Level 4: 상수(const)의 스코프",
    code: `const target = "A";
{
    const target = "B";
    {
        const target = "C";
        console.log(target);
    }
    console.log(target);
}
console.log(target);`,
    question: "위에서부터 순서대로 출력될 3개의 알파벳은?",
    answer: "C -> B -> A",
    desc: "자바스크립트는 현재 위치에서 가장 가까운 울타리(스코프)부터 변수를 찾습니다. 가장 안쪽은 C, 중간은 B, 전역은 A를 가지고 있습니다."
  }
];

let currentIndex = 0;
let showAnswer = false;

function render() {
  const data = quizData[currentIndex];
  const app = document.getElementById('app');
  
  app.innerHTML = `
    <div class="slide-content">
      <h2>${data.title}</h2>
      <p style="color:#94a3b8;">${data.question}</p>
      <pre><code>${data.code}</code></pre>
      <button class="btn-answer" onclick="toggleAnswer()">정답 확인하기</button>
      <div class="answer-box ${showAnswer ? 'show' : ''}">
        <strong style="color:#10b981;">정답: ${data.answer}</strong>
        <p style="margin-top:0.5rem; font-size:0.95rem; line-height:1.6;">💡 ${data.desc}</p>
      </div>
    </div>
    <div class="page-num">${currentIndex + 1} / ${quizData.length}</div>
  `;
  document.getElementById('prevBtn').style.visibility = currentIndex === 0 ? 'hidden' : 'visible';
}

function toggleAnswer() {
  showAnswer = !showAnswer;
  render();
}

function nextSlide() {
  if (currentIndex < quizData.length - 1) {
    currentIndex++;
    showAnswer = false;
    render();
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    showAnswer = false;
    render();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
  else if (e.key === 'ArrowLeft') prevSlide();
  else if (e.key === 'Enter') toggleAnswer();
});

render();
</script>
</body>
</html>
