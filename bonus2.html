<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 1주차 2.5차시 - 연산자 심화 응용 (퀴즈 모드)</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1, h2 { margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.2rem; font-size: 1.2rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.5rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 1.1rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 1rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .practice-box { background: rgba(250, 204, 21, 0.05); border: 1px solid #facc15; padding: 1.2rem; border-radius: 12px; margin-top: 1rem; }
  .answer-box { background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; padding: 1.2rem; border-radius: 12px; margin-top: 1rem; }
  
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .quiz-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
  .tag-problem { background: #facc15; color: #000; }
  .tag-answer { background: #4ade80; color: #000; }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  { 
    type: "title", 
    title: "JavaScript 입문: 1주차 2.5차시", 
    subtitle: "<span class='highlight' style='font-size:2rem;'>연산자 심화 응용</span><br><br><span style='color:#888; font-size:1.1rem;'>단순 계산을 넘어 논리를 설계하는 법<br>실습 문제 & 해설 모드</span>" 
  },
  {
    type: "content",
    title: "🎯 심화 학습 목표",
    items: [
      "나머지 연산자(%)를 활용한 <span class='highlight'>데이터 순환(Cycle)</span> 로직 구현",
      "논리 연산자의 <span class='highlight'>단축 평가(Short-circuit)</span>를 이용한 효율적 코드 작성",
      "복합적인 조건을 한 줄의 논리로 정리하는 <span class='highlight'>우선순위 설계</span>",
      "실제 프론트엔드 UI 상태 제어에 연산자 적용하기"
    ]
  },

  // --- 실습 1 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[심화 실습 1] 무한 반복 슬라이더", 
    desc: "슬라이드 번호가 0, 1, 2를 무한히 반복하도록 빈칸을 채우세요.", 
    code: `let currentIndex = 2; // 현재 마지막 슬라이드 (3번째)
const totalSlides = 3;

// '다음' 버튼을 클릭했을 때 인덱스 계산
currentIndex = (currentIndex + 1) [     ] totalSlides;

console.log("다음 슬라이드 번호:", currentIndex); // 결과는 0이 나와야 함`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 1] 무한 반복 슬라이더", 
    desc: "나머지 연산자를 이용하면 숫자의 범위를 고정할 수 있습니다.", 
    code: `let currentIndex = 2;
const totalSlides = 3;

currentIndex = (currentIndex + 1) % totalSlides; // 3 % 3 = 0

console.log("다음 슬라이드 번호:", currentIndex);`, 
    answer: "정답: % (설명: 나머지가 0이 됨으로써 다시 처음으로 돌아가는 '순환' 구조가 완성됩니다.)" 
  },

  // --- 실습 2 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[심화 실습 2] 사용자 기본값 설정", 
    desc: "닉네임이 있으면 닉네임을, 없으면 '익명'을 출력하는 단축 평가 논리를 완성하세요.", 
    code: `let inputNickname = ""; // 사용자가 입력을 안 한 상태

// nickname이 빈 문자열(false)이면 "익명"이 저장되도록 하세요.
let displayName = inputNickname [    ] "익명";

console.log("환영합니다, ", displayName, "님!");`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 2] 사용자 기본값 설정", 
    desc: "OR(||) 연산자는 왼쪽이 거짓일 때 오른쪽 값을 선택합니다.", 
    code: `let inputNickname = ""; 

let displayName = inputNickname || "익명";

console.log("환영합니다, ", displayName, "님!");`, 
    answer: "정답: || (OR 연산자. 앞의 값이 빈 문자열 즉, false일 때만 뒤의 값을 선택합니다.)" 
  },

  // --- 실습 3 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[심화 실습 3] 프리미엄 콘텐츠 접근 권한", 
    desc: "로그인 상태이면서 (유료 회원 '또는' 관리자)인 경우만 true가 나오게 하세요.", 
    code: `let isLoggedIn = true;
let isPremium = false;
let isAdmin = true;

// 로그인 필수, 그리고 (프리미엄 혹은 관리자) 여야 함
let canAccess = isLoggedIn && ( [             ] );

console.log("콘텐츠 접근 가능:", canAccess);`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 3] 프리미엄 콘텐츠 접근 권한", 
    desc: "&&와 ||를 함께 쓸 때는 괄호로 묶어 우선순위를 정하는 것이 안전합니다.", 
    code: `let isLoggedIn = true;
let isPremium = false;
let isAdmin = true;

let canAccess = isLoggedIn && (isPremium || isAdmin);

console.log("콘텐츠 접근 가능:", canAccess);`, 
    answer: "정답: isPremium || isAdmin (설명: 괄호로 OR 조건을 먼저 묶어주는 것이 핵심입니다.)" 
  },

  // --- 실습 4 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[심화 실습 4] 이벤트 쿠폰 발급 논리", 
    desc: "신규 가입자이거나, 기존 회원이면서 미사용 쿠폰이 있는 경우를 판별하세요.", 
    code: `let isNewUser = false;
let isMember = true;
let hasCoupon = true;

// 논리: 신규회원이거나 (기존회원이면서 쿠폰보유)
let isEligible = isNewUser [    ] (isMember [    ] hasCoupon);

console.log("쿠폰 발급 대상자:", isEligible);`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 4] 이벤트 쿠폰 발급 논리", 
    desc: "비즈니스 로직을 인간의 언어에서 코드로 번역하는 연습이 필요합니다.", 
    code: `let isNewUser = false;
let isMember = true;
let hasCoupon = true;

let isEligible = isNewUser || (isMember && hasCoupon);

console.log("쿠폰 발급 대상자:", isEligible);`, 
    answer: "정답: || / && (OR와 AND의 적절한 조합)" 
  },

  { 
    type: "content", 
    title: "📝 심화 요약", 
    items: [
      "<b>나머지 연산자(%):</b> 범위를 제한하거나 순환하는 로직에 활용",
      "<b>단축 평가:</b> <code>||</code>를 이용한 기본값 설정, <code>&&</code>를 이용한 조건부 실행",
      "<b>복합 논리:</b> 괄호<code>()</code>를 적극 사용하여 연산 우선순위를 명확히 규정",
      "코드가 짧은 것보다 <b>'의도가 명확한'</b> 논리를 짜는 것이 실무에서 더 중요합니다."
    ]
  },
  { 
    type: "title", 
    title: "심화 과정 종료! 🏆", 
    subtitle: "축하합니다! 이제 연산자로 복잡한 논리를 설계할 수 있습니다.<br><br><span style='color:#777;'>다음 시간: 조건문(if)을 통해 이 논리들을 실제 프로그램 흐름으로 바꿉니다.</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem; margin-bottom:1.5rem; color:#61dafb; line-height:1.2;">${data.title}</h1>
        <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.6rem; line-height:1.6; color:#ccc; margin-top:2rem;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2.5rem; margin-top:0;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  } else if (data.type === 'code') {
    const tagClass = data.isQuiz ? 'tag-problem' : 'tag-answer';
    const tagText = data.isQuiz ? 'QUIZ : 문제' : 'SOLUTION : 해설';
    const boxClass = data.isQuiz ? 'practice-box' : 'answer-box';
    const accentColor = data.isQuiz ? '#facc15' : '#4ade80';

    contentHtml = `
      <div class="fade-in">
        <div class="quiz-tag ${tagClass}">${tagText}</div>
        <h2 style="font-size:2.2rem; color:${accentColor}; border-bottom:1px solid #333; padding-bottom:1.2rem; margin-bottom:1.2rem; margin-top:0;">${data.title}</h2>
        <p style="font-size:1.2rem; margin-bottom:1rem; color:#aaa;">${data.desc}</p>
        <div style="position:relative;">
          <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        </div>
        <div class="${boxClass}">
          <p style="font-weight:bold; color:${data.isQuiz ? '#f87171' : '#e5e7eb'}; font-size:1.15rem; margin:0;">${data.isQuiz ? '💡 정답은?' : '✅ 정답 확인'} : ${data.answer}</p>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide();
  } else if (e.key === 'ArrowLeft') {
    prevSlide();
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
