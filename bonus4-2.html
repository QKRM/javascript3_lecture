<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 1주차 퀴즈 - 반복문 마스터</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 600px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1 { color: #facc15; margin-top: 0; text-align: center; }
  h2 { color: #61dafb; margin-top: 0; font-size: 2.2rem; }
  
  .quiz-option {
    background: #2d2d2d;
    padding: 1rem 1.5rem;
    border-radius: 12px;
    margin-bottom: 0.8rem;
    border: 1px solid #444;
    font-size: 1.2rem;
  }

  pre { 
    background: #0d0d0d; 
    padding: 1.2rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', monospace; 
    font-size: 1rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 1rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #facc15; color: #000; border-color: #facc15; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }

  .practice-box { 
    background: rgba(255, 255, 255, 0.02); 
    border: 1px dashed #444; 
    padding: 1.2rem; 
    border-radius: 12px; 
    margin-top: 1rem; 
    text-align: center;
  }
  .check-answer-btn {
    background: #4ade80;
    color: #000;
    border: none;
    padding: 0.6rem 1.5rem;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .check-answer-btn:hover { background: #22c55e; transform: scale(1.05); }
  .answer-content { 
    display: none; 
    margin-top: 1rem; 
    color: #facc15; 
    font-weight: bold; 
    font-size: 1.3rem; 
    text-align: center;
  }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  { 
    type: "title", 
    title: "JavaScript 반복문 퀴즈", 
    subtitle: "while문과 for문을 얼마나 이해했는지 확인해봅시다! 💡" 
  },
  {
    type: "quiz",
    question: "Q1. 반복 횟수가 명확할 때 주로 사용하는 반복문은?",
    options: ["1) while 문", "2) for 문", "3) switch 문", "4) if 문"],
    answer: "정답: 2) for 문"
  },
  {
    type: "code-quiz",
    question: "Q2. 다음 while문의 실행 결과로 알맞은 것은?",
    code: `let i = 1;
while (i < 3) {
    console.log(i);
    i++;
}`,
    answer: "정답: 1 그리고 2 (i가 3이 되는 순간 조건이 거짓이 됨)"
  },
  {
    type: "code-quiz",
    question: "Q3. 다음 코드가 출력할 마지막 숫자는?",
    code: `for (let i = 10; i > 0; i -= 2) {
    console.log(i);
}`,
    answer: "정답: 2 (10, 8, 6, 4, 2 순으로 감소)"
  },
  {
    type: "code-quiz",
    question: "Q4. 다음 중 무한 루프에 빠지는 코드는?",
    code: `// A번
while (true) { break; }

// B번
let k = 1;
while (k > 0) {
    console.log(k);
    k++; 
}`,
    answer: "정답: B번 (k가 계속 증가하므로 항상 0보다 큼)"
  },
  {
    type: "code-quiz",
    question: "Q5. 'continue' 명령어가 실행되면 어떤 일이 벌어지는가?",
    code: `for (let i = 1; i <= 5; i++) {
    if (i === 3) continue;
    console.log(i);
}`,
    answer: "정답: 현재 차례(i=3)만 건너뛰고 다음 반복(i=4) 진행"
  },
  {
    type: "code-quiz",
    question: "Q6. 다음 이중 반복문은 총 몇 번 실행될까요?",
    code: `for (let i = 0; i < 2; i++) {
    for (let j = 0; j < 3; j++) {
        console.log("작업 중...");
    }
}`,
    answer: "정답: 6번 (2 x 3 = 6)"
  },
  { 
    type: "title", 
    title: "퀴즈 종료! 🎉", 
    subtitle: "반복문의 원리를 완벽히 파악하셨나요? <br> 부족한 부분은 요약 노션 페이지에서 다시 확인해보세요!" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem;">${data.title}</h1>
        <p style="font-size:1.5rem; color:#aaa;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'quiz') {
    const opts = data.options.map(opt => `<div class="quiz-option">${opt}</div>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2>${data.question}</h2>
        <div style="margin: 2rem 0;">${opts}</div>
        <div class="practice-box">
          <button class="check-answer-btn" onclick="showAnswer(this)">정답 확인</button>
          <div class="answer-content">${data.answer}</div>
        </div>
      </div>`;
  } else if (data.type === 'code-quiz') {
    contentHtml = `
      <div class="fade-in">
        <h2>${data.question}</h2>
        <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        <div class="practice-box">
          <button class="check-answer-btn" onclick="showAnswer(this)">정답 확인</button>
          <div class="answer-content">${data.answer}</div>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
}

function showAnswer(btn) {
  const answerDiv = btn.nextElementSibling;
  answerDiv.style.display = 'block';
  btn.style.display = 'none';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
  else if (e.key === 'ArrowLeft') prevSlide();
});

renderSlide(currentIndex);
</script>
</body>
</html>
