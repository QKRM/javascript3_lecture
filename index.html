오늘의 학습 목표","items":["디자인(CSS)과 로직(JS)을 분리하는 <span class='highlight'>상태 기반 UI</span>의 개념을 이해합니다.","<span class='highlight'>addClass()</span>와 <span class='highlight'>removeClass()</span>로 요소의 스타일을 동적으로 입히고 벗깁니다.","<span class='highlight'>toggleClass()</span>를 활용해 온/오프 스위치 기능을 간결하게 구현합니다.","<span class='highlight'>hasClass()</span>로 현재 요소의 상태를 체크하여 복잡한 분기 처리를 실습합니다."]},{"type":"content","title":"1교시. 왜 클래스를 제어해야 할까요?","items":["지난 시간엔 <code>.css()</code> 메서드로 직접 스타일을 고쳤습니다.","하지만 스타일이 많아지면 자바스크립트 코드가 너무 길고 복잡해집니다.","실무에서는 <span class='accent'>CSS에 디자인을 미리 정의</span>해두고, JS로는 클래스 이름만 교체합니다.","이것이 유지보수에 훨씬 유리한 <b>관심사 분리</b> 전략입니다."]},{"type":"content","title":"🛠️ addClass() & removeClass()","items":["<b>.addClass('클래스명')</b>: 선택한 요소에 새로운 클래스를 추가합니다.","<b>.removeClass('클래스명')</b>: 선택한 요소에서 특정 클래스를 제거합니다.","<div class='code-breakdown'><b>$('.box').addClass('active');</b> // box에 active 스타일을 입혀라</div>","<span class='warn'>주의:</span> 괄호 안에 마침표(.)를 찍지 않습니다. 이름만 적으세요!"]},{"type":"code","title":"[실습 1-1] 온/오프 버튼 (구조)","desc":"먼저 HTML 구조와 CSS 상태를 작성해봅시다.","code":"<!-- CSS 스타일 -->\n<style>\n  .box { width:100px; height:100px; background:#444; }\n  .on { background: #facc15; box-shadow: 0 0 20px #facc15; }\n</style>\n\n<!-- HTML 구조 -->\n<div class=\"box\"></div>\n<button id=\"btn-on\">켜기</button>\n<button id=\"btn-off\">끄기</button>","answer":"다음 페이지에서 로직을 완성합니다."},{"type":"code","title":"[실습 1-2] 온/오프 버튼 (로직)","desc":"버튼 클릭 시 클래스를 추가/제거하는 제이쿼리를 작성하세요.","code":"<!-- jQuery 코드 -->\n<script>\n  $(\"#btn-on\").click(function() {\n      // 1. 박스에 'on' 클래스를 추가하세요.\n      $(\".box\").[         ](\"on\");\n  });\n  \n  $(\"#btn-off\").click(function() {\n      // 2. 박스에서 'on' 클래스를 제거하세요.\n      $(\".box\").[            ](\"on\");\n  });\n<\/script>","answer":"정답: addClass / removeClass"},{"type":"content","title":"🔄 toggleClass(): 스위치 마법사","items":["클래스가 있으면 제거하고, 없으면 추가해주는 <span class='highlight'>토글</span> 기능을 한 번에 처리합니다.","버튼 하나로 메뉴를 열고 닫거나, 좋아요 버튼을 구현할 때 필수적입니다.","<div class='code-breakdown'><b>$('button').click(function() {<br>&nbsp;&nbsp;$('.menu').toggleClass('open');<br>});</b></div>"]},{"type":"code","title":"[실습 2] 아코디언 메뉴 기초","desc":"질문을 클릭하면 답변 영역이 토글되는 기능을 구현하세요.","code":"<!-- CSS/HTML 생략 (show 클래스 토글) -->\n<script>\n  $(\".question\").click(function() {\n      $(\".answer\").[             ](\"show\");\n  });\n<\/script>","answer":"정답: toggleClass"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["클래스를 붙이고 떼는 기본 메서드를 마스터했습니다.","다음 시간에는 '클래스가 있는지 확인'하는 법과 실무 탭 메뉴를 배웁니다."]},{"type":"content","title":"2교시. 똑똑한 체크: hasClass()","items":["선택한 요소에 특정 클래스가 있는지 확인하여 <span class='accent'>true/false</span>를 반환합니다.","상태를 먼저 확인하고 그에 따라 다른 동작을 시킬 때 사용합니다.","<div class='code-breakdown'><b>if ( $('.box').hasClass('active') ) { ... }</b></div>"]},{"type":"code","title":"[실습 3] 조건부 상태 제어","desc":"클래스 유무에 따라 경고창을 띄워봅시다.","code":"<script>\n  $(\"#check-btn\").click(function() {\n      // status 요소가 locked 클래스를 가지고 있는지 체크!\n      if ( $(\"#status\").[          ](\"locked\") ) {\n          alert(\"먼저 잠금을 해제해야 합니다.\");\n      }\n  });\n<\/script>","answer":"정답: hasClass"},{"type":"content","title":"📱 실무 예제: 탭 메뉴(Tab Menu) 로직","items":["여러 개의 탭 중에서 <b>클릭한 요소만 'active'</b> 클래스를 주는 기술입니다.","1. 모든 탭에서 'active' 일괄 제거 (초기화)","2. 내가 클릭한 탭(`$(this)`)에만 'active' 추가","이 패턴은 내비게이션 바, 갤러리 등 모든 곳에 쓰입니다."]},{"type":"code","title":"[실습 4-1] 탭 활성화 (구조)","desc":"탭 메뉴의 스타일과 HTML 구조입니다.","code":"<!-- CSS 스타일 -->\n<style>\n  .tab { padding: 10px; background: #333; cursor: pointer; }\n  .tab.active { background: #61dafb; color: #000; font-weight: bold; }\n</style>\n\n<!-- HTML 구조 -->\n<div class=\"tabs\">\n  <span class=\"tab active\">홈</span>\n  <span class=\"tab\">프로필</span>\n  <span class=\"tab\">설정</span>\n</div>","answer":"다음 페이지에서 탭 전환 로직을 작성합니다."},{"type":"code","title":"[실습 4-2] 탭 활성화 (로직)","desc":"클릭한 탭만 하이라이트되는 제이쿼리 로직을 완성하세요.","code":"<script>\n  $(\".tab\").click(function() {\n      // 1. 모든 탭에서 active 스타일을 제거하세요.\n      $(\".tab\").removeClass(\"active\");\n      \n      // 2. 방금 클릭한 '나'에게만 active를 추가하세요.\n      [         ].[         ](\"active\");\n  });\n<\/script>","answer":"정답: $(this) / addClass"},{"type":"content","title":"🎨 다크모드/라이트모드 테마 제어","items":["<code>body</code> 태그에 클래스를 주어 사이트 전체 테마를 바꿀 수 있습니다.","<b>.dark-theme</b> 클래스가 붙으면 배경은 검게, 글자는 하얗게 미리 설정해둡니다.","버튼 클릭 시 <code>$('body').toggleClass('dark-theme')</code> 한 줄로 테마 변경 끝!"]},{"type":"code","title":"[최종 미션-1] UI 컨트롤러 (구조)","desc":"복합적인 UI 제어를 위한 스타일과 구조입니다.","code":"<!-- CSS -->\n<style>\n  body.dark { background: #000; color: #fff; }\n  .side-menu { width: 0; overflow: hidden; transition: 0.3s; background: #222; }\n  .side-menu.open { width: 200px; padding: 20px; }\n</style>\n\n<!-- HTML -->\n<button id=\"theme-toggle\">테마 변경</button>\n<button id=\"menu-btn\">메뉴 열기/닫기</button>\n<div class=\"side-menu\">사이드 메뉴 내용...</div>","answer":"다음 페이지에서 종합 제어 로직을 작성합니다."},{"type":"code","title":"[최종 미션-2] UI 컨트롤러 (로직)","desc":"토글 메서드를 활용해 각 기능을 완성하세요.","code":"<script>\n  // 1. 버튼 클릭 시 body에 'dark' 클래스를 토글하세요.\n  $(\"#theme-toggle\").click(function() {\n      $(\"body\").[             ](\"dark\");\n  });\n\n  // 2. 버튼 클릭 시 사이드 메뉴에 'open' 클래스를 토글하세요.\n  $(\"#menu-btn\").click(function() {\n      $(\".side-menu\").[             ](\"open\");\n  });\n<\/script>","answer":"정답: toggleClass / toggleClass"},{"type":"content","title":"📝 오늘의 요약","items":["<b>addClass / removeClass</b>: 명확한 스타일 주입 및 제거","<b>toggleClass</b>: 스위치처럼 상태를 반전시키는 효율적 도구","<b>hasClass</b>: 현재 요소가 특정 상태인지 체크하는 조건기","<b>상태 기반 UI</b>: 스타일은 CSS가, 전환은 JS가 담당하는 깔끔한 구조"]},{"type":"title","title":"수고하셨습니다! 👏","subtitle":"<span class='highlight'>이제 여러분은 전문적인 웹 UI를 조작할 수 있습니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 부드러운 움직임 '제이쿼리 애니메이션'</span>"}],"web3-3-11":[{"type":"title","title":"JavaScript 입문: 3주차 11차시","subtitle":"<span class='highlight' style='font-size:2rem;'>논리 기반 상태 전환 실습 (심화)</span><br><br><span style='color:#888; font-size:1.1rem;'>기획 요구사항을 코드로 구현하는 능력을 기릅니다.<br>HTML/CSS 설계부터 jQuery 로직까지 무한 실습!</span>"},{"type":"content","title":"🎯 오늘의 미션 가이드","items":["각 미션은 <span class='highlight'>요구사항 확인 → 구조 설계 → 로직 구현</span> 순으로 진행됩니다.","단순한 클래스 제어를 넘어 <span class='accent'>부모/자식/형제 관계</span>를 활용한 논리를 구축합니다.","실제 웹 서비스의 <span class='highlight'>좋아요, 모달, 아코디언, 탭</span> 기능을 직접 제작합니다.","문제가 막힐 때는 9, 10차시 요약 노트를 참고하세요!"]},{"type":"content","title":"Mission 01. 야간 모드 토글 스위치","items":["<b>요구사항:</b> 버튼 클릭 시 사이트 전체의 배경과 글자색을 반전시킵니다.","<b>구조:</b> <code>body</code> 태그에 'dark' 클래스를 토글하는 방식을 사용합니다.","<b>힌트:</b> 단 한 줄의 메서드로 온/오프 상태를 제어할 수 있습니다."]},{"type":"code","title":"[1-1] 스위치 구조(HTML/CSS) 설계","desc":"클래스에 따른 디자인 상태를 정의하세요.","code":"<style>\n  body { background: white; color: black; transition: 0.5s; }\n  /* body에 dark 클래스가 붙었을 때의 스타일 */\n  body.[      ] { background: #121212; color: white; }\n</style>\n\n<button id=\"mode-btn\">다크모드 전환</button>","answer":"정답: dark"},{"type":"code","title":"[1-2] 스위치 로직(jQuery) 구현","desc":"toggleClass를 사용해 기능을 완성하세요.","code":"<script>\n  $(\"#mode-btn\").click(function() {\n      $(\"body\").[             ](\"dark\");\n  });\n<\/script>","answer":"정답: toggleClass"},{"type":"content","title":"Mission 02. 알림 배지 상태 체크","items":["<b>요구사항:</b> 알림창을 클릭하면 읽음 처리(클래스 추가)를 합니다.","<b>조건 분기:</b> 이미 읽은 알림이라면 '이미 확인했습니다' 경고창을 띄웁니다.","<b>핵심:</b> <code>hasClass</code>를 사용해 현재 상태를 먼저 파악하세요."]},{"type":"code","title":"[2-1] 알림 배지 구조 설계","desc":"읽지 않은 상태와 읽은 상태의 시각적 차이를 만듭니다.","code":"<style>\n  .badge { width: 10px; height: 10px; background: red; border-radius: 50%; }\n  /* 읽음(checked) 클래스가 붙으면 배지를 숨깁니다. */\n  .badge.[          ] { display: none; }\n</style>\n\n<div class=\"alarm\">새 소식이 도착했습니다! <span class=\"badge\"></span></div>\n<button id=\"check-btn\">읽음 처리</button>","answer":"정답: checked (또는 read)"},{"type":"code","title":"[2-2] 알림 배지 로직 구현","desc":"if문과 hasClass를 조합해 스마트한 로직을 짭니다.","code":"<script>\n  $(\"#check-btn\").click(function() {\n      // 1. 배지에 이미 'checked' 클래스가 있는지 확인하세요.\n      if ( $(\".badge\").[          ](\"checked\") ) {\n          alert(\"이미 읽은 알림입니다.\");\n      } else {\n          // 2. 클래스가 없다면 'checked'를 추가하세요.\n          $(\".badge\").[         ](\"checked\");\n      }\n  });\n<\/script>","answer":"정답: hasClass / addClass"},{"type":"content","title":"Mission 03. 인스타그램 좋아요 버튼","items":["<b>요구사항:</b> 하트 아이콘을 누르면 빨간색으로 변하고, 다시 누르면 돌아옵니다.","<b>추가 기능:</b> 좋아요 상태일 때는 '좋아요 취소' 텍스트를, 아닐 때는 '좋아요'라고 텍스트도 바꿉니다.","<b>힌트:</b> <code>toggleClass</code>와 <code>hasClass</code>를 모두 사용해 보세요."]},{"type":"code","title":"[3-1] 좋아요 구조 설계","desc":"폰트어썸 아이콘을 활용한 구조입니다.","code":"<style>\n  .btn-like { color: #ccc; cursor: pointer; font-size: 2rem; }\n  /* active 클래스가 붙으면 빨간 하트로 변신! */\n  .btn-like.[        ] { color: red; }\n</style>\n\n<div class=\"btn-like\">♥</div>\n<p id=\"like-text\">좋아요</p>","answer":"정답: active"},{"type":"code","title":"[3-2] 좋아요 로직 구현","desc":"상태 전환과 텍스트 변경을 동시에 처리하세요.","code":"<script>\n  $(\".btn-like\").click(function() {\n      // 1. 하트의 색상을 토글합니다.\n      $(this).toggleClass(\"active\");\n      \n      // 2. 현재 active 상태인지 체크하여 글자를 바꿔줍니다.\n      if ( $(this).[          ](\"active\") ) {\n          $(\"#like-text\").text(\"좋아요 취소\");\n      } else {\n          $(\"#like-text\").text(\"좋아요\");\n      }\n  });\n<\/script>","answer":"정답: hasClass"},{"type":"content","title":"Mission 04. 아코디언 (단일 선택 모드)","items":["<b>요구사항:</b> 여러 질문 중 하나를 클릭하면 답변이 열립니다.","<b>핵심 논리:</b> 내가 열릴 때, 이미 열려있던 다른 답변들은 닫혀야 합니다.","<b>힌트:</b> <code>siblings()</code>로 형제들을 먼저 초기화한 뒤 나를 켭니다."]},{"type":"code","title":"[4-1] 아코디언 구조 설계","desc":"부모 요소에 상태를 주는 방식이 유리합니다.","code":"<style>\n  .item .ans { display: none; }\n  /* item에 on 클래스가 있을 때만 ans를 보여줍니다. */\n  .item.[    ] .ans { display: block; }\n</style>\n\n<div class=\"item\">\n  <div class=\"q\">질문 1</div><div class=\"ans\">답변 1</div>\n</div>\n<div class=\"item\">\n  <div class=\"q\">질문 2</div><div class=\"ans\">답변 2</div>\n</div>","answer":"정답: on (또는 open)"},{"type":"code","title":"[4-2] 아코디언 로직 구현","desc":"나만 빼고 모두 닫는 배타적 로직을 구현하세요.","code":"<script>\n  $(\".q\").click(function() {\n      let parent = $(this).parent(); // 클릭한 q의 부모 .item\n      \n      // 1. 다른 모든 형제 item에서 'on' 클래스를 제거하세요.\n      parent.[            ]().removeClass(\"on\");\n      \n      // 2. 클릭한 부모에게 'on' 클래스를 토글하세요.\n      parent.[             ](\"on\");\n  });\n<\/script>","answer":"정답: siblings / toggleClass"},{"type":"content","title":"Mission 05. 탭 메뉴와 콘텐츠 전환","items":["<b>요구사항:</b> 버튼(Tab)을 누르면 그에 맞는 내용(Panel)이 나타납니다.","<b>논리:</b> 버튼과 패널의 <b>순서(index)</b>가 일치해야 합니다.","<b>활용:</b> <code>eq()</code> 필터와 <code>index()</code> 메서드를 사용해 보세요."]},{"type":"code","title":"[5-1] 탭 구조 설계","desc":"버튼과 내용이 분리된 전형적인 탭 구조입니다.","code":"<style>\n  .panel { display: none; padding: 50px; background: #222; }\n  .panel.active { display: block; } /* 선택된 내용만 노출 */\n  .tab.active { color: #61dafb; border-bottom: 2px solid; }\n</style>\n\n<div class=\"tabs\">\n  <button class=\"tab active\">공지사항</button>\n  <button class=\"tab\">자유게시판</button>\n</div>\n<div class=\"panels\">\n  <div class=\"panel active\">공지 리스트...</div>\n  <div class=\"panel\">자유글 리스트...</div>\n</div>","answer":"정답: active (CSS 상태 설계)"},{"type":"code","title":"[5-2] 탭 로직 구현","desc":"클릭한 버튼의 번호를 찾아 해당 패널을 보여줍니다.","code":"<script>\n  $(\".tab\").click(function() {\n      // 1. 몇 번째 탭을 눌렀는지 번호를 가져옵니다.\n      let idx = $(this).[         ](); \n      \n      // 2. 모든 탭과 패널에서 active를 제거(초기화)합니다.\n      $(\".tab, .panel\").removeClass(\"active\");\n      \n      // 3. 누른 탭(this)과 그 번호에 맞는 패널(eq)에 active를 줍니다.\n      $(this).addClass(\"active\");\n      $(\".panel\").[      ](idx).addClass(\"active\");\n  });\n<\/script>","answer":"정답: index / eq"},{"type":"content","title":"🔥 Final Mission: 사이드바 풀다운 메뉴","items":["<b>미션 내용:</b> 햄버거 버튼을 누르면 사이드바가 슬라이드하며 나타납니다.","<b>요구사항:</b> 사이드바가 이미 열려있다면 닫고, 닫혀있다면 엽니다.","<b>추가 도전:</b> <code>hasClass</code>로 상태를 체크해 콘솔에 '메뉴 열림/닫힘'을 출력하세요."]},{"type":"code","title":"[최종-1] 사이드바 구조 설계","desc":"position: fixed와 left 값을 이용한 구조 설계입니다.","code":"<style>\n  .sidebar { position: fixed; left: -250px; width: 250px; height: 100%; transition: 0.3s; background: #333; }\n  /* 'open' 클래스가 있을 때 화면 안으로 들어옵니다. */\n  .sidebar.[      ] { left: 0; }\n</style>\n\n<button id=\"toggle-btn\">☰</button>\n<div class=\"sidebar\">메뉴 리스트...</div>","answer":"정답: open"},{"type":"code","title":"[최종-2] 사이드바 로직 구현","desc":"메서드를 총동원해 기능을 완성하세요.","code":"<script>\n  $(\"#toggle-btn\").click(function() {\n      // 1. 사이드바의 open 클래스를 토글하세요.\n      $(\".sidebar\").[             ](\"open\");\n      \n      // 2. 현재 사이드바가 열렸는지(hasClass) 체크해 콘솔을 찍으세요.\n      if ( $(\".sidebar\").[          ](\"open\") ) {\n          console.log(\"메뉴가 열렸습니다.\");\n      }\n  });\n<\/script>","answer":"정답: toggleClass / hasClass"},{"type":"content","title":"📝 11차시 실습 총정리","items":["<b>Event-Driven:</b> 모든 동작은 '클릭' 같은 사용자의 행동에서 시작됩니다.","<b>State Control:</b> JS로 모든 디자인을 바꾸려 하지 말고 '클래스'를 갈아 끼우세요.","<b>Traversal:</b> <code>parent</code>, <code>siblings</code>를 알면 HTML 구조를 정복할 수 있습니다.","<b>Condition:</b> <code>hasClass</code>는 복잡한 UI 시나리오를 만드는 핵심 열쇠입니다."]},{"type":"title","title":"실습 과정 완료! 🎖️","subtitle":"<span class='highlight'>이제 여러분은 기획안을 코드로 옮기는 '진짜 개발'을 시작했습니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 실시간 데이터 조작 '콘텐츠 제어 메서드'</span>"}],"web3-3-12":[{"type":"title","title":"JavaScript 입문: 3주차 12차시","subtitle":"<span class='highlight' style='font-size:2rem;'>팝업창(Modal) 구현 & 이벤트 제어</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 레이어 팝업의 설계와 기본 제어<br>2교시: 이벤트 버블링 해결 및 실무 UX 최적화</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["웹 사이트 필수 구성 요소인 <span class='highlight'>모달(Modal)</span>의 물리적 계층 구조를 이해합니다.","애니메이션 메서드를 결합하여 <span class='highlight'>열기/닫기 로직</span>을 부드럽게 구현합니다.","자식의 사건이 부모에게 전달되는 <span class='highlight'>버블링</span> 문제를 분석합니다.","<span class='highlight'>stopPropagation()</span>을 활용해 정교한 상호작용 시스템을 구축합니다."]},{"type":"content","title":"1교시-①. 모달의 기본 레이아웃","items":["<b>배경(Dimmer):</b> 화면 전체를 덮어 사용자의 시선을 집중시키는 어두운 막입니다.","<b>본문(Content):</b> 메시지를 담고 있는 중앙의 상자입니다.","<b>구조:</b> 배경 안에 본문이 포함된 '부모-자식' 관계가 일반적입니다."]},{"type":"code","title":"[실습 1-1] 모달 스타일링 (CSS)","desc":"화면을 덮는 방식과 중앙 정렬 기법을 확인하세요.","code":"<style>\n  /* 팝업 전체를 감싸는 어두운 배경 */\n  .modal-bg {\n    position: fixed; /* 브라우저 화면에 위치 고정 */\n    top: 0;          /* 상단 끝에 위치 */\n    left: 0;         /* 좌측 끝에 위치 */\n    width: 100%;     /* 가로 전체 채우기 */\n    height: 100%;    /* 세로 전체 채우기 */\n    background: rgba(0,0,0,0.7); /* 검은색 배경, 70% 불투명 */\n    display: none;   /* 기본 상태는 보이지 않음 */\n    z-index: 1000;   /* 다른 요소보다 앞쪽 레이어 배치 */\n  }\n  /* 중앙에 위치할 실제 콘텐츠 박스 */\n  .modal-content {\n    position: absolute; /* 부모인 modal-bg를 기준으로 배치 */\n    top: 50%;           /* 위에서 50% 지점 */\n    left: 50%;          /* 왼쪽에서 50% 지점 */\n    transform: translate(-50%, -50%); /* 박스 자체 크기의 절반만큼 역이동(완전 중앙) */\n    background: white;  /* 배경색 흰색 */\n    padding: 30px;      /* 내부 여백 생성 */\n    color: #333;        /* 글자색 짙은 회색 */\n    border-radius: 12px; /* 모서리 둥글게 처리 */\n  }\n</style>","answer":"설명: fixed와 transform을 이용해 모달의 정석 구조를 만듭니다."},{"type":"code","title":"[실습 1-2] 모달 구조 및 로직 (HTML/JS)","desc":"버튼과 배경의 관계를 이용해 열고 닫습니다.","code":"<!-- HTML 구조 -->\n<button id=\"open-btn\">팝업 열기</button> <!-- 열기 버튼 -->\n<div class=\"modal-bg\"> <!-- 어두운 배경 (부모) -->\n  <div class=\"modal-content\"> <!-- 실제 내용 박스 (자식) -->\n    <h3>환영합니다!</h3>\n    <p>모달 팝업이 성공적으로 열렸습니다.</p>\n    <button id=\"close-btn\">닫기</button> <!-- 닫기 버튼 -->\n  </div>\n</div>\n\n<!-- jQuery 로직 -->\n<script>\n  // '팝업 열기' 버튼을 클릭했을 때의 동작 정의\n  $(\"#open-btn\").click(function() {\n      // 숨겨진 배경 요소를 0.4초 동안 서서히 나타나게 함\n      $(\".modal-bg\").fadeIn(); \n  });\n\n  // '닫기' 버튼을 클릭했을 때의 동작 정의\n  $(\"#close-btn\").click(function() {\n      // 나타나 있는 배경 요소를 0.4초 동안 서서히 사라지게 함\n      $(\".modal-bg\").fadeOut();\n  });\n<\/script>","answer":"정답: fadeIn / fadeOut (부드러운 화면 전환 효과)"},{"type":"content","title":"1교시-②. 다중 콘텐츠 제어 실습","items":["<b>요구사항:</b> 여러 버튼이 각각 다른 메시지를 팝업에 띄워야 합니다.","<b>논리:</b> 버튼을 누르는 순간, 모달 내부의 텍스트를 먼저 바꾸고 창을 엽니다.","<b>장점:</b> 하나의 모달 구조로 수백 개의 알림을 처리할 수 있어 효율적입니다."]},{"type":"code","title":"[실습 2-1] 콘텐츠 동적 가공 (구조)","desc":"버튼들과 재사용할 모달의 구조입니다.","code":"<!-- 제어용 버튼들 -->\n<button id=\"confirm-btn\">확인 버튼</button>\n<button id=\"error-btn\">에러 버튼</button>\n\n<!-- 재사용할 모달 구조 -->\n<div class=\"modal-bg\">\n  <div class=\"modal-content\">\n    <h3 id=\"modal-title\">기본 제목</h3> <!-- 내용이 바뀔 부분 -->\n    <p>버튼에 따라 제목과 테두리 색이 변합니다.</p>\n    <button id=\"close-btn\">닫기</button>\n  </div>\n</div>","answer":"설명: 아이디(#modal-title)를 통해 특정 글자만 조준하여 바꿀 수 있습니다."},{"type":"code","title":"[실습 2-2] 콘텐츠 동적 가공 (로직)","desc":"클릭한 버튼에 따라 팝업의 내용과 색상을 변경합니다.","code":"<script>\n  // '확인' 버튼 클릭 시 실행될 함수\n  $(\"#confirm-btn\").click(function() {\n      // 1. 모달 본문 테두리를 초록색으로 변경하여 성공 알림 강조\n      $(\".modal-content\").css(\"border\", \"4px solid green\");\n      // 2. 모달 제목 텍스트를 성공 메시지로 실시간 교체\n      $(\"#modal-title\").text(\"성공: 데이터가 저장되었습니다.\");\n      // 3. 내용 변경이 완료된 후 모달을 서서히 켬\n      $(\".modal-bg\").fadeIn();\n  });\n\n  // '에러' 버튼 클릭 시 실행될 함수\n  $(\"#error-btn\").click(function() {\n      // 1. 모달 본문 테두리를 빨간색으로 변경하여 위험 알림 강조\n      $(\".modal-content\").css(\"border\", \"4px solid red\");\n      // 2. 모달 제목 텍스트를 오류 메시지로 실시간 교체\n      $(\"#modal-title\").text(\"오류: 다시 시도해주세요.\");\n      // 3. 내용 변경이 완료된 후 모달을 서서히 켬\n      $(\".modal-bg\").fadeIn();\n  });\n<\/script>","answer":"핵심: .text()와 .css()를 활용해 창을 열기 전 내용을 미리 세팅합니다."},{"type":"content","title":"2교시. 이벤트 버블링(Bubbling)","items":["<b>개념:</b> 자식 요소를 클릭하면 부모 요소에게도 '클릭됐다'는 신호가 올라가는 현상입니다.","<b>문제:</b> 배경 클릭 시 팝업을 닫게 만들면, 본문(자식)을 눌러도 배경(부모)까지 신호가 가서 창이 꺼집니다.","<b>해결:</b> 신호가 위로 올라가지 못하게 중간에서 차단해야 합니다."]},{"type":"code","title":"[실습 3-1-1] 버블링 현상 확인 (구조)","desc":"배경 클릭 이벤트를 테스트하기 위한 구조입니다.","code":"<style>\n  /* 배경 스타일: 클릭 시 꺼지도록 설계할 예정 */\n  .modal-bg { position: fixed; ... background: rgba(0,0,0,0.5); }\n  /* 본문 스타일: 배경 위에 떠 있는 자식 요소 */\n  .modal-content { background: white; padding: 50px; }\n</style>\n\n<div class=\"modal-bg\"> <!-- 부모 -->\n  <div class=\"modal-content\"> <!-- 자식 -->\n    여기를 클릭해도 배경이 클릭된 것으로 간주됩니다!\n  </div>\n</div>","answer":"현상: 자식인 하얀 박스를 눌러도 부모인 검은 배경까지 클릭 신호가 전달됩니다."},{"type":"code","title":"[실습 3-1-2] 버블링 현상 확인 (로직/버그)","desc":"본문 클릭 시 원치 않게 창이 닫히는 코드를 분석하세요.","code":"<script>\n  // 배경(.modal-bg)을 누르면 창이 닫히도록 설정 (부모 이벤트)\n  $(\".modal-bg\").click(function() {\n      $(this).fadeOut(); // 배경이 서서히 사라짐\n      console.log(\"부모 요소(배경) 클릭 이벤트가 실행되었습니다.\");\n  });\n\n  // 본문(.modal-content)은 클릭 시 로그만 찍고 싶음 (자식 이벤트)\n  $(\".modal-content\").click(function() {\n      console.log(\"자식 요소(본문)가 클릭되었습니다.\");\n      // [버그] 여기서 신호가 부모로 전달(버블링)되어 위 fadeOut이 같이 터짐!\n  });\n<\/script>","answer":"진단: 자식 영역을 보호하기 위해 '전파 차단' 가위질이 필요합니다."},{"type":"content","title":"✂️ stopPropagation(): 사건의 전파 차단","items":["매개변수 <code>e</code> (이벤트 객체)가 제공하는 특수 메서드입니다.","<b>명령:</b> 이 지점 이후로는 클릭 이벤트를 위로 보내지 마라!","팝업 본문을 보호하고, 오직 배경을 눌렀을 때만 닫히게 하는 핵심 열쇠입니다."]},{"type":"code","title":"[실습 3-2] 버그 해결 완료 (완성)","desc":"본문 영역에 차단기를 설치하여 안전한 UI를 만듭니다.","code":"<script>\n  // 1. 부모(배경) 이벤트 정의: 창 닫기 수행\n  $(\".modal-bg\").click(function() {\n      $(this).fadeOut(); // 배경 클릭 시에만 창이 닫힘\n  });\n\n  // 2. 자식(본문) 이벤트 정의: 전파 차단 수행\n  $(\".modal-content\").click(function(event) {\n      // 이벤트 객체(event)가 가진 전파 중단 함수 호출\n      event.stopPropagation(); \n      // 이제 클릭 신호가 여기서 멈추므로 부모의 fadeOut은 실행되지 않음\n      console.log(\"전파 차단 완료: 본문을 눌러도 창이 닫히지 않습니다.\");\n  });\n<\/script>","answer":"결과: 본문은 이제 배경 이벤트로부터 독립되어 보호받습니다."},{"type":"content","title":"🔥 Final Mission: 실무형 모달 시스템","items":["<b>요구사항:</b> 열기 버튼, 본문 클릭 보호, 배경/X버튼 클릭 닫기를 모두 구현합니다.","<b>추가 기능:</b> 팝업이 뜨면 뒷배경의 스크롤을 막아 사용자 혼란을 방지합니다.","<b>활용:</b> <code>fadeIn</code>, <code>stopPropagation</code>, <code>addClass</code> 등 총동원!"]},{"type":"code","title":"[최종-1] 실무 모달 구조 (CSS/HTML)","desc":"스크롤 잠금 클래스와 UI 구조를 먼저 준비합니다.","code":"<style>\n  /* 모달이 켜졌을 때 body 태그에 붙여 스크롤을 막는 클래스 */\n  body.no-scroll { \n    overflow: hidden; /* 페이지 스크롤바를 숨기고 조작 불가로 만듦 */\n  }\n  \n  .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; \n               background: rgba(0,0,0,0.8); display: none; z-index: 9999; }\n  \n  .modal-content { position: absolute; top: 50%; left: 50%; \n                   transform: translate(-50%, -50%); background: #fff; \n                   padding: 40px; border-radius: 15px; text-align: center; }\n  \n  /* 오른쪽 상단 닫기 X 버튼 */\n  .close-x { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; color: #aaa; }\n</style>\n\n<button id=\"open\">시스템 공지 확인</button> <!-- 트리거 버튼 -->\n\n<div class=\"modal-bg\">\n  <div class=\"modal-content\">\n    <span class=\"close-x\">&times;</span> <!-- X 버튼 -->\n    <h2>공지사항</h2>\n    <p>본문 클릭 시에는 창이 닫히지 않으며, 스크롤도 금지됩니다.</p>\n  </div>\n</div>","answer":"준비 단계: 다음 페이지에서 모든 동작을 하나로 엮는 로직을 작성합니다."},{"type":"code","title":"[최종-2] 실무 모달 로직 (JS)","desc":"모든 기능을 하나로 결합한 전문가용 주석 코드입니다.","code":"<script>\n  // 1. '공지 확인' 버튼을 클릭하여 모달을 여는 기능\n  $(\"#open\").click(function() {\n      // 배경을 서서히 나타나게 함 (열기)\n      $(\".modal-bg\").fadeIn(); \n      // body에 클래스를 추가하여 뒷배경 스크롤을 물리적으로 잠금\n      $(\"body\").addClass(\"no-scroll\"); \n  });\n\n  // 2. 모달 본문 영역을 클릭했을 때의 보호 기능 (중요!)\n  $(\".modal-content\").click(function(e) {\n      // 클릭 신호가 부모인 배경(.modal-bg)으로 전달되는 것을 가로막음\n      e.stopPropagation(); \n  });\n\n  // 3. 배경 영역 혹은 X 버튼을 클릭하여 모달을 닫는 기능\n  $(\".modal-bg, .close-x\").click(function() {\n      // 배경을 서서히 사라지게 함 (닫기)\n      $(\".modal-bg\").fadeOut(); \n      // body에서 스크롤 잠금 클래스를 제거하여 다시 스크롤 허용\n      $(\"body\").removeClass(\"no-scroll\"); \n  });\n<\/script>","answer":"완성: 실제 서비스에서 즉시 사용 가능한 수준의 모달 시스템입니다."},{"type":"content","title":"📝 12차시 핵심 총정리","items":["<b>Modal Layout:</b> <code>fixed</code> 배경과 <code>absolute</code> 본문의 부모-자식 관계 설계","<b>Content Control:</b> 열기 직전에 <code>.text()</code> 등을 사용해 내용을 실시간 가공","<b>Event Bubbling:</b> 자식의 사건이 부모에게 보고되는 웹 브라우저의 기본 특성","<b>stopPropagation:</b> 사건의 상위 전달을 막아 UI 오작동(버그)을 해결하는 도구","<b>UX Manner:</b> 팝업 오픈 시 <code>body</code> 스크롤 제어는 필수"]},{"type":"title","title":"12차시 마스터! 🏆","subtitle":"<span class='highlight'>여러분은 이제 복잡한 UI의 사건 전파를 완벽히 지배합니다.</span><br><br><span style='color:#777;'>수고하셨습니다. 이제 나만의 프로젝트를 시작할 준비가 되었습니다!</span>"}],"web3-4-13":[{"type":"title","title":"JavaScript 입문: 4주차 13차시","subtitle":"<span class='highlight' style='font-size:2rem;'>아코디언 메뉴: 설계부터 심화까지</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 높이 기반 애니메이션과 구조 설계<br>2교시: 상호 배타적 로직과 UI 피드백(Icon Control)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["높이(height)를 부드럽게 조절하는 <span class='highlight'>slide계열 메서드</span>의 원리를 이해합니다.","콘텐츠를 숨기고 펼치는 <span class='highlight'>아코디언 UI</span>의 표준 마크업을 구축합니다.","동시에 하나만 열리는 <span class='highlight'>상호 배타적 로직(Mutual Exclusion)</span>을 설계합니다.","<span class='highlight'>CSS Transform</span>과 연동하여 상태에 따라 회전하는 아이콘 기능을 구현합니다.","<span class='highlight'>.is(':visible')</span> 상태 체크를 통해 지능적인 분기 처리를 실습합니다."]},{"type":"content","title":"1교시. 아코디언 메뉴의 핵심 원리","items":["<b>메커니즘:</b> 사용자가 제목을 클릭하면, 숨겨져 있던 자식 요소의 높이가 실시간으로 계산되며 노출됩니다.","<b>UX 장점:</b> 한정된 모바일 화면에서 방대한 양의 정보를 효율적으로 노출할 수 있습니다.","<b>주의사항:</b> 초기 상태에서 내용 영역은 반드시 <code>display: none;</code> 이어야 합니다."]},{"type":"code","title":"[실습 1-1] 아코디언 기본 구조 (CSS)","desc":"내용 영역을 감추고 아이템 간의 경계를 구분합니다.","code":"<style>\n  /* 메뉴 전체 컨테이너 */\n  .accordion { width: 400px; border-top: 1px solid #444; }\n  \n  /* 각 질문(제목) 박스 */\n  .title { \n    padding: 20px; background: #2c2c2c; cursor: pointer; \n    border-bottom: 1px solid #444; position: relative;\n  }\n  \n  /* [중요] 답변 영역 - 초기값은 무조건 숨김 */\n  .content { \n    padding: 20px; background: #1a1a1a; color: #bbb;\n    display: none; /* 슬라이드 동작을 위해 필수 */\n    border-bottom: 1px solid #444;\n  }\n</style>","answer":"설명: display: none이 없다면 페이지 로딩 시 모든 답변이 펼쳐져 보입니다."},{"type":"code","title":"[실습 1-2] 기초 슬라이드 로직 (JS)","desc":"가장 단순한 토글 기능을 주석과 함께 확인하세요.","code":"<script>\n  // 모든 .title 요소를 감시합니다.\n  $(\".title\").click(function() {\n      // 1. 클릭한 제목 바로 다음에 위치한(.next) 요소를 선택합니다.\n      // 2. 해당 요소의 상태에 따라 slideDown/Up을 자동 실행합니다.\n      $(this).next(\".content\").slideToggle(300);\n      \n      // [한계] 지금은 여러 개를 누르면 누르는 대로 다 열려버립니다.\n  });\n<\/script>","answer":"핵심: next() 메서드는 형제 관계에서 바로 아래에 있는 요소를 지목합니다."},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["기본적인 열기/닫기 기능을 마스터했습니다.","다음 시간에는 '하나가 열리면 나머지는 닫히는' 실무형 로직을 배웁니다."]},{"type":"content","title":"2교시. 상호 배타적 로직 (하나만 열기)","items":["사용자가 질문 A를 열었을 때, 기존에 열려있던 질문 B를 자동으로 닫아주는 기능입니다.","<b>전략:</b> '나'를 열기 전에, '나를 제외한 나머지 형제들'을 먼저 초기화(Close) 시킵니다.","<b>필요 메서드:</b> <code>parent()</code>, <code>siblings()</code>, <code>find()</code>"]},{"type":"code","title":"[실습 2] 배타적 아코디언 로직 (JS)","desc":"나만 빼고 모두 닫는 스마트한 코드를 분석해보세요.","code":"<script>\n  $(\".title\").click(function() {\n      // 1. 클릭한 제목의 부모(.item)를 기준으로 다른 형제들을 찾습니다.\n      // 2. 그 형제들 안에 들어있는 .content를 모두 찾아 닫습니다.\n      $(this).parent().siblings().find(\".content\").slideUp();\n      \n      // 3. 이제 나(클릭한 제목)의 다음 요소만 조심스럽게 엽니다.\n      $(this).next(\".content\").slideDown();\n  });\n<\/script>","answer":"정답: siblings()를 활용해 다른 아이템들을 제어하는 것이 포인트입니다."},{"type":"content","title":"📈 심화 ①. 애니메이션 대기열 해결","items":["사용자가 제목을 빠르게 여러 번 클릭하면 애니메이션이 '예약'되어 무한히 춤추는 현상이 생깁니다.","<b>해결:</b> 새로운 슬라이드를 시작하기 직전에 <code>.stop()</code>으로 진행 중인 동작을 취소합니다.","<div class='code-breakdown'><b>$(target).stop().slideToggle();</b></div>"]},{"type":"content","title":"📈 심화 ②. UI 피드백: 아이콘 회전","items":["단순히 열리는 것보다, 제목 옆의 화살표가 돌아가는 등의 시각적 피드백이 중요합니다.","<b>CSS Transform:</b> 회전 상태를 클래스(<code>.active</code>)로 미리 정의합니다.","<b>JS 연동:</b> 슬라이드 시점에 제목 요소에 클래스를 토글합니다."]},{"type":"code","title":"[실습 3-1] 회전 아이콘 설계 (CSS)","desc":"가상 요소를 활용한 화살표와 회전 애니메이션입니다.","code":"<style>\n  /* 제목 우측에 화살표 생성 */\n  .title::after {\n    content: '▼'; position: absolute; right: 20px;\n    transition: 0.3s; /* 부드러운 회전을 위해 필요 */\n  }\n  \n  /* active 클래스가 붙으면 180도 회전 시킴 */\n  .title.active::after {\n    transform: rotate(180deg);\n    color: #61dafb;\n  }\n</style>","answer":"핵심: 자바스크립트는 클래스만 뗐다 붙였다 하고, 실제 움직임은 CSS가 담당합니다."},{"type":"code","title":"[실습 3-2] 아이콘 제어 포함 로직 (JS)","desc":"슬라이드와 클래스 제어를 결합하여 UI를 완성합니다.","code":"<script>\n  $(\".title\").click(function() {\n      // 1. 다른 제목들의 active 클래스 제거 및 답변 닫기\n      $(\".title\").not(this).removeClass(\"active\");\n      $(this).parent().siblings().find(\".content\").stop().slideUp();\n\n      // 2. 클릭한 제목의 클래스 토글 및 답변 슬라이드\n      $(this).toggleClass(\"active\");\n      $(this).next(\".content\").stop().slideToggle();\n  });\n<\/script>","answer":"설명: .not(this)를 통해 내가 아닌 다른 요소들만 골라낼 수 있습니다."},{"type":"content","title":"📈 심화 ③. 지능적인 상태 체크: .is()","items":["현재 요소가 화면에 보이고 있는지(visible) 여부를 판단하여 다른 로직을 수행할 수 있습니다.","<b>활용:</b> 이미 열려있는 메뉴를 다시 눌렀을 때만 특수한 효과를 주거나 로그를 남길 때 사용합니다.","<div class='code-breakdown'><b>if( $(el).is(':visible') ) { ... }</b></div>"]},{"type":"content","title":"🔥 Final Challenge: 전문가형 FAQ 섹션","items":["<b>미션 내용:</b> 지금까지 배운 모든 기술을 총동원하여 완벽한 아코디언을 만듭니다.","<b>필수 기능:</b> <br>1. 하나가 열리면 남은 닫힐 것 <br>2. 아이콘이 회전할 것 <br>3. <code>stop()</code>을 써서 광클 버그를 막을 것 <br>4. <code>is(':visible')</code>로 현재 상태를 콘솔에 출력할 것"]},{"type":"code","title":"[최종-1] 종합 프로젝트 구조 (HTML)","desc":"더 많은 아이템을 추가하여 테스트해봅시다.","code":"<div class=\"accordion\">\n  <div class=\"item\">\n    <div class=\"title\">Q1. 환불 규정이 어떻게 되나요?</div>\n    <div class=\"content\">구매 후 7일 이내에 고객센터로 연락주시기 바랍니다.</div>\n  </div>\n  <div class=\"item\">\n    <div class=\"title\">Q2. 배송은 얼마나 걸리나요?</div>\n    <div class=\"content\">영업일 기준 평균 2~3일이 소요됩니다.</div>\n  </div>\n  <div class=\"item\">\n    <div class=\"title\">Q3. 회원 탈퇴는 어디서 하나요?</div>\n    <div class=\"content\">마이페이지 > 개인정보 수정 하단에서 가능합니다.</div>\n  </div>\n</div>","answer":"팁: 동일한 구조가 반복될 때 jQuery의 탐색 메서드가 빛을 발합니다."},{"type":"code","title":"[최종-2] 종합 프로젝트 로직 (JS)","desc":"가장 완벽하고 정교한 아코디언 스크립트입니다.","code":"<script>\n  $(\".title\").click(function() {\n      // [1] 클릭한 타겟 정의\n      const $this = $(this);\n      const $content = $this.next(\".content\");\n\n      // [2] 상태 확인 (심화 활용)\n      if ($content.is(\":visible\")) {\n          console.log(\"이미 열려있는 항목을 닫습니다.\");\n      } else {\n          console.log(\"새로운 항목을 펼칩니다.\");\n      }\n\n      // [3] 상호 배타적 초기화 (나를 제외한 나머지)\n      $(\".title\").not($this).removeClass(\"active\");\n      $this.parent().siblings().find(\".content\").stop().slideUp(200);\n\n      // [4] 나의 상태 전환\n      $this.toggleClass(\"active\");\n      $content.stop().slideToggle(200);\n  });\n<\/script>","answer":"완성: 변수를 활용해 코드를 더 깔끔하게 정리하는 법도 확인하세요."},{"type":"content","title":"📝 13차시 핵심 요약","items":["<b>slideDown/Up:</b> 높이를 0~Auto 사이에서 계산하며 움직이는 효과.","<b>Mutual Exclusion:</b> <code>siblings()</code>를 이용해 '하나만 열기' 구현.","<b>UI Detail:</b> 클래스 제어와 CSS의 결합으로 고급스러운 아이콘 회전 구현.","<b>Stability:</b> <code>stop()</code>으로 중첩된 애니메이션 대기열 초기화.","<b>Logical Flow:</b> 사용자의 행동 → 타겟 탐색 → 상태 확인 → 최종 액션."]},{"type":"title","title":"JS 4주차 13차시 완료! 🏆","subtitle":"<span class='highlight'>이제 여러분은 단순한 웹 조작자가 아닌 UI 설계자입니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 가로로 무한히 흐르는 '이미지 슬라이드 배너'</span>"}],"web3-4-14":[{"type":"title","title":"JavaScript 입문: 4주차 14차시","subtitle":"<span class='highlight' style='font-size:2rem;'>인터랙션 고도화: 끊김 없는 UX 설계</span><br><br><span style='color:#64748b; font-size:1.1rem;'>1교시: 시각적 피드백과 애니메이션 최적화 (실습 5종)<br>2교시: 실제 서비스형 기능 구현 (쇼핑몰 & 대시보드)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["<span class='highlight'>.stop()</span> 메서드를 활용해 애니메이션 큐 중첩을 완벽히 방어합니다.","사용자의 입력과 마우스 움직임에 반응하는 <span class='highlight'>실시간 피드백</span> 시스템을 구축합니다.","스크롤 위치와 요소의 가시성을 연동하는 <span class='highlight'>고급 인터랙션</span>을 마스터합니다.","개별 인터랙션들을 조합하여 <span class='highlight'>상용 수준의 기능형 페이지</span>를 설계해봅니다."]},{"type":"code","title":"[Ex 1] 광클 방지 버튼 (구조/디자인)","desc":"애니메이션이 대기열에 쌓여 무한히 반복되는 현상을 막아봅니다.","code":"<style>\n  .moving-box { \n    width: 100px; height: 100px; background: #38bdf8; \n    border-radius: 12px; margin-bottom: 20px; \n  }\n</style>\n\n<div class=\"moving-box\"></div>\n<button id=\"anim-btn\">이동하기 (광클 테스트)</button>","answer":"설명: 버튼을 여러 번 연타해도 박스가 엉뚱한 곳으로 가지 않게 제어할 예정입니다."},{"type":"code","title":"[Ex 1] 광클 방지 버튼 (로직)","desc":".stop()을 사용하여 현재 동작을 즉시 초기화합니다.","code":"<script>\n  $(\"#anim-btn\").click(function() {\n      // .stop()을 넣으면 새로운 클릭 시 이전 동작을 중단하고 즉시 새로 시작\n      $(\".moving-box\").stop().animate({\n          marginLeft: \"+=50px\"\n      }, 300);\n  });\n<\/script>","answer":"핵심: 모든 jQuery 애니메이션 메서드 직전에 .stop()을 붙이는 것은 실무 공식입니다."},{"type":"code","title":"[Ex 2] 카드 UI 부드러운 호버 (구조/디자인)","desc":"마우스가 올라갔을 때 정보가 나타나는 세련된 카드입니다.","code":"<style>\n  .card { width: 300px; height: 400px; overflow: hidden; position: relative; border-radius: 20px; background: #334155; }\n  .card-img { width: 100%; height: 100%; background: #475569; transition: 0.6s; }\n  .card-info { \n    position: absolute; bottom: -120px; left: 0; width: 100%; height: 120px;\n    background: rgba(0,0,0,0.85); padding: 20px; box-sizing: border-box;\n  }\n</style>\n\n<div class=\"card\">\n  <div class=\"card-img\"></div>\n  <div class=\"card-info\"><h4>상품 상세 제목</h4><p>간단한 설명입니다.</p></div>\n</div>","answer":"설명: CSS transition과 jQuery의 정교한 타이밍을 결합합니다."},{"type":"code","title":"[Ex 2] 카드 UI 부드러운 호버 (로직)","desc":"mouseenter와 mouseleave를 정교하게 제어합니다.","code":"<script>\n  $(\".card\").on(\"mouseenter\", function() {\n      // 이미지 확대(CSS) 및 정보창 위로 슬라이딩(JS)\n      $(this).find(\".card-img\").css(\"transform\", \"scale(1.1)\");\n      $(this).find(\".card-info\").stop().animate({ bottom: 0 }, 400);\n  });\n\n  $(\".card\").on(\"mouseleave\", function() {\n      // 원상 복구 시에도 stop()으로 튕김 현상 방지\n      $(this).find(\".card-img\").css(\"transform\", \"scale(1.0)\");\n      $(this).find(\".card-info\").stop().animate({ bottom: \"-120px\" }, 400);\n  });\n<\/script>","answer":"팁: 호버 영역을 벗어날 때 애니메이션이 도중에 끊겨도 .stop() 덕분에 자연스럽게 처리됩니다."},{"type":"code","title":"[Ex 3] 스마트 스크롤 버튼 (구조/디자인)","desc":"스크롤 위치에 따라 나타나고 사라지는 TOP 버튼입니다.","code":"<style>\n  #top-btn { \n    position: fixed; bottom: 40px; right: 40px; \n    width: 60px; height: 60px; background: #fbbf24; border: none;\n    display: none; border-radius: 50%; cursor: pointer; font-weight: bold;\n  }\n</style>\n\n<div style=\"height: 3000px; padding: 20px;\">스크롤을 아주 많이 내려보세요...</div>\n<button id=\"top-btn\">TOP</button>","answer":"설명: position: fixed로 화면에 고정시키고 처음에 숨겨둡니다."},{"type":"code","title":"[Ex 3] 스마트 스크롤 버튼 (로직)","desc":"실시간 스크롤 감지 이벤트를 활용합니다.","code":"<script>\n  $(window).scroll(function() {\n      // 현재 스크롤바가 위에서부터 500px 이상 내려왔을 때\n      if ($(this).scrollTop() > 500) {\n          $(\"#top-btn\").stop().fadeIn(200);\n      } else {\n          $(\"#top-btn\").stop().fadeOut(200);\n      }\n  });\n\n  $(\"#top-btn\").click(function() {\n      // html과 body 전체를 스크롤 최상단으로 애니메이션 이동\n      $(\"html, body\").stop().animate({ scrollTop: 0 }, 600);\n  });\n<\/script>","answer":"실무: 윈도우 스크롤 이벤트는 성능을 위해 .stop() 처리가 필수적입니다."},{"type":"code","title":"[Ex 4] 실시간 입력 피드백 (구조/디자인)","desc":"사용자가 타이핑하는 즉시 상태를 알려주는 UI입니다.","code":"<style>\n  #pw-input { padding: 12px; width: 250px; border: 2px solid #ccc; border-radius: 8px; outline: none; }\n  #msg { font-size: 0.9rem; margin-top: 8px; font-weight: 600; }\n</style>\n\n<input type=\"password\" id=\"pw-input\" placeholder=\"비밀번호 8자 이상\">\n<p id=\"msg\">비밀번호를 입력해주세요.</p>","answer":"설명: input 이벤트를 통해 실시간으로 클래스나 스타일을 변경할 준비를 합니다."},{"type":"code","title":"[Ex 4] 실시간 입력 피드백 (로직)","desc":"값의 길이에 따라 시각적 경고/승인을 제공합니다.","code":"<script>\n  $(\"#pw-input\").on(\"input\", function() {\n      const currentVal = $(this).val();\n      \n      if (currentVal.length >= 8) {\n          $(this).css(\"border-color\", \"#4ade80\");\n          $(\"#msg\").text(\"사용 가능한 비밀번호입니다.\").css(\"color\", \"#4ade80\");\n      } else {\n          $(this).css(\"border-color\", \"#f87171\");\n          $(\"#msg\").text(\"최소 8자 이상 입력이 필요합니다.\").css(\"color\", \"#f87171\");\n      }\n  });\n<\/script>","answer":"특징: '완료' 버튼을 누르기 전 미리 소통하는 것이 인터랙션의 핵심입니다."},{"type":"code","title":"[Ex 5] 활성 도트 인디케이터 (구조/디자인)","desc":"현재 선택된 위치를 점으로 표현하는 내비게이션입니다.","code":"<style>\n  .dot-wrap { display: flex; gap: 12px; }\n  .dot { width: 16px; height: 16px; border: 2px solid #38bdf8; border-radius: 50%; cursor: pointer; transition: 0.3s; }\n  .dot.active { background: #38bdf8; width: 40px; border-radius: 10px; } /* 선택된 점은 길게 변함 */\n</style>\n\n<div class=\"dot-wrap\">\n  <div class=\"dot active\"></div>\n  <div class=\"dot\"></div>\n  <div class=\"dot\"></div>\n</div>","answer":"설명: .active 클래스 하나만으로 형태가 변하는 CSS 설계를 먼저 확인하세요."},{"type":"code","title":"[Ex 5] 활성 도트 인디케이터 (로직)","desc":"선택적 활성화 로직을 한 줄로 끝내봅니다.","code":"<script>\n  $(\".dot\").click(function() {\n      // 1. 모든 도트에서 active를 제거하여 초기화\n      $(\".dot\").removeClass(\"active\");\n      \n      // 2. 방금 클릭한 도트(this)에만 active 추가\n      $(this).addClass(\"active\");\n      \n      // 3. (심화) 몇 번째 점인지 확인하여 로그 출력\n      console.log(($(this).index() + 1) + \"번 페이지 활성화\");\n  });\n<\/script>","answer":"핵심: '나 제외 남들 제거' 패턴은 모든 UI 활성화 로직의 기본입니다."},{"type":"content","title":"2교시. 실무형 인터랙션: 조각들을 하나로","items":["지금까지 배운 5개의 예제는 모두 웹 서비스의 '부품'들입니다.","이제 이 부품들을 유기적으로 결합하여 <span class='accent'>실제 사용자 페이지</span>의 흐름을 만들어봅니다.","<b>Case 1:</b> 쇼핑몰 상품 상세 (아코디언 + 모달 + 위시리스트)","<b>Case 2:</b> 관리자 대시보드 (사이드바 + 배타적 서브메뉴)"]},{"type":"code","title":"쇼핑몰 상세 페이지 (구조/디자인)","desc":"여러 기능이 결합된 종합 UI 구조입니다.","code":"<style>\n  .product-info { width: 350px; background: #fff; padding: 20px; color: #333; border-radius: 12px; }\n  .detail-q { padding: 15px 0; border-bottom: 1px solid #eee; cursor: pointer; font-weight: bold; }\n  .detail-a { display: none; padding: 15px; background: #f9f9f9; font-size: 0.9rem; }\n  .btn-wish { border: none; background: none; font-size: 24px; color: #ccc; cursor: pointer; }\n  .btn-wish.active { color: #f87171; }\n</style>\n\n<div class=\"product-info\">\n  <h2>프리미엄 기계식 키보드</h2>\n  <button class=\"btn-wish\">♥</button>\n  \n  <div class=\"accordion-box\">\n    <div class=\"detail-q\">상품 상세 스펙</div>\n    <div class=\"detail-a\">축: 저소음 적축 / 연결: C-Type 유선</div>\n    <div class=\"detail-q\">배송 및 환불 안내</div>\n    <div class=\"detail-a\">결제 후 2일 이내 출고됩니다.</div>\n  </div>\n  \n  <button id=\"buy-now\" style=\"width:100%; padding:15px; margin-top:20px; background:#38bdf8; color:#fff; border:none; border-radius:8px;\">구매하기</button>\n</div>","answer":"설명: 아코디언과 상태 토글 버튼이 공존하는 현실적인 쇼핑몰 구조입니다."},{"type":"code","title":"쇼핑몰 상세 페이지 (통합 로직)","desc":"사용자의 다양한 행동을 한 번에 처리합니다.","code":"<script>\n  // 1. 상세정보 아코디언 제어\n  $(\".detail-q\").click(function(){\n      $(this).next(\".detail-a\").stop().slideToggle(300);\n      $(this).parent().siblings().find(\".detail-a\").stop().slideUp(300);\n  });\n\n  // 2. 찜하기 하트 토글\n  $(\".btn-wish\").click(function(){\n      $(this).toggleClass(\"active\");\n  });\n\n  // 3. 구매 모달 (앞선 차시 복습)\n  $(\"#buy-now\").click(function(){\n      alert(\"로그인이 필요한 서비스입니다. (모달 연동 포인트)\");\n  });\n<\/script>","answer":"분석: 개별적으로 배운 로직들이 한 페이지 안에서 서로 방해하지 않고 조화롭게 돌아갑니다."},{"type":"code","title":"대시보드 사이드바 (구조/디자인)","desc":"기업용 솔루션의 고정 사이드바 메뉴 구조입니다.","code":"<style>\n  .admin-sidebar { width: 240px; height: 100vh; background: #1e293b; color: #fff; padding-top: 20px; }\n  .main-menu { padding: 15px 20px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; }\n  .main-menu:hover { background: #334155; }\n  .main-menu.active { background: #0f172a; border-left-color: #38bdf8; color: #38bdf8; }\n  .sub-menu { display: none; background: #0f172a; padding-left: 30px; }\n  .sub-item { padding: 10px 0; color: #94a3b8; font-size: 0.9rem; cursor: pointer; }\n</style>\n\n<div class=\"admin-sidebar\">\n  <div class=\"main-menu\">사용자 관리</div>\n  <div class=\"sub-menu\">\n    <div class=\"sub-item\">전체 회원</div><div class=\"sub-item\">탈퇴 회원</div>\n  </div>\n  <div class=\"main-menu\">콘텐츠 관리</div>\n  <div class=\"sub-menu\">\n    <div class=\"sub-item\">게시글 목록</div><div class=\"sub-item\">댓글 관리</div>\n  </div>\n</div>","answer":"설명: 메뉴가 선택되었을 때 좌측 바가 생기는 active 상태를 눈여겨보세요."},{"type":"code","title":"대시보드 사이드바 (로직)","desc":"배타적 로직을 활용한 부드러운 메뉴 이동입니다.","code":"<script>\n  $(\".main-menu\").click(function() {\n      // 1. 나 제외 다른 메뉴들의 활성 표시 제거 및 서브메뉴 닫기\n      $(\".main-menu\").not(this).removeClass(\"active\");\n      $(\".sub-menu\").not($(this).next()).stop().slideUp(200);\n\n      // 2. 현재 선택한 메뉴 활성화 및 서브메뉴 토글\n      $(this).toggleClass(\"active\");\n      $(this).next(\".sub-menu\").stop().slideToggle(200);\n  });\n<\/script>","answer":"정답: .not(this)를 활용해 대상을 정밀하게 압축하는 것이 전문가의 팁입니다."},{"type":"content","title":"📝 14차시 최종 요약","items":["<b>애니메이션 방어:</b> <code>.stop()</code>은 사용자 경험(UX)을 결정짓는 최후의 보루다.","<b>시각적 보상:</b> 모든 입력과 클릭에는 색상, 크기, 위치의 변화로 '응답'해야 한다.","<b>상태 분리:</b> 디자인은 CSS 클래스에, 상태 판단은 JS 변수와 메서드에 맡겨라.","<b>실무 설계:</b> 개별 기능을 '부품'화하고, 페이지 시나리오에 맞춰 조립하라."]},{"type":"title","title":"4주차 인터랙션 마스터! 🏆","subtitle":"<span class='highlight'>이제 여러분은 단순한 웹 개발자를 넘어 '사용자 경험 설계자'입니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 4주차 종합 프로젝트 - 인터랙티브 포트폴리오 사이트 완성</span>"}],"bonus3-4-14":[{"type":"title","title":"JavaScript 입문: 4주차 14차시","subtitle":"<span class='highlight' style='font-size:2rem;'>jQuery 통합 프로젝트: 스마트 대시보드</span><br><br><span style='color:#64748b; font-size:1.1rem;'>지금까지 배운 모든 기술을 하나의 완성된 웹 서비스로 조립합니다.</span>"},{"type":"content","title":"🎯 프로젝트 핵심 목표","items":["기능 단위의 코드를 조립하여 <span class='highlight'>완성형 페이지</span>를 구축합니다.","사용자 경험(UX)을 극대화하는 <span class='highlight'>스크롤 잠금</span>과 <span class='highlight'>전파 차단</span> 기술을 실습합니다.","실시간 <span class='highlight'>폼 검증</span>과 <span class='highlight'>Ajax 데이터 통신</span>을 구현합니다.","상호 배타적 논리를 활용한 <span class='highlight'>지능형 아코디언</span> 시스템을 완성합니다."]},{"type":"code","title":"[Structure 1] 헤더 및 히어로 섹션","desc":"페이지의 첫인상을 결정하는 상단 구조입니다.","code":"<!-- 외부 라이브러리 및 스타일 연결 -->\n<script src=\"https://code.jquery.com/jquery-3.7.1.min.js\"><\/script>\n<link rel=\"stylesheet\" href=\"style.css\">\n\n<header>\n    <h1>Dashboard</h1>\n    <nav>\n        <ul class=\"nav-list\">\n            <li><a href=\"#features\">기능</a></li>\n            <li><a href=\"#table\">데이터</a></li>\n            <li><a href=\"#form\">연락처</a></li>\n        </ul>\n    </nav>\n</header>\n\n<section class=\"hero\">\n    <h2>jQuery 통합 프로젝트</h2>\n    <p>한 줄의 코드로 만드는 인터랙티브 웹</p>\n    <button id=\"modalBtn\">공지 확인</button>\n</section>","answer":"핵심: 시맨틱 태그(header, nav)를 사용해 구조적 의미를 부여합니다."},{"type":"code","title":"[Structure 2] 기능 그리드 및 카드","desc":"주요 인터랙션 요소들이 배치되는 핵심 본문입니다.","code":"<section id=\"features\" class=\"grid-container\">\n    <!-- 카운터 박스 -->\n    <article class=\"card\">\n        <h3>실시간 카운터</h3>\n        <span id=\"countNum\">0</span>\n        <button id=\"addBtn\">+ 1 증가</button>\n    </article>\n\n    <!-- Ajax 데이터 리스트 -->\n    <article class=\"card\">\n        <h3>Ajax 데이터 로드</h3>\n        <button id=\"fetchBtn\">뉴스 가져오기</button>\n        <ul id=\"newsList\"></ul>\n    </article>\n\n    <!-- FAQ 아코디언 -->\n    <article class=\"card\">\n        <h3>FAQ 아코디언</h3>\n        <div class=\"acc-item\">\n            <div class=\"acc-title\">jQuery 장점?</div>\n            <div class=\"acc-content\">코드가 간결하고 생산성이 높습니다.</div>\n        </div>\n    </article>\n</section>","answer":"핵심: Grid 레이아웃을 위해 article 태그들을 container로 감쌉니다."},{"type":"code","title":"[Style 1] 스크롤 잠금 및 기본 레이아웃","desc":"모달 실행 시 필수적인 '스크롤 방어' 스타일입니다.","code":"<style>\n  /* [필수] 모달 오픈 시 뒷배경 스크롤 방지용 클래스 */\n  body.no-scroll {\n    overflow: hidden !important; /* 스크롤바 숨김 */\n    touch-action: none;         /* 모바일 터치 스크롤 차단 */\n  }\n\n  /* 헤더 고정 정렬 */\n  header {\n    display: flex; \n    justify-content: space-between; \n    align-items: center;\n    position: sticky; top: 0; z-index: 100;\n  }\n\n  /* 3열 그리드 시스템 */\n  .grid-container {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));\n    gap: 20px;\n  }\n</style>","answer":"팁: .no-scroll 클래스는 나중에 JS에서 addClass로 부여합니다."},{"type":"code","title":"[Style 2] 모달 및 컴포넌트 디자인","desc":"화면 정중앙 배치와 레이어 순서를 정의합니다.","code":"<style>\n  /* 화면 전체를 덮는 반투명 배경 */\n  .modal-overlay {\n    position: fixed; top: 0; left: 0; \n    width: 100%; height: 100%;\n    background: rgba(0,0,0,0.8);\n    display: none; /* 초기 상태 숨김 */\n    justify-content: center; align-items: center;\n    z-index: 9999;\n  }\n\n  /* 중앙 팝업 박스 */\n  .modal-window {\n    background: #fff; padding: 40px; \n    border-radius: 20px; text-align: center;\n  }\n\n  /* 아코디언 답변 초기 숨김 */\n  .acc-content { display: none; padding: 15px; }\n</style>","answer":"핵심: z-index는 모달이 항상 최상위에 오도록 높은 값을 줍니다."},{"type":"code","title":"[Logic 1] 카운터 및 모달 제어","desc":"기본적인 클릭 이벤트와 스타일 조작입니다.","code":"<script>\n$(document).ready(function() {\n    // 1. 카운터: 숫자 증가 및 색상 변경\n    let count = 0;\n    $(\"#addBtn\").on(\"click\", function() {\n        count++;\n        $(\"#countNum\").text(count)\n                     .css(\"color\", count % 2 === 0 ? \"#38bdf8\" : \"#f87171\");\n    });\n\n    // 2. 모달 열기: fadeIn 및 스크롤 잠금\n    $(\"#modalBtn\").click(function() {\n        $(\"#modal\").fadeIn().css(\"display\", \"flex\");\n        $(\"body\").addClass(\"no-scroll\"); // 바디 스크롤 차단\n    });\n});\n<\/script>","answer":"설명: .css('display', 'flex')는 fadeIn 후에도 중앙 정렬을 유지하기 위함입니다."},{"type":"code","title":"[Logic 2] 전파 차단 및 닫기","desc":"버블링 현상을 막아 정교한 모달을 완성합니다.","code":"<script>\n    // 3. 모달 닫기\n    $(\"#closeModal, .modal-overlay\").click(function() {\n        $(\"#modal\").fadeOut();\n        $(\"body\").removeClass(\"no-scroll\"); // 스크롤 차단 해제\n    });\n\n    // 4. [중요] 전파 차단: 본문 클릭 시 배경 이벤트 실행 방지\n    $(\".modal-window\").click(function(e) {\n        e.stopPropagation(); // 배경(부모)으로의 신호 전달을 끊음\n    });\n<\/script>","answer":"진단: 전파 차단이 없다면 팝업 본문을 클릭해도 창이 닫혀버립니다."},{"type":"code","title":"[Logic 3] 실시간 검증 및 Ajax 통신","desc":"사용자 입력 반응과 서버 데이터 처리입니다.","code":"<script>\n    // 5. 비밀번호 실시간 유효성 체크\n    $(\"#pwInput\").on(\"input\", function() {\n        const val = $(this).val();\n        if (val.length >= 8) {\n            $(\"#pwMsg\").text(\"안전합니다.\").css(\"color\", \"#4ade80\");\n        } else {\n            $(\"#pwMsg\").text(\"8자 이상 입력하세요.\").css(\"color\", \"#f87171\");\n        }\n    });\n\n    // 6. Ajax 데이터 로드 (외부 JSON 예시)\n    $(\"#fetchBtn\").click(function() {\n        $.ajax({\n            url: \"https://jsonplaceholder.typicode.com/posts?_limit=3\",\n            method: \"GET\",\n            success: function(data) {\n                $(\"#newsList\").empty(); // 이전 목록 초기화\n                data.forEach(item => {\n                    $(\"#newsList\").append(`<li>${item.title}</li>`);\n                });\n            }\n        });\n    });\n<\/script>","answer":"특징: Ajax는 페이지 새로고침 없이 데이터만 쏙 가져오는 강력한 도구입니다."},{"type":"code","title":"[Logic 4] 배타적 아코디언 및 폼 방어","desc":"다른 요소를 지배하는 로직과 기본 동작 제어입니다.","code":"<script>\n    // 7. 아코디언: 하나가 열리면 남은 닫히는 배타적 로직\n    $(\".acc-title\").click(function() {\n        // 나를 제외한(.not) 다른 답변들을 먼저 닫음\n        $(\".acc-content\").not($(this).next()).slideUp();\n        \n        // 내 답변만 부드럽게 토글\n        $(this).next(\".acc-content\").stop().slideToggle();\n    });\n\n    // 8. 폼 제출 방어: 필수 동의 체크\n    $(\"#mainForm\").submit(function(e) {\n        e.preventDefault(); // 페이지 새로고침(전송) 강제 중단\n        if (!$(\"#agree\").is(\":checked\")) {\n            alert(\"약관 동의가 필요합니다!\");\n        } else {\n            alert(\"성공적으로 제출되었습니다!\");\n        }\n    });\n<\/script>","answer":"핵심: .not()과 preventDefault()는 실제 웹 서비스의 필수 스킬입니다."},{"type":"content","title":"📝 통합 프로젝트 최종 점검","items":["<b>구조(HTML):</b> 시맨틱 태그로 정보의 의미를 담았는가?","<b>디자인(CSS):</b> Flex/Grid와 스크롤 잠금 상태를 완벽히 이해했는가?","<b>기능(jQuery):</b> 이벤트 전파와 비동기 통신의 흐름을 제어할 수 있는가?","<b>UX:</b> 사용자의 실수(광클, 미동의 제출)를 코드가 방어하고 있는가?"]},{"type":"title","title":"모든 과정을 완수하셨습니다! 🏆","subtitle":"<span class='highlight'>이제 여러분은 기획자의 아이디어를 코드로 실현할 수 있는 개발자입니다.</span><br><br><span style='color:#777;'>지금까지 만든 조각들을 모아 여러분만의 멋진 포트폴리오를 완성하세요!</span>"}],"bonus1":[{"type":"code","title":"Level 1: 울타리 안과 밖","desc":"A와 B에 출력될 값은 각각 무엇일까요?","code":"let box = \"사과\";\n{\n    let box = \"포도\";\n    console.log(\"A:\", box);\n}\nconsole.log(\"B:\", box);","answer":"정답: A: 포도, B: 사과\n💡 중괄호 { } 블록 내부에서 선언된 변수는 외부의 변수와 이름이 같더라도 별개의 존재입니다. 이를 '변수 가려짐(Shadowing)'이라고 부릅니다."},{"type":"code","title":"Level 2: 중첩된 울타리","desc":"이 코드는 에러가 날까요, 아니면 값이 출력될까요?","code":"const gold = \"100개\";\n{\n    {\n        console.log(\"결과:\", gold);\n    }\n}","answer":"정답: 결과: 100개\n💡 안쪽 블록에서는 바깥쪽(전역 포함)에서 선언된 변수를 자유롭게 참조할 수 있습니다. 밖에서 안으로는 못 보지만, 안에서 밖으로는 보입니다!"},{"type":"code","title":"Level 3: 재할당의 함정","desc":"최종적으로 출력되는 두 값은 무엇일까요?","code":"let score = 10;\n{\n    score = 20; \n    let bonus = 5;\n}\nconsole.log(score);\nconsole.log(bonus);","answer":"정답: 20, 그리고 에러(ReferenceError) 발생\n💡 score는 밖에서 선언되었으므로 안에서 수정(재할당)이 가능합니다. 하지만 bonus는 블록 안에서 선언되었으므로 밖으로 나오는 순간 소멸합니다."},{"type":"code","title":"Level 4: 상수(const)의 스코프","desc":"위에서부터 순서대로 출력될 3개의 알파벳은?","code":"const target = \"A\";\n{\n    const target = \"B\";\n    {\n        const target = \"C\";\n        console.log(target);\n    }\n    console.log(target);\n}\nconsole.log(target);","answer":"정답: C -> B -> A\n💡 자바스크립트는 현재 위치에서 가장 가까운 울타리(스코프)부터 변수를 찾습니다. 가장 안쪽은 C, 중간은 B, 전역은 A를 가지고 있습니다."}],"bonus2":[{"type":"title","title":"JavaScript 입문: 1주차 2.5차시","subtitle":"<span class='highlight' style='font-size:2rem;'>연산자 심화 응용</span><br><br><span style='color:#888; font-size:1.1rem;'>단순 계산을 넘어 논리를 설계하는 법<br>실습 문제 & 해설 모드</span>"},{"type":"content","title":"🎯 심화 학습 목표","items":["나머지 연산자(%)를 활용한 <span class='highlight'>데이터 순환(Cycle)</span> 로직 구현","논리 연산자의 <span class='highlight'>단축 평가(Short-circuit)</span>를 이용한 효율적 코드 작성","복합적인 조건을 한 줄의 논리로 정리하는 <span class='highlight'>우선순위 설계</span>","실제 프론트엔드 UI 상태 제어에 연산자 적용하기"]},{"type":"code","isQuiz":true,"title":"[심화 실습 1] 무한 반복 슬라이더","desc":"슬라이드 번호가 0, 1, 2를 무한히 반복하도록 빈칸을 채우세요.","code":"let currentIndex = 2; // 현재 마지막 슬라이드 (3번째)\nconst totalSlides = 3;\n\n// '다음' 버튼을 클릭했을 때 인덱스 계산\ncurrentIndex = (currentIndex + 1) [     ] totalSlides;\n\nconsole.log(\"다음 슬라이드 번호:\", currentIndex); // 결과는 0이 나와야 함","answer":""},{"type":"code","isQuiz":false,"title":"[해설 1] 무한 반복 슬라이더","desc":"나머지 연산자를 이용하면 숫자의 범위를 고정할 수 있습니다.","code":"let currentIndex = 2;\nconst totalSlides = 3;\n\ncurrentIndex = (currentIndex + 1) % totalSlides; // 3 % 3 = 0\n\nconsole.log(\"다음 슬라이드 번호:\", currentIndex);","answer":"정답: % (설명: 나머지가 0이 됨으로써 다시 처음으로 돌아가는 '순환' 구조가 완성됩니다.)"},{"type":"code","isQuiz":true,"title":"[심화 실습 2] 사용자 기본값 설정","desc":"닉네임이 있으면 닉네임을, 없으면 '익명'을 출력하는 단축 평가 논리를 완성하세요.","code":"let inputNickname = \"\"; // 사용자가 입력을 안 한 상태\n\n// nickname이 빈 문자열(false)이면 \"익명\"이 저장되도록 하세요.\nlet displayName = inputNickname [    ] \"익명\";\n\nconsole.log(\"환영합니다, \", displayName, \"님!\");","answer":""},{"type":"code","isQuiz":false,"title":"[해설 2] 사용자 기본값 설정","desc":"OR(||) 연산자는 왼쪽이 거짓일 때 오른쪽 값을 선택합니다.","code":"let inputNickname = \"\"; \n\nlet displayName = inputNickname || \"익명\";\n\nconsole.log(\"환영합니다, \", displayName, \"님!\");","answer":"정답: || (OR 연산자. 앞의 값이 빈 문자열 즉, false일 때만 뒤의 값을 선택합니다.)"},{"type":"code","isQuiz":true,"title":"[심화 실습 3] 프리미엄 콘텐츠 접근 권한","desc":"로그인 상태이면서 (유료 회원 '또는' 관리자)인 경우만 true가 나오게 하세요.","code":"let isLoggedIn = true;\nlet isPremium = false;\nlet isAdmin = true;\n\n// 로그인 필수, 그리고 (프리미엄 혹은 관리자) 여야 함\nlet canAccess = isLoggedIn && ( [             ] );\n\nconsole.log(\"콘텐츠 접근 가능:\", canAccess);","answer":""},{"type":"code","isQuiz":false,"title":"[해설 3] 프리미엄 콘텐츠 접근 권한","desc":"&&와 ||를 함께 쓸 때는 괄호로 묶어 우선순위를 정하는 것이 안전합니다.","code":"let isLoggedIn = true;\nlet isPremium = false;\nlet isAdmin = true;\n\nlet canAccess = isLoggedIn && (isPremium || isAdmin);\n\nconsole.log(\"콘텐츠 접근 가능:\", canAccess);","answer":"정답: isPremium || isAdmin (설명: 괄호로 OR 조건을 먼저 묶어주는 것이 핵심입니다.)"},{"type":"code","isQuiz":true,"title":"[심화 실습 4] 이벤트 쿠폰 발급 논리","desc":"신규 가입자이거나, 기존 회원이면서 미사용 쿠폰이 있는 경우를 판별하세요.","code":"let isNewUser = false;\nlet isMember = true;\nlet hasCoupon = true;\n\n// 논리: 신규회원이거나 (기존회원이면서 쿠폰보유)\nlet isEligible = isNewUser [    ] (isMember [    ] hasCoupon);\n\nconsole.log(\"쿠폰 발급 대상자:\", isEligible);","answer":""},{"type":"code","isQuiz":false,"title":"[해설 4] 이벤트 쿠폰 발급 논리","desc":"비즈니스 로직을 인간의 언어에서 코드로 번역하는 연습이 필요합니다.","code":"let isNewUser = false;\nlet isMember = true;\nlet hasCoupon = true;\n\nlet isEligible = isNewUser || (isMember && hasCoupon);\n\nconsole.log(\"쿠폰 발급 대상자:\", isEligible);","answer":"정답: || / && (OR와 AND의 적절한 조합)"},{"type":"content","title":"📝 심화 요약","items":["<b>나머지 연산자(%):</b> 범위를 제한하거나 순환하는 로직에 활용","<b>단축 평가:</b> <code>||</code>를 이용한 기본값 설정, <code>&&</code>를 이용한 조건부 실행","<b>복합 논리:</b> 괄호<code>()</code>를 적극 사용하여 연산 우선순위를 명확히 규정","코드가 짧은 것보다 <b>'의도가 명확한'</b> 논리를 짜는 것이 실무에서 더 중요합니다."]},{"type":"title","title":"심화 과정 종료! 🏆","subtitle":"축하합니다! 이제 연산자로 복잡한 논리를 설계할 수 있습니다.<br><br><span style='color:#777;'>다음 시간: 조건문(if)을 통해 이 논리들을 실제 프로그램 흐름으로 바꿉니다.</span>"}],"bonus3":[{"type":"raw","html":"<header>\r\n        <h1>🚀 JS 조건문 실무 트레이닝</h1>\r\n        <p class=\"subtitle\">빈칸 채우기는 끝! 이제 백지에 직접 로직을 설계해 봅시다.</p>\r\n    </header>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\">Level 1</span>\r\n            <h2>1. 스마트 에어컨 제어 시스템</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"실내 온도가 너무 높으면 에어컨을 켜고, 적당하면 끄는 자동화 로직을 만듭니다.\"\r\n        </div>\r\n        <ul>\r\n            <li><code>currentTemp</code> 변수를 선언하고 숫자 30을 할당하세요.</li>\r\n            <li>온도가 <b>28도 이상</b>이면 <span class=\"accent\">\"에어컨을 가동합니다.\"</span>를 출력합니다.</li>\r\n            <li>그렇지 않으면 <span class=\"accent\">\"쾌적한 온도입니다.\"</span>를 출력하세요.</li>\r\n        </ul>\r\n        <div class=\"code-area\">// 이곳에 코드를 작성해 보세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>let currentTemp = 30;\r\n\r\nif (currentTemp >= 28) {\r\n    console.log(\"에어컨을 가동합니다.\");\r\n} else {\r\n    console.log(\"쾌적한 온도입니다.\");\r\n}</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\" style=\"background: #facc15;\">Level 2</span>\r\n            <h2>2. 버스 요금 계산기</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"나이에 따라 달라지는 버스 요금 체계를 구현합니다.\"\r\n        </div>\r\n        <ul>\r\n            <li><code>age</code> 변수에 학생의 나이를 넣습니다.</li>\r\n            <li><b>20세 이상:</b> \"성인: 1,500원\"</li>\r\n            <li><b>14세 ~ 19세:</b> \"청소년: 1,000원\"</li>\r\n            <li><b>8세 ~ 13세:</b> \"어린이: 500원\"</li>\r\n            <li><b>7세 이하:</b> \"미취학 아동: 무료\"</li>\r\n        </ul>\r\n        <div class=\"code-area\">// else if 문을 사용하여 계단식 조건을 만드세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>let age = 16;\r\n\r\nif (age >= 20) {\r\n    console.log(\"성인: 1,500원\");\r\n} else if (age >= 14) {\r\n    console.log(\"청소년: 1,000원\");\r\n} else if (age >= 8) {\r\n    console.log(\"어린이: 500원\");\r\n} else {\r\n    console.log(\"미취학 아동: 무료\");\r\n}</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\" style=\"background: #f87171;\">Level 3</span>\r\n            <h2>3. 특별 할인 쿠폰 발급 로직</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"로그인 상태를 먼저 확인하고, 조건에 맞는 우수 회원에게만 혜택을 줍니다.\"\r\n        </div>\r\n        <ul>\r\n            <li><code>isLoggedIn</code>(true/false), <code>purchaseAmount</code>(숫자), <code>isVip</code>(true/false) 변수를 각각 선언하세요.</li>\r\n            <li><b>1단계:</b> 로그인이 안 되어 있으면 \"로그인이 필요합니다.\"를 출력합니다.</li>\r\n            <li><b>2단계:</b> 로그인된 경우, 구매 금액이 <b>50,000원 이상</b>이거나 <b>VIP</b>라면 \"쿠폰 발급!\"을 출력합니다.</li>\r\n            <li><b>3단계:</b> 둘 다 해당 안 되면 \"대상자가 아닙니다.\"를 출력합니다.</li>\r\n        </ul>\r\n        <div class=\"code-area\">// 중첩 if문과 논리 연산자(||)를 조합해 보세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>let isLoggedIn = true;\r\nlet purchaseAmount = 45000;\r\nlet isVip = true;\r\n\r\nif (isLoggedIn === true) {\r\n    if (purchaseAmount >= 50000 || isVip === true) {\r\n        console.log(\"특별 할인 쿠폰 발급!\");\r\n    } else {\r\n        console.log(\"대상자가 아닙니다.\");\r\n    }\r\n} else {\r\n    console.log(\"로그인이 필요합니다.\");\r\n}</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <footer style=\"text-align: center; color: #555; margin-top: 2rem;\">\r\n        © 2026 JS 입문 과정 - 조건문 실습 세션\r\n    </footer>"}],"bonus4-1":[{"type":"raw","html":"<header>\r\n        <h1>🔄 JS 반복문 실무 트레이닝</h1>\r\n        <p class=\"subtitle\">단순 반복 업무는 컴퓨터에게! 백지 상태에서 자동화 로직을 설계해 보세요.</p>\r\n    </header>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\">Level 1</span>\r\n            <h2>1. 배수 콜렉터 (for)</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"1부터 30까지의 숫자 중에서 3의 배수만 골라내는 자동화 로직을 작성합니다.\"\r\n        </div>\r\n        <ul>\r\n            <li><code>for</code> 반복문을 사용하여 1부터 30까지 숫자를 순회하세요.</li>\r\n            <li>숫자가 **3의 배수일 때만** 콘솔에 해당 숫자를 출력합니다.</li>\r\n            <li>나머지 연산자(%)를 활용해 조건문을 구성해 보세요.</li>\r\n        </ul>\r\n        <div class=\"code-area\">// for 문과 if 문을 조합하여 작성해 보세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>for (let i = 1; i <= 30; i++) {\r\n    if (i % 3 === 0) {\r\n        console.log(i);\r\n    }\r\n}</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\" style=\"background: #facc15;\">Level 2</span>\r\n            <h2>2. 홀수 필터링 합계 (continue)</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"1부터 15까지의 숫자 중 홀수만 더하되, 특정 숫자(7)는 제외하고 합산합니다.\"\r\n        </div>\r\n        <ul>\r\n            <li>합계를 저장할 <code>total</code> 변수를 0으로 초기화하여 선언하세요.</li>\r\n            <li>숫자가 **7인 경우**에는 <code>continue</code>를 사용하여 합산 과정을 건너뛰세요.</li>\r\n            <li>7을 제외한 나머지 **홀수**들만 <code>total</code>에 누적해서 더하세요.</li>\r\n            <li>마지막에 <code>total</code>의 최종 결과값을 출력하세요.</li>\r\n        </ul>\r\n        <div class=\"code-area\">// continue 키워드를 사용하여 흐름을 제어해 보세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>let total = 0;\r\n\r\nfor (let i = 1; i <= 15; i++) {\r\n    if (i === 7) {\r\n        continue; // 7은 건너뜀\r\n    }\r\n    if (i % 2 !== 0) {\r\n        total += i; // 홀수만 더함\r\n    }\r\n}\r\n\r\nconsole.log(\"최종 합계: \" + total);</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <div class=\"exercise-card\">\r\n        <div class=\"exercise-header\">\r\n            <span class=\"badge\" style=\"background: #f87171;\">Level 3</span>\r\n            <h2>3. 긴급 정지 카운트다운 (while)</h2>\r\n        </div>\r\n        <div class=\"scenario\">\r\n            \"10부터 역순으로 숫자를 출력하다가, 시스템 결함(숫자 3)이 발견되면 즉시 중단합니다.\"\r\n        </div>\r\n        <ul>\r\n            <li><code>while</code> 문을 사용하여 10부터 1까지 숫자를 줄여가며 출력하세요.</li>\r\n            <li>숫자가 **3에 도달하면** \"긴급 정지! 루프를 탈출합니다.\"를 출력하고 <code>break</code>하세요.</li>\r\n            <li>반복문이 안전하게 종료될 수 있도록 변수의 값을 감소시키는 식을 잊지 마세요.</li>\r\n        </ul>\r\n        <div class=\"code-area\">// while 문과 break 키워드를 사용하여 작성해 보세요.</div>\r\n        \r\n        <details>\r\n            <summary>✅ 정답 예시 보기</summary>\r\n            <pre class=\"solution\"><code>let count = 10;\r\n\r\nwhile (count >= 1) {\r\n    if (count === 3) {\r\n        console.log(\"긴급 정지! 루프를 탈출합니다.\");\r\n        break; \r\n    }\r\n    console.log(count);\r\n    count--; // 값 감소 필수\r\n}</code></pre>\r\n        </details>\r\n    </div>\r\n\r\n    <footer style=\"text-align: center; color: #555; margin-top: 2rem;\">\r\n        © 2026 JS 입문 과정 - 반복문 실전 트레이닝\r\n    </footer>"}],"bonus4-2":[{"type":"title","title":"JavaScript 반복문 퀴즈","subtitle":"while문과 for문을 얼마나 이해했는지 확인해봅시다! 💡"},{"type":"content","title":"Q1. 반복 횟수가 명확할 때 주로 사용하는 반복문은?","items":["1) while 문","2) for 문","3) switch 문","4) if 문","<div class=\"practice-box\"><b>정답: 2) for 문</b></div>"]},{"type":"code","title":"Q2. 다음 while문의 실행 결과로 알맞은 것은?","desc":"","code":"let i = 1;\nwhile (i < 3) {\n    console.log(i);\n    i++;\n}","answer":"정답: 1 그리고 2 (i가 3이 되는 순간 조건이 거짓이 됨)"},{"type":"code","title":"Q3. 다음 코드가 출력할 마지막 숫자는?","desc":"","code":"for (let i = 10; i > 0; i -= 2) {\n    console.log(i);\n}","answer":"정답: 2 (10, 8, 6, 4, 2 순으로 감소)"},{"type":"code","title":"Q4. 다음 중 무한 루프에 빠지는 코드는?","desc":"","code":"// A번\nwhile (true) { break; }\n\n// B번\nlet k = 1;\nwhile (k > 0) {\n    console.log(k);\n    k++; \n}","answer":"정답: B번 (k가 계속 증가하므로 항상 0보다 큼)"},{"type":"code","title":"Q5. 'continue' 명령어가 실행되면 어떤 일이 벌어지는가?","desc":"","code":"for (let i = 1; i <= 5; i++) {\n    if (i === 3) continue;\n    console.log(i);\n}","answer":"정답: 현재 차례(i=3)만 건너뛰고 다음 반복(i=4) 진행"},{"type":"code","title":"Q6. 다음 이중 반복문은 총 몇 번 실행될까요?","desc":"","code":"for (let i = 0; i < 2; i++) {\n    for (let j = 0; j < 3; j++) {\n        console.log(\"작업 중...\");\n    }\n}","answer":"정답: 6번 (2 x 3 = 6)"},{"type":"title","title":"퀴즈 종료! 🎉","subtitle":"반복문의 원리를 완벽히 파악하셨나요? <br> 부족한 부분은 요약 노션 페이지에서 다시 확인해보세요!"}]};

const KEY = "js-course-progress", LAST = "js-course-last";
let done = JSON.parse(localStorage.getItem(KEY) || "{}");

/* 컴파일러 바로가기: HTML/CSS/JS 분리 실습(jQuery 차시)은 jsFiddle, 그 외 JS 전용은 Programiz */
const PZ_BTN = { cls:'pz', url:'https://www.programiz.com/javascript/online-compiler/', label:'P', title:'Programiz JS 컴파일러 열기' };
const FIDDLE_BTN = { cls:'jf', url:'https://jsfiddle.net/', label:'jsFiddle', title:'jsFiddle 에디터 열기 (HTML·CSS·JS 분리 입력)' };
const JSFIDDLE = new Set(['web3-3-9','web3-3-10','web3-3-11','web3-3-12','web3-4-13','web3-4-14','bonus3-4-14']);

/* ===================== SYNTAX HIGHLIGHT ===================== */
const KW = new Set(['let','const','var','function','return','if','else','for','while','do','break','continue',
  'switch','case','default','typeof','instanceof','new','delete','in','of','this','class','extends','super',
  'try','catch','finally','throw','void','yield','async','await']);
const BOOL = new Set(['true','false','null','undefined','NaN']);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function highlight(src){
  let out='',i=0,n=src.length;
  const isId=c=>/[A-Za-z0-9_$]/.test(c), isIdStart=c=>/[A-Za-z_$]/.test(c);
  while(i<n){
    const c=src[i];
    if(c==='/'&&src[i+1]==='/'){let j=i;while(j<n&&src[j]!=='\n')j++;out+='<span class="tok-com">'+esc(src.slice(i,j))+'</span>';i=j;continue;}
    if(c==='/'&&src[i+1]==='*'){let j=i+2;while(j<n&&!(src[j]==='*'&&src[j+1]==='/'))j++;j=Math.min(j+2,n);out+='<span class="tok-com">'+esc(src.slice(i,j))+'</span>';i=j;continue;}
    if(c==='"'||c==="'"||c==='`'){const q=c;let j=i+1;while(j<n){if(src[j]==='\\'){j+=2;continue;}if(src[j]===q){j++;break;}j++;}out+='<span class="tok-str">'+esc(src.slice(i,j))+'</span>';i=j;continue;}
    if(/[0-9]/.test(c)||(c==='.'&&/[0-9]/.test(src[i+1]))){let j=i;while(j<n&&/[0-9a-fA-FxX._]/.test(src[j]))j++;out+='<span class="tok-num">'+esc(src.slice(i,j))+'</span>';i=j;continue;}
    if(isIdStart(c)){let j=i;while(j<n&&isId(src[j]))j++;const w=src.slice(i,j);let k=j;while(k<n&&/\s/.test(src[k]))k++;
      let cls=null;
      if(KW.has(w))cls='tok-kw';else if(BOOL.has(w))cls='tok-bool';
      else if(src[k]==='(')cls='tok-fn';else if(src[i-1]==='.')cls='tok-prop';
      out+=cls?('<span class="'+cls+'">'+esc(w)+'</span>'):esc(w);i=j;continue;}
    out+=esc(c);i++;
  }
  return out;
}

/* ===================== HUB ===================== */
function navTo(id){ localStorage.setItem(LAST,id); location.hash = '#lesson/'+encodeURIComponent(id); }

function renderHub(){
  const sections=document.getElementById("hubSections");
  const side=document.getElementById("hubSideNav");
  sections.innerHTML="";side.innerHTML="";
  CURRICULUM.forEach(sec=>{
    const li=document.createElement("li");
    const a=document.createElement("a");
    a.innerHTML=`${sec.name}<span class="cnt">${sec.lessons.length}</span>`;
    a.addEventListener("click",()=>document.getElementById("sec-"+sec.id).scrollIntoView({behavior:"smooth"}));
    li.appendChild(a);side.appendChild(li);

    const el=document.createElement("section");
    el.className="section";el.id="sec-"+sec.id;
    el.innerHTML=`<div class="section-head"><h3>${sec.name}</h3><span class="tag">${sec.tag}</span><span class="line"></span></div><div class="grid"></div>`;
    const grid=el.querySelector(".grid");
    sec.lessons.forEach(ls=>{
      const isDone=!!done[ls.id];
      const card=document.createElement("article");
      card.className="card"+(ls.cls?" "+ls.cls:"")+(isDone?" done":"");
      card.dataset.search=(ls.title+" "+ls.desc+" "+ls.num).toLowerCase();
      card.innerHTML=`<div class="top"><span class="num">${ls.num}</span><div class="check" title="완료 표시">✓</div></div>
        <h4>${ls.title}</h4><p>${ls.desc}</p><div class="foot"><span class="go">강의 열기</span></div>`;
      card.addEventListener("click",()=>navTo(ls.id));
      card.querySelector(".check").addEventListener("click",e=>{
        e.stopPropagation();
        if(done[ls.id])delete done[ls.id];else done[ls.id]=true;
        localStorage.setItem(KEY,JSON.stringify(done));renderHub();
      });
      grid.appendChild(card);
    });
    sections.appendChild(el);
  });
  // stats
  const d=Object.keys(done).filter(k=>ALL.some(l=>l.id===k)).length;
  const pct=ALL.length?Math.round(d/ALL.length*100):0;
  document.getElementById("pbar").style.width=pct+"%";
  document.getElementById("pctTxt").textContent=pct+"%";
  document.getElementById("mTotal").textContent=ALL.length;
  document.getElementById("mDone").textContent=d;
  applySearch();
}
function applySearch(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  let visible=0;
  document.querySelectorAll("#hubView .card").forEach(c=>{
    const hit=!q||c.dataset.search.includes(q);
    c.classList.toggle("filter-hide",!hit);if(hit)visible++;
  });
  document.querySelectorAll("#hubView .section").forEach(s=>{
    const any=[...s.querySelectorAll(".card")].some(c=>!c.classList.contains("filter-hide"));
    s.style.display=any?"":"none";
  });
  document.getElementById("empty").style.display=visible?"none":"block";
}
document.getElementById("search").addEventListener("input",applySearch);
document.getElementById("resetBtn").addEventListener("click",()=>{
  if(confirm("학습 진행 기록을 모두 지울까요?")){done={};localStorage.removeItem(KEY);renderHub();}
});
document.getElementById("resumeBtn").addEventListener("click",()=>{
  const last=localStorage.getItem(LAST);
  navTo(last&&ALL.some(l=>l.id===last)?last:ALL[0].id);
});

/* ===================== LESSON ===================== */
function blockHTML(b){
  if(b.type==='title')
    return `<div class="blk lhero"><h2>${b.title||''}</h2><div class="uline"></div><p>${b.subtitle||''}</p></div>`;
  if(b.type==='content'){
    const lis=(b.items||[]).map(x=>`<li>${x}</li>`).join('');
    return `<div class="blk"><h2>${b.title||''}</h2><ul>${lis}</ul></div>`;
  }
  if(b.type==='code'){
    const ans=b.answer?`<details class="answer"><summary>정답 · 해설 보기</summary><div class="ans">${esc(b.answer)}</div></details>`:'';
    const desc=b.desc?`<p class="desc">${b.desc}</p>`:'';
    return `<div class="blk code">${b.title?`<h2>${b.title}</h2>`:''}${desc}
      <div class="codecard"><div class="cbar"><span class="dots"><i></i><i></i><i></i></span>
        <span class="fname">script.js</span>
        <button class="copy" data-code="${encodeURIComponent(b.code||'')}">복사</button>
        <a class="${CUR_COMPILER.cls}" href="${CUR_COMPILER.url}" target="_blank" rel="noopener" title="${CUR_COMPILER.title}">${CUR_COMPILER.label}</a></div>
        <pre><code>${highlight(b.code||'')}</code></pre></div>${ans}</div>`;
  }
  if(b.type==='raw') return `<div class="blk raw">${b.html||''}</div>`;
  return '';
}
function renderLessonSide(id){
  document.getElementById("lessonSideNav").innerHTML=CURRICULUM.map(sec=>`
    <div class="grp"><div class="gname">${sec.name}</div><ul>${
      sec.lessons.map(l=>`<li><a class="${l.id===id?'active':''} ${done[l.id]?'done':''}" href="#lesson/${encodeURIComponent(l.id)}">
        <span class="n">${l.num}</span><span>${l.title}</span><span class="dot">●</span></a></li>`).join('')
    }</ul></div>`).join('');
}
function renderLesson(id){
  const c=document.getElementById("lessonContent");
  const meta=ALL.find(l=>l.id===id);
  renderLessonSide(id);
  if(!meta){c.innerHTML='<h1>강의를 찾을 수 없습니다.</h1><p><a data-home>목록으로</a></p>';return;}
  localStorage.setItem(LAST,id);
  document.title=`${meta.num} · ${meta.title}`;
  CUR_COMPILER = JSFIDDLE.has(id) ? FIDDLE_BTN : PZ_BTN;
  const blocks=LESSONS[id]||[];
  const idx=ALL.findIndex(l=>l.id===id), prev=ALL[idx-1], next=ALL[idx+1];
  c.innerHTML=`
    <div class="crumb"><a data-home>강의 목록</a> · ${meta.section}</div>
    <div class="l-head"><span class="badge">${meta.num}</span><h1>${meta.title}</h1><div class="sub">${meta.desc||''}</div></div>
    ${blocks.map(blockHTML).join('')}
    <div class="pager">
      ${prev?`<a href="#lesson/${encodeURIComponent(prev.id)}"><div class="dir">← 이전</div><div class="t">${prev.title}</div></a>`
            :`<a class="disabled"><div class="dir">← 이전</div><div class="t">처음 강의입니다</div></a>`}
      ${next?`<a class="next" href="#lesson/${encodeURIComponent(next.id)}"><div class="dir">다음 →</div><div class="t">${next.title}</div></a>`
            :`<a class="next disabled"><div class="dir">다음 →</div><div class="t">마지막 강의입니다</div></a>`}
    </div>`;
  c.querySelectorAll('.copy').forEach(btn=>btn.addEventListener('click',()=>{
    navigator.clipboard.writeText(decodeURIComponent(btn.dataset.code)).then(()=>{
      const t=btn.textContent;btn.textContent='복사됨!';setTimeout(()=>btn.textContent=t,1200);
    });
  }));
}

function route(){
  const m=location.hash.match(/^#lesson\/(.+)$/);
  if(m){
    document.getElementById("hubView").style.display="none";
    document.getElementById("lessonView").style.display="flex";
    renderLesson(decodeURIComponent(m[1]));
    window.scrollTo(0,0);
  }else{
    document.getElementById("lessonView").style.display="none";
    document.getElementById("hubView").style.display="flex";
    document.title="JavaScript 입문 강의";
    renderHub();
  }
}
document.addEventListener("click",e=>{
  const h=e.target.closest("[data-home]");
  if(h){e.preventDefault();location.hash="";}
});
window.addEventListener("hashchange",route);
route();
</script>
