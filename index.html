<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript 입문 강의</title>
<style>
  :root{
    --bg:#121212;--panel:#1e1e1e;--panel2:#252525;--border:#333;
    --text:#e5e7eb;--muted:#9ca3af;--dim:#6b7280;
    --js:#f7df1e;--accent:#4ade80;--blue:#61dafb;--warn:#f87171;--code-bg:#0d0d0d;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Pretendard',system-ui,-apple-system,'Segoe UI','Noto Sans KR',sans-serif;line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  code{font-family:'Fira Code','Consolas',monospace;background:var(--panel2);
    padding:.1rem .4rem;border-radius:5px;font-size:.92em;color:#f0abfc;}

  /* ============ HUB ============ */
  .wrap{display:flex;min-height:100vh;}
  .sidebar{width:260px;flex-shrink:0;background:#161616;border-right:1px solid var(--border);
    padding:2rem 1.25rem;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:.6rem;margin-bottom:.25rem;}
  .brand .logo{width:38px;height:38px;border-radius:9px;background:var(--js);color:#000;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;}
  .brand h1{font-size:1.15rem;margin:0;}
  .brand small{color:var(--dim);font-size:.75rem;}
  .side-nav{margin-top:2rem;list-style:none;padding:0;}
  .side-nav a{display:flex;justify-content:space-between;align-items:center;
    padding:.6rem .75rem;border-radius:8px;color:var(--muted);font-size:.92rem;transition:.15s;cursor:pointer;}
  .side-nav a:hover{background:var(--panel2);color:var(--text);}
  .side-nav .cnt{font-size:.72rem;color:var(--dim);}
  .progress-box{margin-top:2rem;padding:1rem;background:var(--panel);border:1px solid var(--border);border-radius:12px;}
  .progress-box .label{font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;}
  .pbar{height:8px;background:#2d2d2d;border-radius:99px;margin-top:.6rem;overflow:hidden;}
  .pbar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--js));transition:width .4s ease;}
  .reset-btn{margin-top:.8rem;width:100%;padding:.45rem;font-size:.75rem;background:transparent;
    color:var(--dim);border:1px solid var(--border);border-radius:7px;cursor:pointer;}
  .reset-btn:hover{color:var(--text);border-color:var(--muted);}

  .main{flex:1;padding:2.5rem 3rem 5rem;max-width:1100px;}
  .hubhero{background:linear-gradient(135deg,#1e1e1e,#181818);border:1px solid var(--border);
    border-radius:20px;padding:2.5rem;margin-bottom:2.5rem;position:relative;overflow:hidden;}
  .hubhero::after{content:'JS';position:absolute;right:-10px;bottom:-30px;font-size:11rem;font-weight:800;color:rgba(247,223,30,.05);}
  .hubhero h2{font-size:2.3rem;margin:0 0 .6rem;}
  .hubhero h2 .y{color:var(--js);}
  .hubhero p{color:var(--muted);margin:0;max-width:620px;}
  .hubhero .meta{margin-top:1.4rem;display:flex;gap:1.5rem;flex-wrap:wrap;}
  .hubhero .meta div{font-size:.85rem;color:var(--dim);}
  .hubhero .meta b{display:block;color:var(--accent);font-size:1.4rem;}

  .toolbar{display:flex;gap:1rem;align-items:center;margin-bottom:2rem;flex-wrap:wrap;}
  .search{flex:1;min-width:220px;padding:.75rem 1rem;background:var(--panel);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:.95rem;}
  .search:focus{outline:none;border-color:var(--js);}
  .filter-hide{display:none !important;}
  .resume-btn{padding:.75rem 1.2rem;background:var(--js);color:#000;font-weight:700;border:none;border-radius:10px;cursor:pointer;font-size:.9rem;}
  .resume-btn:hover{filter:brightness(1.05);}

  .section{margin-bottom:3rem;}
  .section-head{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.2rem;}
  .section-head h3{font-size:1.4rem;margin:0;}
  .section-head .tag{font-size:.72rem;padding:.15rem .6rem;border-radius:99px;background:var(--panel2);color:var(--muted);border:1px solid var(--border);}
  .section-head .line{flex:1;height:1px;background:var(--border);}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.3rem;
    display:flex;flex-direction:column;gap:.7rem;transition:.18s;position:relative;cursor:pointer;}
  .card:hover{transform:translateY(-3px);border-color:var(--js);box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
  .card .num{font-size:.72rem;font-weight:700;color:#000;background:var(--accent);padding:.2rem .55rem;border-radius:6px;white-space:nowrap;}
  .card.bonus .num{background:var(--js);}
  .card.ot .num{background:#60a5fa;}
  .card h4{margin:0;font-size:1.08rem;line-height:1.4;}
  .card p{margin:0;font-size:.85rem;color:var(--muted);flex:1;}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:.3rem;}
  .card .go{font-size:.82rem;color:var(--js);font-weight:600;}
  .card .go::after{content:' →';}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:.8rem;color:transparent;transition:.15s;flex-shrink:0;}
  .check:hover{border-color:var(--accent);}
  .card.done{border-color:rgba(74,222,128,.4);}
  .card.done .check{background:var(--accent);border-color:var(--accent);color:#000;}
  .card.done h4{color:var(--muted);}
  .empty{color:var(--dim);padding:2rem;text-align:center;display:none;}
  .hubfoot{color:var(--dim);font-size:.82rem;border-top:1px solid var(--border);padding-top:1.5rem;}

  /* ============ LESSON ============ */
  .side .home{display:flex;align-items:center;gap:.55rem;padding:.5rem;margin-bottom:1rem;border-radius:8px;cursor:pointer;}
  .side .home:hover{background:var(--panel2);}
  .side .home .logo{width:32px;height:32px;border-radius:8px;background:var(--js);color:#000;display:flex;align-items:center;justify-content:center;font-weight:800;}
  .side .home b{font-size:.95rem;}
  .grp{margin-top:1rem;}
  .grp .gname{font-size:.72rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;padding:.4rem .5rem;font-weight:700;}
  .side ul{list-style:none;margin:0;padding:0;}
  .side li a{display:flex;gap:.5rem;padding:.45rem .55rem;border-radius:7px;font-size:.86rem;color:var(--muted);align-items:center;}
  .side li a:hover{background:var(--panel2);color:var(--text);}
  .side li a.active{background:rgba(247,223,30,.12);color:var(--js);font-weight:600;}
  .side li a .n{font-size:.68rem;color:var(--dim);flex-shrink:0;width:46px;}
  .side li a.active .n{color:var(--js);}
  .dot{margin-left:auto;color:var(--accent);font-size:.7rem;opacity:0;}
  .side li a.done .dot{opacity:1;}

  .lmain{flex:1;min-width:0;}
  .content{max-width:880px;margin:0 auto;padding:2.5rem 2rem 6rem;}
  .crumb{font-size:.82rem;color:var(--dim);margin-bottom:.6rem;}
  .crumb a{cursor:pointer;}.crumb a:hover{color:var(--js);}
  .l-head{border-bottom:1px solid var(--border);padding-bottom:1.5rem;margin-bottom:2.5rem;}
  .l-head .badge{display:inline-block;font-size:.72rem;font-weight:700;color:#000;background:var(--accent);padding:.2rem .6rem;border-radius:6px;margin-bottom:.8rem;}
  .l-head h1{font-size:2.1rem;margin:.2rem 0 0;line-height:1.3;}
  .l-head .sub{color:var(--muted);margin-top:.5rem;}

  .blk{margin:0 0 2.4rem;animation:fade .4s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .blk h2{font-size:1.5rem;color:var(--accent);margin:0 0 1rem;display:flex;align-items:center;gap:.5rem;}
  .blk.code h2{color:var(--js);}
  .blk ul{list-style:none;padding:0;margin:0;}
  .blk li{position:relative;padding-left:1.6rem;margin-bottom:.9rem;color:#d1d5db;}
  .blk li::before{content:'→';position:absolute;left:0;color:var(--blue);font-weight:bold;}
  .desc{color:var(--muted);margin:0 0 1rem;}

  .lhero{text-align:center;background:linear-gradient(135deg,#1d1d1d,#181818);border:1px solid var(--border);border-radius:18px;padding:3rem 2rem;}
  .lhero h2{justify-content:center;color:var(--blue);font-size:2rem;border:0;}
  .lhero .uline{width:90px;height:4px;background:var(--accent);margin:1.2rem auto;border-radius:2px;}
  .lhero p{font-size:1.15rem;color:#cbd5e1;}

  .highlight{color:var(--blue);font-weight:700;}
  .accent{color:var(--accent);font-weight:700;}
  .warn{color:var(--warn);font-weight:700;}
  .code-breakdown{background:var(--panel2);padding:1rem 1.2rem;border-left:4px solid var(--blue);margin:.8rem 0;border-radius:0 8px 8px 0;}
  .tip-box{background:rgba(97,218,251,.06);border:1px solid var(--blue);padding:1rem 1.2rem;border-radius:10px;margin:.9rem 0;}
  .practice-box{background:rgba(250,204,21,.05);border:1px solid #facc15;padding:1rem 1.2rem;border-radius:10px;margin:.9rem 0;}

  .codecard{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
  .codecard .cbar{display:flex;align-items:center;gap:.5rem;padding:.6rem 1rem;background:#171717;border-bottom:1px solid var(--border);}
  .codecard .dots{display:flex;gap:.4rem;}
  .codecard .dots i{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .codecard .dots i:nth-child(1){background:#ff5f56;}
  .codecard .dots i:nth-child(2){background:#ffbd2e;}
  .codecard .dots i:nth-child(3){background:#27c93f;}
  .codecard .fname{font-size:.75rem;color:var(--dim);font-family:'Fira Code',monospace;}
  .codecard .copy{margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.72rem;padding:.25rem .6rem;border-radius:6px;cursor:pointer;}
  .codecard .copy:hover{color:var(--text);border-color:var(--muted);}
  .codecard .pz,.codecard .jf{display:inline-flex;align-items:center;justify-content:center;height:26px;padding:0 .5rem;min-width:26px;
    color:#fff;font-weight:800;font-size:.78rem;border-radius:6px;border:none;cursor:pointer;text-decoration:none;letter-spacing:.02em;}
  .codecard .pz{background:#2563eb;}
  .codecard .pz:hover{background:#1d4ed8;}
  .codecard .jf{background:#8957e5;}
  .codecard .jf:hover{background:#7440d4;}
  pre{margin:0;padding:1.3rem 1.4rem;overflow-x:auto;background:var(--code-bg);font-family:'Fira Code','Consolas',monospace;font-size:.95rem;line-height:1.6;}
  pre code{background:none;padding:0;color:#d4d4d4;font-size:inherit;}
  .tok-com{color:#6a9955;font-style:italic;}
  .tok-str{color:#ce9178;}
  .tok-num{color:#b5cea8;}
  .tok-kw{color:#569cd6;}
  .tok-bool{color:#569cd6;}
  .tok-fn{color:#dcdcaa;}
  .tok-prop{color:#9cdcfe;}

  details.answer{margin-top:1rem;border:1px solid var(--border);border-radius:10px;background:rgba(74,222,128,.04);overflow:hidden;}
  details.answer summary{cursor:pointer;padding:.8rem 1.1rem;color:var(--accent);font-weight:600;list-style:none;user-select:none;}
  details.answer summary::-webkit-details-marker{display:none;}
  details.answer summary::before{content:'▸ ';}
  details.answer[open] summary::before{content:'▾ ';}
  details.answer .ans{padding:0 1.1rem 1rem;white-space:pre-wrap;color:#d1fae5;}

  .raw header{text-align:center;margin-bottom:2rem;border-bottom:2px solid var(--border);padding-bottom:1rem;}
  .raw header h1{color:var(--blue);font-size:1.8rem;margin:.2rem 0;}
  .raw .subtitle{color:var(--muted);}
  .raw .exercise-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.6rem;margin-bottom:1.8rem;}
  .raw .exercise-header{display:flex;align-items:center;margin-bottom:1rem;gap:.8rem;}
  .raw .badge{background:var(--blue);color:#000;padding:.25rem .7rem;border-radius:8px;font-weight:bold;font-size:.85rem;}
  .raw .exercise-header h2{margin:0;color:var(--accent);font-size:1.3rem;}
  .raw .scenario{background:rgba(255,255,255,.04);padding:.9rem 1rem;border-left:4px solid var(--blue);margin-bottom:1.2rem;font-style:italic;border-radius:0 8px 8px 0;}
  .raw ul{padding-left:1.2rem;}.raw li{margin-bottom:.5rem;}
  .raw .code-area{background:#000;padding:1.2rem;border-radius:10px;font-family:'Fira Code',monospace;color:#9cdcfe;margin-top:1rem;border:1px solid #444;}
  .raw details{margin-top:1.2rem;}
  .raw summary{color:var(--warn);font-weight:bold;cursor:pointer;}
  .raw .solution{margin-top:1rem;background:var(--code-bg);padding:1rem;border-radius:8px;color:#ce9178;}
  .raw footer{text-align:center;color:var(--dim);margin-top:1rem;}

  .pager{display:flex;gap:1rem;margin-top:3rem;}
  .pager a{flex:1;padding:1rem 1.2rem;background:var(--panel);border:1px solid var(--border);border-radius:12px;transition:.15s;cursor:pointer;}
  .pager a:hover{border-color:var(--js);}
  .pager .dir{font-size:.75rem;color:var(--dim);}
  .pager .t{font-weight:600;margin-top:.2rem;}
  .pager .next{text-align:right;}
  .pager a.disabled{opacity:.35;pointer-events:none;}

  .mobiletop{display:none;}
  @media(max-width:880px){
    .sidebar,.side{display:none;}
    .main{padding:1.5rem;}
    .mobiletop{display:flex;gap:1rem;align-items:center;padding:1rem;border-bottom:1px solid var(--border);}
    .mobiletop a{color:var(--js);font-weight:600;font-size:.9rem;cursor:pointer;}
    .content{padding:1.5rem 1.2rem 5rem;}
  }
</style>
</head>
<body>

<!-- ===================== HUB VIEW ===================== -->
<div id="hubView" class="wrap">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">JS</div>
      <div><h1>JavaScript 입문</h1><small>인터랙티브 강의</small></div>
    </div>
    <ul class="side-nav" id="hubSideNav"></ul>
    <div class="progress-box">
      <div class="label"><span>학습 진행률</span><span id="pctTxt">0%</span></div>
      <div class="pbar"><span id="pbar"></span></div>
      <button class="reset-btn" id="resetBtn">진행 기록 초기화</button>
    </div>
  </aside>
  <main class="main">
    <div class="hubhero">
      <h2><span class="y">JavaScript</span> 입문 강의</h2>
      <p>변수와 데이터부터 jQuery 통합 프로젝트까지. 각 차시를 열면 슬라이드 내용을 정리한 읽기용 강의 페이지가 코드 블록과 함께 펼쳐집니다.</p>
      <div class="meta">
        <div><b id="mTotal">0</b>전체 강의</div>
        <div><b>4</b>주차 커리큘럼</div>
        <div><b id="mDone">0</b>완료</div>
      </div>
    </div>
    <div class="toolbar">
      <input class="search" id="search" placeholder="강의 검색 (예: 반복문, 모달, jQuery)">
      <button class="resume-btn" id="resumeBtn">이어서 학습 ▶</button>
    </div>
    <div id="hubSections"></div>
    <div class="empty" id="empty">검색 결과가 없습니다.</div>
    <footer class="hubfoot">HTML · CSS · JavaScript 단일 파일 정적 사이트 · 진행률은 브라우저에 저장됩니다.</footer>
  </main>
</div>

<!-- ===================== LESSON VIEW ===================== -->
<div id="lessonView" class="wrap" style="display:none;">
  <aside class="side">
    <div class="home" data-home><span class="logo">JS</span><b>강의 목록으로</b></div>
    <nav id="lessonSideNav"></nav>
  </aside>
  <div class="lmain">
    <div class="mobiletop"><a data-home>← 강의 목록</a></div>
    <div class="content" id="lessonContent"></div>
  </div>
</div>

<script>
/* ===================== DATA ===================== */
const CURRICULUM = [
  { id:"ot", name:"오리엔테이션", tag:"OT", lessons:[
    { id:"OT", num:"OT", title:"왜 자바스크립트인가?", desc:"Why JavaScript? 언어의 가치와 가능성", cls:"ot" },
  ]},
  { id:"w1", name:"1주차 · 기초 문법", tag:"Basics", lessons:[
    { id:"web3-1-1", num:"1차시", title:"변수와 데이터의 추상화", desc:"변수, 자료형, 데이터를 다루는 기초" },
    { id:"web3-1-2", num:"2차시", title:"연산자와 수치 논리", desc:"산술·비교·논리 연산자 (퀴즈 모드)" },
    { id:"web3-1-3", num:"3차시", title:"조건문과 흐름 제어", desc:"if / else 로 프로그램 흐름 분기" },
    { id:"web3-1-4", num:"4차시", title:"반복문과 자동화", desc:"while·for, break·continue 실습형" },
  ]},
  { id:"w2", name:"2주차 · 종합 & 객체", tag:"Objects", lessons:[
    { id:"web3-2-1", num:"5차시", title:"기초 문법 종합 복습", desc:"1주차 문법 통합 정리" },
    { id:"web3-2-6", num:"6차시", title:"함수와 코드의 재사용", desc:"선언·매개변수·return·화살표·콜백" },
    { id:"web3-2-7", num:"7차시", title:"배열과 데이터 묶음", desc:"인덱스·length·순회·forEach·메서드" },
    { id:"web3-2-8", num:"8차시", title:"객체 기반 문제 풀이 & 미니 프로젝트", desc:"객체로 데이터 구조화하기" },
  ]},
  { id:"w3", name:"3주차 · jQuery & DOM", tag:"jQuery", lessons:[
    { id:"web3-3-9", num:"9차시", title:"제이쿼리 도입 및 선택자", desc:"jQuery 시작과 요소 선택" },
    { id:"web3-3-10", num:"10차시", title:"클래스 제어 메서드", desc:"addClass·removeClass·toggleClass" },
    { id:"web3-3-11", num:"11차시", title:"논리 기반 상태 전환 실습", desc:"상태에 따른 UI 전환" },
    { id:"web3-3-12", num:"12차시", title:"팝업창(Modal) 구현 및 이벤트 제어", desc:"모달과 이벤트 핸들링" },
  ]},
  { id:"w4", name:"4주차 · 인터랙션 & 프로젝트", tag:"Project", lessons:[
    { id:"web3-4-13", num:"13차시", title:"아코디언 메뉴 기초 및 심화", desc:"접고 펴는 UI 컴포넌트" },
    { id:"web3-4-14", num:"14차시", title:"인터랙션 고도화", desc:"동적 인터랙션 심화" },
    { id:"bonus3-4-14", num:"14차시 프로젝트", title:"jQuery 통합 프로젝트: 스마트 대시보드", desc:"배운 기술을 하나의 웹 서비스로 조립" },
  ]},
  { id:"bonus", name:"보너스 · 추가 실습 & 퀴즈", tag:"Bonus", lessons:[
    { id:"bonus1", num:"Bonus", title:"스코프 수수께끼 퀴즈", desc:"변수 스코프 4단계 퀴즈", cls:"bonus" },
    { id:"bonus2", num:"Bonus", title:"2.5차시 · 연산자 심화 응용", desc:"논리를 설계하는 연산자 실전 (퀴즈)", cls:"bonus" },
    { id:"bonus3", num:"Bonus", title:"조건문 마스터하기", desc:"1주차 조건문 실습 모음", cls:"bonus" },
    { id:"bonus4-1", num:"Bonus", title:"반복문 마스터하기", desc:"1주차 반복문 실습 모음", cls:"bonus" },

const LESSONS = {"OT":[{"type":"title","title":"왜 자바스크립트인가?","subtitle":"<span class='highlight' style='font-size:2.2rem;'>Why JavaScript?</span><br><br><span style='color:#888; font-size:1.2rem;'>세상을 움직이는 가장 강력한 언어의 가치</span>"},{"type":"content","title":"01. 웹의 유일한 주인공 (Frontend)","items":["모든 웹 브라우저가 기본적으로 탑재한 <span class='highlight'>유일한 프로그래밍 언어</span>입니다.","HTML이 뼈대, CSS가 디자인이라면 JS는 웹에 <span class='accent'>동작</span>을 부여합니다.","인스타그램, 유튜브 등 우리가 쓰는 모든 웹 서비스의 핵심입니다."]},{"type":"content","title":"02. 한계를 넘은 확장성 (Full-Stack)","items":["<span class='highlight'>Node.js</span>의 탄생으로 이제 서버 개발까지 가능해졌습니다.","언어 하나로 <span class='accent'>프론트엔드와 백엔드</span>를 모두 개발할 수 있는 효율성을 제공합니다.","가장 적은 노력으로 전체 서비스를 구축할 수 있는 지름길입니다."]},{"type":"content","title":"03. 거대한 생태계와 정보량","items":["전 세계에서 가장 많은 개발자가 사용하는 언어 1위를 다툽니다.","수백만 개의 오픈소스 라이브러리(<span class='highlight'>NPM</span>)를 즉시 가져다 쓸 수 있습니다.","막히는 부분은 구글과 AI에게 물어보면 1초 만에 정답이 나옵니다."]},{"type":"content","title":"04. 무엇이든 만드는 만능 도구","items":["<b>React Native:</b> 하나의 코드로 iOS와 안드로이드 앱을 동시에 만듭니다.","<b>Electron:</b> 슬랙(Slack), 디스코드 같은 설치형 프로그램도 JS로 만듭니다.","<b>Three.js:</b> 브라우저에서 돌아가는 화려한 3D 그래픽을 구현합니다."]},{"type":"content","title":"05. 압도적인 채용 수요","items":["스타트업부터 네카라쿠배까지, <span class='highlight'>JS 숙련자</span>를 찾지 않는 곳이 없습니다.","러닝 커브가 낮아 입문하기 좋고, 숙련되었을 때의 몸값은 매우 높습니다.","가장 취업 시장에서 활발하게 거래되는 기술 스택입니다."]},{"type":"title","title":"아이디어를 현실로 만드는 자유","subtitle":"<span class='accent'>상상하는 모든 것을 구현할 수 있는 도구,</span><br><br><span class='highlight' style='font-size:2.5rem;'>JavaScript의 세계에 오신 것을 환영합니다!</span>"}],"web3-1-1":[{"type":"title","title":"JavaScript 입문: 1주차 1차시","subtitle":"<span class='highlight' style='font-size:2rem;'>변수와 데이터의 추상화</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 보이지 않는 세계 (Runtime & Memory)<br>2교시: 데이터의 이름과 규칙 (Let, Const & Scope)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["자바스크립트가 실행되는 환경인 <span class='highlight'>런타임(Runtime)</span>을 이해합니다.","컴퓨터가 데이터를 기억하는 물리적 원리(<span class='highlight'>메모리 주소</span>)를 배웁니다.","복잡한 데이터를 단순하게 만드는 <span class='highlight'>추상화</span>의 개념을 익힙니다.","현대적 변수 선언 방식(<span class='highlight'>let, const</span>)과 유효 범위를 마스터합니다."]},{"type":"content","title":"1교시. 보이지 않는 세계: 런타임","items":["자바스크립트 코드는 혼자서 움직일 수 없습니다.","코드를 읽고 실행해주는 '엔진'이 포함된 환경, 즉 <span class='highlight'>런타임(Runtime)</span>이 필요합니다.","대표적인 런타임: <span class='accent'>Web Browser</span> (Chrome, Safari)와 <span class='accent'>Node.js</span>."]},{"type":"content","title":"🌐 브라우저 vs Node.js","items":["<b>브라우저:</b> 웹 페이지의 버튼을 누르거나 화면을 바꿀 때 사용합니다.","<b>Node.js:</b> 브라우저 밖(서버, 로컬 컴퓨터)에서 파일을 제어하거나 데이터를 처리할 때 사용합니다.","우리는 오늘 <b>Node.js 기반의 온라인 컴파일러(Programiz)</b>를 사용할 것입니다."]},{"type":"code","title":"[실습 1] 런타임 퀴즈","desc":"다음 상황에서 어떤 런타임 환경이 더 적합할지 빈칸을 채워보세요.","code":"1. 웹사이트의 배경색을 빨간색으로 바꾸고 싶을 때?\n   => (          ) 환경\n\n2. 내 컴퓨터에 있는 파일 100개를 하나로 합치고 싶을 때?\n   => (          ) 환경","answer":"정답: 브라우저 / Node.js"},{"type":"content","title":"💾 컴퓨터는 어떻게 기억하는가?","items":["프로그램이 데이터를 다루려면 어딘가에 저장해야 합니다.","컴퓨터의 단기 기억 장치인 <span class='highlight'>RAM(메모리)</span>이 그 역할을 수행합니다.","메모리는 수많은 칸으로 나뉘어 있고, 각 칸은 데이터를 담을 수 있습니다."]},{"type":"content","title":"📍 주소(Address)라는 난제","items":["메모리의 각 칸에는 고유한 이름표가 붙어 있습니다.","이를 <span class='warn'>메모리 주소</span>라고 부르며, <code>0x0000A1B2</code> 처럼 사람이 이해하기 어려운 숫자로 되어 있습니다.","만약 우리가 이 주소를 직접 다뤄야 한다면 프로그래밍은 지옥이 될 것입니다."]},{"type":"content","title":"💡 해결책: 추상화(Abstraction)","items":["복잡한 주소값 대신 사람이 이해하기 쉬운 <b>이름</b>을 붙이는 것, 이것이 바로 <span class='highlight'>추상화</span>입니다.","<div class='code-breakdown'><b>메모리 주소(0x7FF...) → 추상화 → 변수명(userName)</b></div>","변수는 '데이터가 담긴 메모리 공간에 붙인 인간용 이름표'입니다."]},{"type":"code","title":"[실습 2] 메모리와 주소의 개념 매칭","desc":"현실 세계의 비유와 프로그래밍 개념을 연결해보세요.","code":"A. 0x12A34F (복잡한 16진수 값)   => (          )\nB. \"myScore\" (개발자가 지은 이름)  => (          )\nC. 100 (실제 데이터 값)          => (          )\n\n[보기: 식별자, 메모리 주소, 데이터]","answer":"정답: A-메모리 주소 / B-식별자 / C-데이터"},{"type":"content","title":"🏷️ 식별자(Identifier)","items":["프로그래밍에서는 변수의 이름을 <span class='highlight'>식별자</span>라고 부릅니다.","어떤 값을 다른 값과 구별해주는 유일한 이름이어야 합니다.","좋은 식별자는 데이터의 <b>의미</b>를 담고 있어야 합니다. (예: <code>a</code> 보다는 <code>userAge</code>)"]},{"type":"code","title":"[실습 3] 좋은 식별자 고르기","desc":"다음 데이터에 가장 잘 어울리는 변수 이름을 보기에서 골라주세요.","code":"1. 사용자의 현재 위치 정보\n   => let (           ) = \"Seoul\";\n\n2. 쇼핑몰 상품의 가격\n   => let (           ) = 50000;\n\n[보기: a, b, location, price, data1]","answer":"정답: location / price (설명: 추상화의 핵심은 의미 전달입니다!)"},{"type":"code","title":"[실습 4] Programiz 첫 코드 작성","desc":"Programiz 사이트에서 아래 코드를 완성하고 결과를 확인하세요.","code":"// 1. 숫자 100을 'myAge'라는 이름으로 추상화하세요.\nlet myAge = [     ];\n\n// 2. 주소 대신 이름을 사용하여 화면에 출력하세요.\nconsole.log([        ]);","answer":"정답: 100 / myAge"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["보이지 않는 메모리 주소와 이름을 연결하는 과정을 상상해보세요.","다음 시간에는 데이터를 더 안전하게 다루는 법을 배웁니다."]},{"type":"content","title":"2교시. 데이터의 이름과 규칙","items":["현대 자바스크립트에는 변수를 선언하는 두 가지 주요 방법이 있습니다.","<span class='highlight'>let</span>: 값이 변할 수 있는 변수","<span class='accent'>const</span>: 값이 절대 변하지 않는 상수"]},{"type":"content","title":"🔒 const (Constant, 상수)","items":["한 번 이름을 붙이면 다른 데이터로 바꿀 수 없습니다.","<div class='code-breakdown'><b>const PI = 3.14;</b></div>","값의 <b>재할당</b>이 불가능하므로, 실수로 값을 바꾸는 버그를 예방할 수 있습니다.","<div class='tip-box'>변경이 필요 없는 모든 데이터는 기본적으로 <b>const</b>를 사용하는 것이 권장됩니다.</div>"]},{"type":"content","title":"🔓 let (Variable, 변수)","items":["값이 언제든지 바뀔 수 있는 상황에서 사용합니다.","<div class='code-breakdown'><b>let count = 0; count = 1; (OK!)</b></div>","사용자의 점수, 남은 시간 등 계속 업데이트되는 정보를 담을 때 적합합니다."]},{"type":"content","title":"📐 변수 이름 짓기 규칙","items":["<b>CamelCase:</b> 첫 단어는 소문자, 다음 단어 첫 글자는 대문자 (예: <code>userPassword</code>)","<b>숫자 시작 금지:</b> <code>1user</code> (X), <code>user1</code> (O)","<b>예약어 금지:</b> <code>let, if, for</code> 등 자바스크립트가 이미 쓰고 있는 단어는 금지!"]},{"type":"code","title":"[실습 5] 올바른 이름 고르기","desc":"다음 중 변수 이름으로 사용할 수 없는 것을 모두 고르세요.","code":"A. user_name\nB. 7days\nC. let\nD. myScore\nE. $price","answer":"정답: B (숫자 시작), C (예약어)"},{"type":"content","title":"🚧 블록 스코프(Block Scope)","items":["변수는 선언된 <b>중괄호 { }</b> 영역 안에서만 살아있습니다.","이 영역을 <span class='highlight'>블록 스코프</span>라고 부릅니다.","울타리 밖에서는 울타리 안의 변수를 볼 수도, 사용할 수도 없습니다."]},{"type":"code","title":"[실습 6] 스코프 챌린지 1","desc":"다음 코드의 출력 결과를 예측해보세요.","code":"{\n    let gift = \"MacBook\";\n}\nconsole.log(gift);","answer":"정답: 에러 발생! (설명: gift는 중괄호 안에서만 존재하며 밖으로 나오면 소멸합니다.)"},{"type":"code","title":"[실습 7] 스코프 챌린지 2","desc":"다음 코드의 출력 결과를 예측해보세요.","code":"const sky = \"Blue\";\n{\n    console.log(sky);\n}","answer":"정답: Blue (설명: 밖에서 선언된 변수는 안에서도 보입니다!)"},{"type":"code","title":"[실습 8] 최종 종합 실습 (Programiz)","desc":"상황에 맞는 선언 방식과 이름을 사용하여 코드를 완성하세요.","code":"// 1. 자신의 이름을 저장하는 변수 (바뀌지 않음)\n[     ] myName = \"James\";\n\n// 2. 현재 시간을 저장하는 변수 (바뀔 수 있음)\n[     ] currentTime = 10;\ncurrentTime = 11;\n\nconsole.log(myName, currentTime);","answer":"정답: const / let"},{"type":"content","title":"📝 오늘의 요약","items":["<b>Runtime:</b> 자바스크립트가 실행되는 환경 (브라우저, Node.js)","<b>Abstraction:</b> 복잡한 메모리 주소를 쉬운 이름으로 바꾸는 과정","<b>let & const:</b> 재할당 가능 여부에 따른 현대적 선언 방식","<b>Block Scope:</b> 중괄호 { }가 변수의 수명을 결정하는 울타리"]},{"type":"title","title":"수고하셨습니다! 👏","subtitle":"다음 차시: <span class='highlight'>데이터 타입과 연산자</span><br><br><span style='color:#777;'>질문이 있다면 지금 바로 말씀해 주세요.</span>"}],"web3-1-2":[{"type":"title","title":"JavaScript 입문: 1주차 2차시","subtitle":"<span class='highlight' style='font-size:2rem;'>연산자와 수치 논리</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 숫자 가공하기 (산술 & 대입 연산자)<br>2교시: 똑똑한 판단하기 (관계 & 논리 연산자)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["데이터를 더하고 빼는 <span class='highlight'>산술 연산자</span>의 종류와 우선순위를 이해합니다.","변수에 값을 효율적으로 넣는 <span class='highlight'>대입 연산자</span> 활용법을 배웁니다.","데이터가 같은지 다른지 비교하는 <span class='highlight'>일치 연산자(===)</span>를 마스터합니다.","여러 조건을 조합하여 <span class='highlight'>UI 상태</span>를 판단하는 논리를 구축합니다."]},{"type":"content","title":"1교시. 숫자 가공하기: 산술 연산자","items":["자바스크립트는 강력한 계산기입니다.","사칙연산: <code>+</code> (더하기), <code>-</code> (빼기), <code>*</code> (곱하기), <code>/</code> (나누기)","나머지 연산: <span class='accent'>%</span> (나눈 후 남은 나머지 값을 반환)"]},{"type":"content","title":"🧩 나머지 연산자(%)의 마법","items":["나머지 연산자는 프로그래밍에서 매우 자주 쓰입니다.","<b>홀수/짝수 판별:</b> <code>number % 2</code>가 0이면 짝수, 1이면 홀수","<b>배수 확인:</b> <code>number % 3 === 0</code>이면 3의 배수","<b>순환 처리:</b> 일정 숫자 안에서 숫자가 뱅글뱅글 돌게 만들 때 유용합니다."]},{"type":"code","isQuiz":true,"title":"[실습 1] 쇼핑몰 장바구니 계산","desc":"상품 가격과 수량을 곱해 총액을 계산하고 수량을 업데이트 하세요.","code":"const price = 15000;\nlet quantity = 3;\n\n// 1. 총 가격을 계산하여 total에 담으세요.\nlet total = [          ];\n\n// 2. 상품이 하나 더 추가되었습니다. 복합 대입 연산자를 써보세요.\nquantity [      ] 1;","answer":""},{"type":"code","isQuiz":false,"title":"[해설 1] 쇼핑몰 장바구니 계산","desc":"사칙연산자와 복합 대입 연산자를 활용한 예제입니다.","code":"const price = 15000;\nlet quantity = 3;\n\nlet total = price * quantity; // 곱하기 연산\nquantity += 1;                // 복합 대입 (quantity = quantity + 1)\n\nconsole.log(\"결제 예정 금액:\", price * quantity);","answer":"정답: price * quantity / +="},{"type":"code","isQuiz":true,"title":"[실습 2] 홀수 짝수 판별 논리","desc":"나머지 연산자를 사용하여 숫자가 짝수인지 확인하는 코드를 완성하세요.","code":"let num = 24;\n\n// num을 2로 나눈 나머지가 0인지 확인합니다.\nlet isEven = (num [   ] 2 === 0);\n\nconsole.log(\"이 숫자는 짝수인가요?\", isEven);","answer":""},{"type":"code","isQuiz":false,"title":"[해설 2] 홀수 짝수 판별 논리","desc":"나머지(%)가 0이면 나누어 떨어진다는 의미입니다.","code":"let num = 24;\n\nlet isEven = (num % 2 === 0);\n\nconsole.log(\"이 숫자는 짝수인가요?\", isEven); // true","answer":"정답: % (설명: 2로 나눈 나머지가 0이면 짝수, 1이면 홀수입니다.)"},{"type":"content","title":"2교시. 똑똑한 판단하기: 관계 연산자","items":["두 값을 비교하여 <span class='highlight'>true</span>(참) 또는 <span class='warn'>false</span>(거짓)를 반환합니다.","<code>> , < , >= , <=</code> : 크기 비교","<code>===</code> : 일치 연산자 (값과 <b>타입</b>이 모두 같아야 함)","<code>!==</code> : 불일치 연산자"]},{"type":"content","title":"🧠 논리 연산자 (Logical)","items":["여러 조건을 조합할 때 사용합니다.","<b>&& (AND):</b> 모든 조건이 true여야 결과가 true","<b>|| (OR):</b> 하나만 true여도 결과가 true","<b>! (NOT):</b> 결과를 반대로 뒤집음 (true -> false)"]},{"type":"code","isQuiz":true,"title":"[실습 3] 회원가입 자격 검사","desc":"나이가 20세 이상이고, 약관에 동의한 경우에만 가입이 가능하도록 코드를 짜보세요.","code":"let age = 25;\nlet isAgreed = true;\n\n// 나이가 20 이상 '이면서' 약관동의가 true여야 합니다.\nlet canJoin = (age [    ] 20) [    ] isAgreed;\n\nconsole.log(\"회원가입 가능 여부:\", canJoin);","answer":""},{"type":"code","isQuiz":false,"title":"[해설 3] 회원가입 자격 검사","desc":"비교 연산자와 AND(&&) 연산자의 조합입니다.","code":"let age = 25;\nlet isAgreed = true;\n\nlet canJoin = (age >= 20) && isAgreed;\n\nconsole.log(\"회원가입 가능 여부:\", canJoin);","answer":"정답: >= / && (두 조건이 모두 참이어야 합니다.)"},{"type":"code","isQuiz":true,"title":"[실습 4] 복합 논리 테스트","desc":"구매액 5만원 이상 혹은 멤버십 등급이 'Gold'인 경우를 판단해보세요.","code":"let price = 30000;\nlet grade = \"Gold\";\n\n// 50000원 이상이거나 등급이 Gold여야 합니다.\nlet freeShipping = (price >= 50000) [    ] (grade === \"Gold\");\n\nconsole.log(\"무료 배송 대상인가요?\", freeShipping);","answer":""},{"type":"code","isQuiz":false,"title":"[해설 4] 복합 논리 테스트","desc":"둘 중 하나만 만족해도 되는 경우 OR(||) 연산자를 사용합니다.","code":"let price = 30000;\nlet grade = \"Gold\";\n\nlet freeShipping = (price >= 50000) || (grade === \"Gold\");\n\nconsole.log(\"무료 배송 대상인가요?\", freeShipping); // true","answer":"정답: || (OR 연산자)"},{"type":"content","title":"📝 오늘의 요약","items":["<b>산술 연산자:</b> 사칙연산과 나머지(%)를 통한 데이터 가공","<b>복합 대입:</b> <code>+=, -=</code> 등으로 변수 업데이트 간소화","<b>일치 연산자(===):</b> 값과 타입을 모두 따지는 엄격한 비교","<b>논리 연산자:</b> <code>&&, ||, !</code>를 활용한 복합적인 상태 판단"]},{"type":"title","title":"수고하셨습니다! 👏","subtitle":"다음 차시: <span class='highlight'>조건문과 흐름 제어 (If / Switch)</span><br><br><span style='color:#777;'>연산자는 조건문의 핵심 재료가 됩니다. 꼭 복습하세요!</span>"}],"web3-1-3":[{"type":"title","title":"JavaScript 입문: 1주차 3차시","subtitle":"<span class='highlight' style='font-size:2rem;'>조건문과 흐름 제어</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 프로그램의 선택 (if, else 기초 및 유효성 검사)<br>2교시: 복잡한 판단 (else if, 중첩 조건문 및 실무 로직)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["프로그램이 스스로 판단하는 <span class='highlight'>분기 처리</span>의 원리를 이해합니다.","기본적인 <span class='highlight'>if, else</span> 문법으로 참/거짓 반응을 구현합니다.","실무의 핵심인 <span class='highlight'>데이터 유효성 검증(Validation)</span>을 실습합니다.","여러 갈래 길을 만드는 <span class='highlight'>else if</span>와 복잡한 <span class='highlight'>중첩 조건문</span>을 정복합니다."]},{"type":"content","title":"1교시. 프로그램의 갈림길: if 문","items":["모든 지능형 시스템의 시작은 '조건문'입니다.","소괄호 <code>( )</code> 안에는 지난 시간에 배운 <b>비교/논리 연산자</b>가 들어갑니다.","결과가 <span class='accent'>true</span>일 때만 <code>{ }</code> 안의 코드가 실행됩니다.","<div class='code-breakdown'><b>if (age >= 20) { console.log('성인입니다'); }</b></div>"]},{"type":"content","title":"🛤️ 반대의 경우: else 문","items":["조건이 <span class='warn'>false</span>일 때 실행할 '나머지 상황'을 정의합니다.","<code>if</code> 조건 외의 모든 케이스를 한 번에 처리합니다.","예: '20세 이상인가?' -> 아니면(else) -> '미성년자입니다'."]},{"type":"code","title":"[실습 1] 합격/불합격 판독기","desc":"점수가 60점 이상이면 합격, 미만이면 불합격을 콘솔에 찍어보세요.","code":"let score = 75;\n\nif (score [    ] 60) {\n    console.log(\"PASS\");\n} [       ] {\n    console.log(\"FAIL\");\n}","answer":"정답: >= / else"},{"type":"code","title":"[실습 2] 홀수/짝수 구분 시스템","desc":"지난 시간 배운 나머지 연산자(%)를 if문과 결합해봅시다.","code":"let num = 13;\n\nif (num % 2 === [    ]) {\n    console.log(\"짝수입니다.\");\n} else {\n    console.log(\"홀수입니다.\");\n}","answer":"정답: 0 (설명: 2로 나눈 나머지가 0이면 짝수입니다.)"},{"type":"content","title":"🛡️ 실무 핵심: 데이터 유효성 검증","items":["사용자는 언제나 우리가 원하는 대로 데이터를 넣지 않습니다.","아이디를 빈칸으로 두거나, 비밀번호를 너무 짧게 입력하는 경우를 막아야 합니다.","이런 방어 코드를 <span class='highlight'>Validation(검증)</span>이라고 부릅니다."]},{"type":"code","title":"[실습 3] 로그인 입력 검증","desc":"아이디가 입력되지 않았을 때 경고를 띄우는 로직을 완성하세요.","code":"let userId = \"\"; // 비어있는 상태\n\nif (userId === [    ]) {\n    console.log(\"아이디를 반드시 입력해야 합니다!\");\n} else {\n    console.log(\"로그인 시도 중...\");\n}","answer":"정답: \"\" (빈 문자열 체크)"},{"type":"code","title":"[실습 4] 숫자 부호 판별기","desc":"어떤 숫자가 양수인지 음수인지 기초적인 판단을 내려봅시다.","code":"let n = -5;\n\nif (n > 0) {\n    console.log(\"양수입니다.\");\n} else {\n    console.log(\"음수 또는 0입니다.\");\n}","answer":"실행 결과: 음수 또는 0입니다."},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["기본적인 2분기(A 아니면 B) 구조를 익혔습니다.","다음 시간에는 '0'까지 완벽히 구분하는 3분기 이상의 구조를 배웁니다."]},{"type":"content","title":"2교시. 여러 갈래 길: else if","items":["세상에는 예/아니오 외에도 수많은 중간 선택지가 존재합니다.","<code>else if</code>를 통해 조건의 사슬을 만들 수 있습니다.","위에서부터 순서대로 검사하며, <b>가장 먼저 참이 된 블록 하나</b>만 실행됩니다."]},{"type":"code","title":"[실습 5] 양수, 음수, 그리고 제로","desc":"단순히 두 갈래가 아닌 세 갈래로 숫자를 판별해봅시다.","code":"let n = 0;\n\nif (n > 0) {\n    console.log(\"양수\");\n} [       ] (n < 0) {\n    console.log(\"음수\");\n} [       ] {\n    console.log(\"제로(0)\");\n}","answer":"정답: else if / else"},{"type":"code","title":"[실습 6] 학점 세분화 시스템","desc":"A, B, C, F 등급을 나누는 전형적인 else if 실습입니다.","code":"let score = 82;\n\nif (score >= 90) {\n    console.log(\"A\");\n} else if (score >= 80) {\n    console.log(\"B\");\n} else if (score >= 70) {\n    console.log(\"C\");\n} else {\n    console.log(\"F\");\n}","answer":"실행 결과: B (80점 이상 조건에 걸림)"},{"type":"content","title":"🔍 중첩 조건문 (Nested If)","items":["조건문 안에 또 다른 조건문을 넣을 수 있습니다.","먼저 큰 분류를 하고, 그 안에서 세부 분류를 할 때 사용합니다.","예: (로그인 했는가?) -> 참 -> (관리자인가?) -> 관리자 전용 메뉴 출력"]},{"type":"code","title":"[실습 7] 중첩 로그인 로직","desc":"로그인 여부와 관리자 권한을 동시에 체크하는 중첩 구조를 완성하세요.","code":"let isLogin = true;\nlet isAdmin = false;\n\nif (isLogin) {\n    console.log(\"로그인 상태입니다.\");\n    if (isAdmin) {\n        console.log(\"관리자 모드를 시작합니다.\");\n    } [       ] {\n        console.log(\"일반 사용자 화면입니다.\");\n    }\n} else {\n    console.log(\"로그인이 필요합니다.\");\n}","answer":"정답: else (설명: 로그인 된 상태 안에서 관리자가 아닌 경우입니다.)"},{"type":"content","title":"⚠️ 흔히 하는 실수: = vs ===","items":["<code>if (score = 100)</code> 라고 쓰면 어떻게 될까요?","비교가 아니라 <b>재할당</b>이 일어나면서 조건문이 항상 참이 되어버립니다!","<div class='warn'>반드시 <b>===</b> 세 개를 써서 비교하는 습관을 가져야 합니다.</div>"]},{"type":"code","title":"[실습 8] 에러 찾기 미션","desc":"아래 코드에서 버그를 찾아 수정해보세요.","code":"let memberLevel = \"Silver\";\n\n// \"Silver\" 등급인 사람에게만 쿠폰을 주고 싶습니다.\nif (memberLevel = \"Silver\") { \n    console.log(\"쿠폰 발송!\");\n}\n// 실제 결과: memberLevel이 \"Bronze\"여도 쿠폰이 나갑니다!","answer":"수정: memberLevel === \"Silver\" (비교 연산자 사용)"},{"type":"content","title":"🖥️ 실무 응용: 상황별 응답 로직","items":["<b>에러 메시지 처리:</b> 서버 응답 코드(200, 404, 500)에 따른 메시지 분기","<b>게임 캐릭터 상태:</b> HP가 0이면 '게임오버', 30 이하면 '경고음', 그 외 '정상'","<b>할인율 적용:</b> 나이, 구매금액, 멤버십 등급을 조합한 복합 계산"]},{"type":"code","title":"[실습 9] 복합 조건 판별 (AND/OR)","desc":"놀이공원 야간 개장 입장 조건 (나이가 20세 이상 '이거나' VIP 티켓 소지)","code":"let age = 15;\nlet hasVipTicket = true;\n\nif (age >= 20 [    ] hasVipTicket === true) {\n    console.log(\"야간 개장 입장 가능!\");\n} else {\n    console.log(\"입장이 제한됩니다.\");\n}","answer":"정답: || (OR 연산자)"},{"type":"code","title":"[실습 10] 챗봇 명령어 설계 맛보기","desc":"Programiz에서 명령어를 바꿔보며 테스트하세요.","code":"let message = \"도움말\";\n\nif (message === \"안녕\") {\n    console.log(\"안녕하세요! 저는 JS봇입니다.\");\n} else if (message === \"도움말\") {\n    console.log(\"명령어 안내: 안녕, 날씨, 도움말\");\n} else {\n    console.log(\"정의되지 않은 명령어입니다.\");\n}","answer":"명령어를 하나씩 바꿔가며 실행해보세요."},{"type":"code","title":"[최종 미션] ATM 인출 로직","desc":"통장 잔액과 인출 요청액을 비교하여 결과를 출력하는 로직을 완성하세요.","code":"let balance = 50000; // 잔액\nlet requestAmount = 60000; // 인출 요청액\n\nif (requestAmount [    ] balance) {\n    console.log(\"잔액이 부족합니다.\");\n} else if (requestAmount === 0) {\n    console.log(\"금액을 입력해주세요.\");\n} else {\n    balance -= requestAmount; // 잔액 차감\n    console.log(\"인출 성공! 남은 잔액: \" + balance);\n}","answer":"정답: > (인출액이 잔액보다 크면 인출 불가!)"},{"type":"title","title":"3교시. 조건문 심화 🔥","subtitle":"<span class='highlight' style='font-size:1.6rem;'>switch · 삼항 연산자 · Truthy/Falsy · 단축 평가</span><br><br><span style='color:#888; font-size:1rem;'>실무 코드를 읽고 결과를 예측하는 수준까지 끌어올립니다.</span>"},{"type":"content","title":"🔀 switch 문: 값에 따른 분기","items":["특정 변수의 <b>값(===)</b>이 여러 경우로 딱 떨어질 때, else if 사슬보다 깔끔합니다.","<code>case</code> 뒤의 값과 일치하면 실행, <span class='warn'>break</span>를 만나면 탈출합니다.","<div class='code-breakdown'><b>switch(x) { case 'A': ...; break; default: ... }</b></div>","<span class='warn'>함정:</span> break를 빼먹으면 아래 case로 줄줄이 실행되는 <b>fall-through</b>가 발생합니다."]},{"type":"code","title":"[심화 1] break 누락 (Fall-through)","desc":"break가 빠진 switch는 무엇을 출력할까요? 한 줄씩 따라가며 예측하세요.","code":"let grade = \"B\";\n\nswitch (grade) {\n    case \"A\":\n        console.log(\"최우수\");\n    case \"B\":\n        console.log(\"우수\");\n    case \"C\":\n        console.log(\"보통\");\n        break;\n    default:\n        console.log(\"재시험\");\n}","answer":"정답: '우수' 와 '보통' 두 줄 출력 (B에 break가 없어 C까지 흘러내려간 뒤 break로 탈출)"},{"type":"content","title":"❓ 삼항 연산자 (Ternary)","items":["단순한 if-else를 <b>한 줄의 식</b>으로 압축합니다.","<div class='code-breakdown'><b>조건 ? (참일 때 값) : (거짓일 때 값)</b></div>","결과를 변수에 바로 <span class='accent'>대입</span>할 수 있어 실무에서 매우 자주 쓰입니다.","예: <code>let msg = age >= 20 ? '성인' : '미성년';</code>"]},{"type":"code","title":"[심화 2] 중첩 삼항 연산자","desc":"삼항 연산자를 연결한 코드입니다. result에 담기는 값을 예측하세요.","code":"let score = 85;\n\nlet result = score >= 90 ? \"A\"\n           : score >= 80 ? \"B\"\n           : score >= 70 ? \"C\"\n           : \"F\";\n\nconsole.log(result);","answer":"정답: B (90 미만이라 첫 줄 탈락 → 80 이상이라 'B'에서 확정)"},{"type":"content","title":"👻 Truthy & Falsy","items":["JS의 if는 true/false가 아니어도 동작합니다. 값 자체를 <b>참 같은 값/거짓 같은 값</b>으로 판단합니다.","<span class='warn'>Falsy 6대 천왕:</span> <code>false</code>, <code>0</code>, <code>\"\"</code>(빈 문자열), <code>null</code>, <code>undefined</code>, <code>NaN</code>","이 6가지를 제외한 모든 값은 <span class='accent'>Truthy</span> (예: \"0\", [], {}, -1 모두 참!)","그래서 <code>if (userName)</code> 한 줄로 '입력 여부'를 검사할 수 있습니다."]},{"type":"code","title":"[심화 3] Falsy 판별 챌린지","desc":"아래 5개 중 콘솔에 '통과'가 찍히는 것은 몇 개일까요?","code":"let tests = [0, \"0\", \"\", [], \"false\"];\n\nfor (let i = 0; i < tests.length; i++) {\n    if (tests[i]) {\n        console.log(i + \"번 통과\");\n    }\n}","answer":"정답: 3개 ('0', [], 'false'만 Truthy. 숫자 0과 빈 문자열은 Falsy라 탈락)"},{"type":"content","title":"⚡ 단축 평가 (Short-circuit)","items":["<code>||</code> 와 <code>&&</code> 는 true/false뿐 아니라 <b>값 자체를 반환</b>합니다.","<b>OR(||):</b> 앞이 Falsy면 뒤를 반환 → 기본값 설정에 활용 <code>let name = input || \"손님\";</code>","<b>AND(&&):</b> 앞이 Truthy면 뒤를 반환 → 존재할 때만 실행하는 가드로 활용","if문 없이 분기를 처리하는 실무 단골 패턴입니다."]},{"type":"code","title":"[심화 도전] 버그 헌팅 + 결과 예측","desc":"신입 개발자가 짠 할인 로직입니다. 의도와 다르게 동작하는 부분을 찾고 출력을 예측하세요.","code":"let isMember = false;\nlet point = 0;\n\n// 의도: 회원이면 등급 안내, 아니면 가입 유도\nif (isMember = true) {\n    console.log(\"회원님 환영합니다\");\n}\n\n// 의도: 포인트가 있으면 사용 안내\nlet msg = point || \"사용 가능한 포인트가 없습니다\";\nconsole.log(msg);","answer":"버그: if (isMember = true) 는 비교(===)가 아닌 재할당 → 항상 참! 비회원도 환영 메시지가 출력됨.\n출력: '회원님 환영합니다' / '사용 가능한 포인트가 없습니다' (point가 0=Falsy라 || 뒤 문자열 반환)"},{"type":"content","title":"📝 오늘의 요약","items":["<b>if-else / else if:</b> 참/거짓 및 다중 분기의 기본기","<b>switch:</b> 값 매칭 분기. break 누락(fall-through) 주의","<b>삼항(?:):</b> 분기 결과를 한 줄로 변수에 대입","<b>Truthy/Falsy & 단축평가:</b> 값의 참/거짓성과 ||, && 실무 패턴","<b>Validation:</b> 잘못된 데이터를 걸러내는 방어벽"]},{"type":"title","title":"1주차 기초 과정 마스터! 🎉","subtitle":"<span class='highlight'>변수, 연산자, 조건문</span>이 자바스크립트의 모든 것입니다.<br><br><span style='color:#777;'>2주차 예고: 이제 노가다는 끝! '반복문(Loop)'으로 가봅시다.</span>"}],"web3-1-4":[{"type":"title","title":"JavaScript 입문: 1주차 4차시","subtitle":"<span class='highlight' style='font-size:2rem;'>반복문과 자동화</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 단순 반복의 끝 (while & for 루프 기초)<br>2교시: 스마트한 제어 (break, continue & 다량 데이터 처리)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["프로그래밍의 핵심인 <span class='highlight'>반복문(Loop)</span>의 필요성을 이해합니다.","조건 중심의 <span class='highlight'>while</span>문과 횟수 중심의 <span class='highlight'>for</span>문 사용법을 익힙니다.","<span class='highlight'>break</span>와 <span class='highlight'>continue</span>를 활용해 반복 흐름을 정교하게 제어합니다.","수백 개의 데이터를 단 몇 줄의 코드로 <span class='highlight'>일괄 처리(Automation)</span>하는 법을 배웁니다."]},{"type":"content","title":"1교시. 왜 반복문이 필요한가?","items":["콘솔에 '안녕하세요'를 1,000번 출력해야 한다면?","복사 붙여넣기로 1,000줄을 쓰는 것은 개발자가 아닙니다.","반복문은 <span class='accent'>동일하거나 유사한 작업</span>을 컴퓨터에게 대신 시키는 자동화 도구입니다.","개발자의 생산성은 '얼마나 반복을 잘 제거하느냐'에 달려 있습니다."]},{"type":"content","title":"🔄 while 문: 조건이 맞을 때까지","items":["특정 <span class='highlight'>조건이 참(true)</span>인 동안 블록 안의 코드를 무한히 반복합니다.","반복 횟수가 정해지지 않았을 때 유리합니다.","<div class='code-breakdown'><b>while (조건) { // 반복할 코드; // 증감식; }</b></div>","<span class='warn'>주의:</span> 조건을 거짓으로 만드는 장치가 없으면 프로그램이 멈추지 않는 '무한 루프'에 빠집니다."]},{"type":"code","title":"[실습 1] 1부터 5까지 숫자 세기","desc":"while문을 사용해 숫자를 하나씩 증가시키며 출력해보세요.","code":"let count = 1;\n\nwhile (count [    ] 5) {\n    console.log(\"현재 숫자: \" + count);\n    count [    ] 1; // 값을 1씩 증가시킴\n}","answer":"정답: <= / += (또는 count++)"},{"type":"content","title":"📊 for 문: 횟수를 정해서 반복하기","items":["가장 많이 사용되는 반복문으로, <span class='highlight'>초기값, 조건식, 증감식</span>을 한 줄에 적습니다.","반복 횟수가 명확할 때 가장 가독성이 좋습니다.","<div class='code-breakdown'><b>for (초기화; 조건; 증감) { // 반복할 코드 }</b></div>"]},{"type":"code","title":"[실습 2] for문으로 구구단 2단 만들기","desc":"for문을 사용해 2 * 1부터 2 * 9까지 출력하는 코드를 완성하세요.","code":"console.log(\"=== 2단 시작 ===\");\n\nfor (let i = 1; i < [    ]; i++) {\n    console.log(\"2 * \" + i + \" = \" + (2 * i));\n}","answer":"정답: 10 (설명: i가 1부터 9까지 돌아야 하므로 10보다 작아야 합니다.)"},{"type":"code","title":"[실습 3] 1부터 100까지의 합","desc":"반복문을 활용해 누적 합계를 구하는 자동화 로직입니다.","code":"let sum = 0;\n\nfor (let i = 1; i <= 100; i++) {\n    sum += [    ];\n}\n\nconsole.log(\"1부터 100까지 합산 결과:\", sum);","answer":"정답: i (매 루프마다 변하는 i값을 sum에 더해줍니다.)"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["기본적인 루프의 구조를 파악했습니다.","다음 시간에는 루프를 중단하거나 건너뛰는 고급 제어 기술을 배웁니다."]},{"type":"content","title":"2교시. 스마트한 흐름 제어: break","items":["반복문을 실행하다가 특정 조건에서 <span class='warn'>즉시 중단</span>하고 싶을 때 사용합니다.","비상 탈출구 역할을 합니다.","예: 검색 중 원하는 결과를 찾으면 더 이상 찾지 않고 루프를 끝냅니다."]},{"type":"code","title":"[실습 4] 보물 찾기 루프","desc":"숫자 7을 발견하면 즉시 반복을 멈추는 코드를 작성해보세요.","code":"for (let i = 1; i <= 10; i++) {\n    console.log(i + \"번 확인 중...\");\n    if (i === 7) {\n        console.log(\"보물 발견! 중단합니다.\");\n        [         ];\n    }\n}","answer":"정답: break"},{"type":"content","title":"⏭️ 건너뛰기: continue","items":["현재 반복 주기만 <span class='accent'>건너뛰고</span> 다음 반복으로 넘어갑니다.","특정 데이터만 처리하고 싶지 않을 때(필터링) 유용합니다.","예: 짝수만 출력하고 싶을 때, 홀수는 continue로 패스!"]},{"type":"code","title":"[실습 5] 홀수만 출력하기 (필터링)","desc":"짝수인 경우 건너뛰고 홀수만 콘솔에 찍히도록 만들어보세요.","code":"for (let i = 1; i <= 10; i++) {\n    if (i % 2 === 0) {\n        [            ]; // 짝수면 아래 코드를 무시하고 다음 i로!\n    }\n    console.log(\"홀수 발견:\", i);\n}","answer":"정답: continue"},{"type":"content","title":"📦 다량의 데이터 일괄 처리 (Preview)","items":["자동화의 핵심은 수많은 데이터 요소를 일관되게 처리하는 것입니다.","아직 배열(Array)을 배우지 않았지만, 반복문이 리스트를 처리하는 방식을 맛봅시다.","<b>자동화 사례:</b> 수천 명의 회원에게 메일 발송, 성적표 일괄 계산 등"]},{"type":"code","title":"[실습 6] 챗봇의 반복 응답","desc":"사용자가 '그만'이라고 할 때까지 계속 말을 따라하는 시스템입니다.","code":"let input = \"\";\nlet logs = [\"안녕\", \"반가워\", \"배고파\", \"그만\", \"졸려\"];\n\nfor (let i = 0; i < logs.length; i++) {\n    input = logs[i];\n    if (input === \"그만\") {\n        console.log(\"시스템 종료\");\n        [         ];\n    }\n    console.log(\"챗봇 메아리: \" + input);\n}","answer":"정답: break"},{"type":"content","title":"🔍 이중 반복문 (Nested Loop)","items":["반복문 안에 또 다른 반복문을 넣을 수 있습니다.","가로/세로 평면 데이터를 다룰 때 필수적입니다.","예: 구구단 전체 출력, 바둑판 좌표 생성 등"]},{"type":"code","title":"[실습 7] 사각형 별 찍기","desc":"이중 루프를 이용해 3x3 별 모양 사각형을 만들어보세요.","code":"for (let i = 0; i < 3; i++) {\n    let stars = \"\";\n    for (let j = 0; j < 3; j++) {\n        stars += \"*\";\n    }\n    console.log(stars);\n}","answer":"실행 결과: 3줄의 ***이 출력됩니다."},{"type":"code","title":"[최종 미션] 369 게임 자동화","desc":"1부터 20까지 숫자 중 3의 배수일 때만 '짝!'을 출력하세요.","code":"for (let i = 1; i <= 20; i++) {\n    if (i % 3 === [    ]) {\n        console.log(\"짝!\");\n    } else {\n        console.log(i);\n    }\n}","answer":"정답: 0 (3으로 나눈 나머지가 0일 때)"},{"type":"title","title":"3교시. 반복문 심화 🔥","subtitle":"<span class='highlight' style='font-size:1.6rem;'>역순/스텝 · 누적 알고리즘 · 소수 판별 · 패턴 출력</span><br><br><span style='color:#888; font-size:1rem;'>단순 반복을 넘어 '알고리즘'을 설계합니다.</span>"},{"type":"content","title":"🔁 루프의 방향과 보폭","items":["for문의 초기값·조건·증감식을 바꾸면 반복을 line += \"*\";\n    }\n    console.log(line);\n}","answer":"정답:\n*\n**\n***\n****\n(i번째 줄에 별 i개 → 계단식 삼각형)"},{"type":"code","title":"[최종 심화 미션] FizzBuzz","desc":"전설의 코딩 테스트 문제. 1~15 출력하되, 3의 배수는 'Fizz', 5의 배수는 'Buzz', 둘 다면 'FizzBuzz'. 빈칸을 채우세요.","code":"for (let i = 1; i <= 15; i++) {\n    if (i % 15 === 0) {\n        console.log(\"FizzBuzz\");\n    } else if (i % 3 === 0) {\n        console.log(\"Fizz\");\n    } else if (i % [    ] === 0) {\n        console.log(\"Buzz\");\n    } else {\n        console.log(i);\n    }\n}","answer":"정답: 5 (핵심: 15(3·5 공배수)를 '가장 먼저' 검사해야 함. 순서를 바꾸면 15에서 Fizz만 나옴)"},{"type":"content","title":"📝 오늘의 요약","items":["<b>while / for:</b> 조건 중심 vs 횟수 중심. 무한 루프 주의!","<b>break / continue:</b> 즉시 탈출 vs 이번만 패스","<b>방향·스텝 제어:</b> 역순, i+=2 등으로 반복 설계","<b>누적/최댓값/플래그:</b> 루프로 기록을 갱신하는 알고리즘 패턴","<b>이중 루프:</b> 패턴 출력과 평면 데이터 처리의 핵심"]},{"type":"title","title":"1주차 모든 과정 완료! 🏆","subtitle":"<span class='highlight'>변수, 연산자, 조건문, 반복문</span><br>기초 4대 요소를 모두 정복했습니다.<br><br><span style='color:#777;'>2주차 예고: 코드를 묶어 쓰는 '함수'와 '배열'</span>"}],"web3-2-1":[{"type":"title","title":"JavaScript 입문: 2주차 5차시","subtitle":"<span class='highlight' style='font-size:2rem;'>기초 문법 종합 복습</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 핵심 문법 총정리 (변수~반복문)<br>2교시: 실무 알고리즘 훈련 (구구단, 필터링, 누적 합계)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["1주차에 배운 <span class='highlight'>변수, 연산자, 조건문, 반복문</span>을 하나의 로직으로 결합합니다.","단순한 문법 암기를 넘어 문제를 해결하는 <span class='highlight'>알고리즘적 사고</span>를 기릅니다.","실무에서 쓰이는 <span class='highlight'>구구단, 짝홀 구분, 데이터 필터링</span> 로직을 숙달합니다.","본격적인 함수와 배열 학습에 앞서 탄탄한 <span class='highlight'>코딩 기초 체력</span>을 완성합니다."]},{"type":"content","title":"1교시. 핵심 문법 퀵 리뷰 (1/2)","items":["<b>변수:</b> 데이터를 담는 상자. <code>const</code>(고정), <code>let</code>(변화).","<b>연산자:</b> 사칙연산부터 비교(<code>===</code>), 논리(<code>&&, ||</code>) 연산까지.","<b>추상화:</b> 복잡한 메모리 주소 대신 이름을 붙여 데이터를 관리하는 법."]},{"type":"content","title":"1교시. 핵심 문법 퀵 리뷰 (2/2)","items":["<b>조건문:</b> <code>if / (Table)</b> 형태의 데이터를 다루기 쉬워집니다."]},{"type":"code","title":"[실습 6] 구구단 짝수 단만 출력하기","desc":"2단, 4단, 6단, 8단만 화면에 나오도록 로직을 설계하세요.","code":"for (let dan = 2; dan <= 9; dan++) {\n    // 단수가 짝수일 때만 실행\n    if (dan % 2 === 0) {\n        console.log(\"--- \" + dan + \"단 ---\");\n        for (let i = 1; i <= 9; i++) {\n            console.log(dan + \" * \" + i + \" = \" + (dan * i));\n        }\n    }\n}","answer":"실행 결과: 2, 4, 6, 8단만 출력됩니다."},{"type":"content","title":"📱 실무 예제: 검색 필터링 로직","items":["수천 개의 데이터 중 조건에 맞는 것만 골라내는 작업입니다.","<b>Case 1:</b> 특정 가격 이하의 상품만 보여주기","<b>Case 2:</b> 특정 단어가 포함된 제목만 리스트업하기","반복문 안에서 <code>if</code>를 사용하여 걸러내는 것이 핵심입니다."]},{"type":"code","title":"[실습 7] 재고 부족 알림 시스템","desc":"재고(stock)가 5개 미만인 상품 번호를 출력하는 자동화 로직입니다.","code":"// 가상의 상품 재고 데이터 (1번~10번 상품)\nfor (let id = 1; id <= 10; id++) {\n    let stock = id * 2 - 3; // 가상의 재고 계산식\n\n    if (stock [    ] 5) {\n        console.log(id + \"번 상품: 재고 부족! 현재 \" + stock + \"개\");\n    } else {\n        console.log(id + \"번 상품: 재고 충분\");\n    }\n}","answer":"정답: <"},{"type":"content","title":"📊 데이터 요약: 누적 계산 알고리즘","items":["전체 합계, 평균, 최대값 등을 구할 때 사용합니다.","반복문 밖에서 <b>변수를 먼저 선언(초기화)</b>하는 것이 포인트입니다.","루프가 돌면서 이 변수에 값을 계속 누적시킵니다."]},{"type":"code","title":"[실습 8] 3의 배수의 합계 구하기","desc":"1부터 30 사이의 숫자 중 3의 배수들만 모두 더해 콘솔에 찍어보세요.","code":"let sumOfThree = 0;\n\nfor (let i = 1; i <= 30; i++) {\n    if (i % 3 === 0) {\n        sumOfThree [    ] i;\n    }\n}\n\nconsole.log(\"합계 결과:\", sumOfThree);","answer":"정답: +="},{"type":"code","title":"[실습 9] 무한 루프 탈출 조건","desc":"while문을 사용해 숫자를 키우다가 100이 넘으면 멈추는 코드를 완성하세요.","code":"let n = 1;\n\nwhile (true) {\n    n *= 2;\n    console.log(\"현재 값:\", n);\n\n    if (n > 100) {\n        console.log(\"100 초과! 중단합니다.\");\n        [         ];\n    }\n}","answer":"정답: break"},{"type":"code","title":"[실습 10] 별 모양 삼각형 만들기","desc":"이중 루프의 꽃! 점점 늘어나는 별을 출력해봅시다.","code":"for (let i = 1; i <= 5; i++) {\n    let row = \"\";\n    for (let j = 1; j <= [    ]; j++) {\n        row += \"*\";\n    }\n    console.log(row);\n}","answer":"정답: i (설명: 행 번호(i)만큼 별의 개수가 늘어나야 합니다.)"},{"type":"content","title":"🚨 복습 시 가장 많이 하는 실수","items":["<b>변수 초기화 위치:</b> 누적 변수를 루프 안에서 선언하면 매번 초기화되어 합계가 0이 됩니다.","<b>무한 루프:</b> <code>while</code>문의 증감식을 까먹으면 브라우저가 멈춰버립니다.","<b>부등호 방향:</b> <code>></code> 와 <code>>=</code> 의 한 끝 차이로 데이터가 하나 더 포함되거나 빠질 수 있습니다."]},{"type":"code","title":"[최종 미션] 3, 6, 9 게임 업그레이드","desc":"1부터 30까지 출력하되, 3/6/9가 포함된 '3의 배수' 자리에만 '짝'을 출력하세요.","code":"for (let i = 1; i <= 30; i++) {\n    if (i % 3 === 0) {\n        console.log(\"짝!\");\n    } else {\n        console.log(i);\n    }\n}","answer":"완성된 코드를 Programiz에서 실행하며 동작 원리를 다시 느껴보세요."},{"type":"content","title":"📝 1주차 과정 최종 요약","items":["이제 여러분은 <b>변수</b>에 데이터를 담고,","<b>연산자</b>로 데이터를 가공하고,","<b>조건문</b>으로 길을 나누고,","<b>반복문</b>으로 작업을 자동화할 수 있게 되었습니다.","<div class='tip-box'>이 네 가지는 모든 프로그래밍 언어의 <b>공통된 심장</b>입니다.</div>"]},{"type":"title","title":"기초 문법 정복 완료! 🎖️","subtitle":"여러분은 이제 자바스크립트의 문법을 '읽는' 것을 넘어 '조립'하기 시작했습니다.<br><br><span style='color:#777;'>다음 차시 예고: 많은 데이터를 한 번에 관리하는 '배열(Array)'</span>"}],"web3-2-6":[{"type":"title","title":"JavaScript 입문: 2주차 6차시","subtitle":"<span class='highlight' style='font-size:2rem;'>함수와 코드의 재사용</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 코드 묶기 (선언, 호출, 매개변수, return)<br>2교시: 현대적 함수 (화살표 함수, 스코프, 콜백)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["반복되는 코드를 하나로 묶는 <span class='highlight'>함수(Function)</span>의 필요성을 이해합니다.","함수의 <span class='highlight'>선언과 호출</span>, 입력(매개변수)과 출력(return)을 익힙니다.","간결한 <span class='highlight'>화살표 함수(=>)</span> 문법을 사용합니다.","함수를 값처럼 다루는 <span class='highlight'>콜백(Callback)</span> 개념을 맛봅니다. (jQuery 준비)"]},{"type":"content","title":"1교시. 왜 함수가 필요한가?","items":["똑같은 코드를 여러 곳에서 반복해서 쓰면, 수정할 때 <span class='warn'>전부 다 고쳐야</span> 합니다.","자주 쓰는 코드 덩어리에 <b>이름표</b>를 붙여두고, 필요할 때 이름만 부르는 것이 함수입니다.","<div class='code-breakdown'>재료(입력) → <b>함수(기계)</b> → 결과물(출력)</div>","변수가 '데이터의 추상화'였다면, 함수는 <span class='accent'>'동작(로직)의 추상화'</span>입니다."]},{"type":"content","title":"🛠️ 함수 선언과 호출","items":["<b>선언:</b> <code>function 이름() { 실행할 코드 }</code> — 기계를 만들어 두는 단계.","<b>호출:</b> <code>이름()</code> — 만들어 둔 기계의 버튼을 누르는 단계.","선언만 하면 아무 일도 안 일어납니다. <span class='warn'>반드시 호출</span>해야 실행됩니다.","<div class='code-breakdown'><b>function sayHi() { console.log('안녕!'); }<br>sayHi(); // 여기서 실행</b></div>"]},{"type":"code","title":"[실습 1] 인사 함수 만들기","desc":"함수를 선언하는 키워드와, 함수를 실행하는 호출 코드를 채워보세요.","code":"[        ] greet() {\n    console.log(\"환영합니다!\");\n}\n\n// 함수를 실제로 실행시키기\n[      ];","answer":"정답: function / greet() (선언만으로는 실행 안 됨, 호출이 있어야 출력됨)"},{"type":"content","title":"📥 매개변수와 인자 (입력)","items":["함수에 <b>값을 전달</b>하면 더 유연해집니다.","<b>매개변수(Parameter):</b> 함수 선언부 소괄호 안의 변수 (받는 그릇)","<b>인자(Argument):</b> 호출할 때 실제로 넣는 값","<div class='code-breakdown'><b>function hello(name) { ... }  ← name은 매개변수<br>hello(\"철수\");           ← \"철수\"는 인자</b></div>"]},{"type":"code","title":"[실습 2] 두 수를 더하는 함수","desc":"두 매개변수를 받아 더한 결과를 돌려주는 함수를 완성하세요.","code":"function add(a, b) {\n    [      ] a + b;\n}\n\nlet result = add(3, 5);\nconsole.log(result);","answer":"정답: return / 출력 결과: 8 (return이 없으면 결과값은 undefined)"},{"type":"content","title":"📤 return: 결과 돌려주기","items":["함수가 계산한 값을 <span class='highlight'>호출한 곳으로 반환</span>합니다.","<code>return</code>을 만나면 함수는 <span class='warn'>즉시 종료</span>됩니다. (아래 코드 실행 안 함)","반환값은 변수에 담거나 다른 계산에 바로 사용할 수 있습니다.","<div class='tip-box'><b>console.log</b>는 '화면에 보여주기', <b>return</b>은 '값을 넘겨주기'. 완전히 다릅니다!</div>"]},{"type":"code","title":"[실습 3] 사각형 넓이 (결과 예측)","desc":"아래 코드가 콘솔에 출력하는 값을 예측해보세요.","code":"function area(width, height) {\n    return width * height;\n    console.log(\"계산 완료!\"); // 이 줄은?\n}\n\nconsole.log(area(4, 5));","answer":"정답: 20 ('계산 완료!'는 출력 안 됨 — return 이후 코드는 절대 실행되지 않음)"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["함수의 3요소(선언/호출, 입력, 출력)를 익혔습니다.","다음 시간에는 더 짧게 쓰는 화살표 함수와, 함수를 '값처럼' 다루는 법을 배웁니다."]},{"type":"content","title":"2교시. 화살표 함수 (Arrow Function)","items":["<code>function</code> 키워드 없이 더 짧게 함수를 만드는 현대 문법입니다.","<div class='code-breakdown'><b>const add = (a, b) => { return a + b; };</b></div>","실행할 코드가 한 줄(return)이면 중괄호와 return을 생략할 수 있습니다.","<div class='code-breakdown'><b>const add = (a, b) => a + b;</b></div>","jQuery 이벤트, 배열 메서드에서 압도적으로 많이 쓰입니다."]},{"type":"code","title":"[실습 4] 화살표 함수로 변환","desc":"아래 일반 함수를 화살표 함수 한 줄로 바꿔보세요.","code":"// 변환 전\nfunction double(n) {\n    return n * 2;\n}\n\n// 변환 후 (빈칸 채우기)\nconst double = (n) [    ] n * 2;","answer":"정답: => (화살표 + 한 줄이면 { }와 return 생략 가능)"},{"type":"content","title":"🚧 함수와 스코프 (지역 변수)","items":["함수 안(중괄호)에서 선언한 변수는 <span class='highlight'>그 함수 안에서만</span> 살아있습니다.","이를 <b>지역 변수(Local Variable)</b>라고 합니다. (3차시 블록 스코프와 동일 원리)","함수 밖에서는 함수 안의 변수를 볼 수 없습니다.","<div class='tip-box'>덕분에 함수마다 변수 이름이 겹쳐도 서로 충돌하지 않습니다.</div>"]},{"type":"code","title":"[실습 5] 스코프 챌린지 (결과 예측)","desc":"다음 코드의 마지막 줄은 어떻게 될까요?","code":"function makeSecret() {\n    let password = \"1234\";\n}\n\nmakeSecret();\nconsole.log(password);","answer":"정답: 에러(ReferenceError) — password는 함수 내부 지역 변수라 밖에서 접근 불가"},{"type":"content","title":"🎁 기본값 매개변수 (Default)","items":["인자를 넘기지 않았을 때 사용할 <b>기본값</b>을 미리 정해둘 수 있습니다.","<div class='code-breakdown'><b>function hi(name = \"손님\") { ... }</b></div>","인자가 없으면(undefined) 기본값이, 있으면 넘긴 값이 사용됩니다.","사용자 입력 누락 같은 상황을 안전하게 처리합니다."]},{"type":"code","title":"[실습 6] 기본값 동작 예측","desc":"두 번의 호출은 각각 무엇을 출력할까요?","code":"function welcome(name = \"게스트\") {\n    console.log(name + \"님 환영합니다\");\n}\n\nwelcome(\"지민\");\nwelcome();","answer":"정답: '지민님 환영합니다' / '게스트님 환영합니다' (두 번째는 인자가 없어 기본값 사용)"},{"type":"content","title":"🔥 심화: 함수도 값이다 (일급 객체)","items":["자바스크립트에서 함수는 숫자·문자열처럼 <span class='highlight'>변수에 담고 전달</span>할 수 있는 '값'입니다.","함수를 <b>다른 함수의 인자로</b> 넘길 수 있는데, 이렇게 넘겨지는 함수를 <span class='accent'>콜백(Callback)</span>이라 합니다.","<div class='code-breakdown'>예: <b>버튼.클릭(실행할_함수)</b> → '클릭되면 이 함수를 대신 실행해줘'","jQuery의 <code>$('#btn').click(function(){ ... })</code> 가 바로 이 콜백 구조입니다."]},{"type":"code","title":"[심화 1] 콜백 함수 (결과 예측)","desc":"run 함수는 받은 함수를 두 번 실행합니다. 출력 결과를 예측하세요.","code":"function run(callback) {\n    callback();\n    callback();\n}\n\nrun(() => console.log(\"삐!\"));","answer":"정답: '삐!' 가 두 줄 출력 (콜백으로 넘긴 함수가 run 안에서 2번 호출됨)"},{"type":"content","title":"🧪 심화: 부작용(Side Effect) 주의","items":["함수가 <b>외부의 변수를 직접 바꾸면</b> 예측하기 어려운 버그가 생깁니다.","가능하면 '입력을 받아 결과만 return'하는 깔끔한 함수를 지향합니다.","<div class='tip-box'>같은 입력 → 항상 같은 출력 + 바깥에 영향 없음 = <b>순수 함수</b> (테스트하기 좋음)</div>"]},{"type":"code","title":"[심화 도전] 장바구니 할인 계산기","desc":"함수를 조합해 최종 결제액을 구합니다. 빈칸을 채우고 결과를 예측하세요.","code":"const getTotal = (price, qty) => price * qty;\nconst applyDiscount = (total, rate) => total * (1 - rate);\n\nlet total = getTotal(10000, 3);      // 합계\nlet final = applyDiscount(total, [    ]); // 10% 할인\n\nconsole.log(\"결제액:\", final);","answer":"정답: 0.1 → 결제액: 27000 (30000의 10% 할인. 함수 출력을 다음 함수 입력으로 연결)"},{"type":"content","title":"📝 오늘의 요약","items":["<b>함수:</b> 동작을 묶어 재사용하는 '로직의 추상화'","<b>매개변수 / return:</b> 함수의 입력과 출력","<b>화살표 함수(=>):</b> 짧고 현대적인 함수 표현","<b>지역 변수:</b> 함수 안에서만 사는 변수","<b>콜백:</b> 함수를 값처럼 인자로 넘기는 패턴 (이벤트의 핵심)"]},{"type":"title","title":"함수 마스터! 🛠️","subtitle":"<span class='highlight'>이제 코드를 부품처럼 조립할 수 있습니다.</span><br><br><span style='color:#777;'>다음 7차시 예고: 여러 데이터를 한 줄로 묶는 '배열(Array)'</span>"}],"web3-2-7":[{"type":"title","title":"JavaScript 입문: 2주차 7차시","subtitle":"<span class='highlight' style='font-size:2rem;'>배열과 데이터 묶음</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 여러 값을 하나로 (인덱스, length, 추가/삭제)<br>2교시: 배열 다루기 (순회, forEach, 유용한 메서드)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["여러 데이터를 하나로 묶는 <span class='highlight'>배열(Array)</span>의 구조를 이해합니다.","<span class='highlight'>인덱스</span>로 값에 접근하고, <code>push/pop</code>으로 데이터를 추가·삭제합니다.","반복문과 <span class='highlight'>forEach</span>로 배열 전체를 순회합니다.","<span class='highlight'>합계·최댓값·검색</span> 같은 실전 데이터 처리를 연습합니다."]},{"type":"content","title":"1교시. 왜 배열이 필요한가?","items":["학생 30명의 점수를 변수 30개로 만든다면? <span class='warn'>score1, score2, ... score30</span> 끔찍합니다.","관련된 값들을 <b>하나의 묶음(리스트)</b>으로 관리하는 것이 배열입니다.","<div class='code-breakdown'><b>let scores = [90, 85, 100];</b></div>","대괄호 <code>[ ]</code> 안에 쉼표로 값을 나열합니다."]},{"type":"content","title":"🔢 인덱스(Index): 자리 번호","items":["배열의 각 값은 <span class='highlight'>0번부터</span> 시작하는 자리 번호를 가집니다.","<div class='code-breakdown'><b>let fruits = [\"사과\", \"바나나\", \"포도\"];<br>fruits[0] → \"사과\",  fruits[2] → \"포도\"</b></div>","<span class='warn'>주의:</span> 첫 번째 값의 번호는 1이 아니라 <b>0</b>입니다.","없는 번호(<code>fruits[5]</code>)에 접근하면 <code>undefined</code>가 나옵니다."]},{"type":"code","title":"[실습 1] 인덱스 접근 (결과 예측)","desc":"각 console.log가 무엇을 출력할지 예측해보세요.","code":"let menu = [\"김밥\", \"라면\", \"돈까스\"];\n\nconsole.log(menu[1]);\nconsole.log(menu[0]);\nconsole.log(menu[3]);","answer":"정답: '라면' / '김밥' / undefined (인덱스는 0부터, 3번 자리는 없음)"},{"type":"content","title":"📏 length & 추가/삭제","items":["<code>배열.length</code> → 배열에 담긴 값의 <b>개수</b>","<code>배열.push(값)</code> → 맨 <span class='accent'>뒤에 추가</span>","<code>배열.pop()</code> → 맨 <span class='warn'>뒤를 꺼내서 제거</span>","<div class='tip-box'>마지막 값의 인덱스는 항상 <b>length - 1</b> 입니다.</div>"]},{"type":"code","title":"[실습 2] push/pop 후 length (예측)","desc":"모든 작업이 끝난 뒤 length는 얼마일까요?","code":"let stack = [10, 20];\n\nstack.push(30);\nstack.push(40);\nstack.pop();\n\nconsole.log(stack);\nconsole.log(stack.length);","answer":"정답: [10, 20, 30] / length는 3 (40 추가 후 pop으로 제거됨)"},{"type":"content","title":"🔁 배열 순회 (for문)","items":["4차시 반복문 + 배열 = 데이터 자동 처리의 핵심 조합.","<code>i</code>를 0부터 <code>length</code> 직전까지 돌리며 <code>배열[i]</code>로 하나씩 꺼냅니다.","<div class='code-breakdown'><b>for (let i = 0; i < arr.length; i++) {<br>&nbsp;&nbsp;console.log(arr[i]);<br>}</b></div>","조건을 <code>i < length</code> 로 쓰는 이유: 인덱스가 0부터라서!"]},{"type":"code","title":"[실습 3] 점수 합계 구하기","desc":"배열의 모든 점수를 더하는 코드를 완성하세요.","code":"let scores = [80, 95, 70];\nlet sum = 0;\n\nfor (let i = 0; i < scores.[      ]; i++) {\n    sum += scores[i];\n}\nconsole.log(\"총점:\", sum);","answer":"정답: length → 총점: 245 (각 요소를 sum에 누적)"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["배열을 만들고, 접근하고, 순회하는 기본기를 익혔습니다.","다음 시간엔 더 편한 순회 방법과 실무용 메서드들을 배웁니다."]},{"type":"content","title":"2교시. forEach: 더 깔끔한 순회","items":["인덱스(i) 관리 없이 배열 요소를 하나씩 꺼내주는 메서드입니다.","6차시에서 배운 <span class='highlight'>콜백 함수</span>를 인자로 받습니다.","<div class='code-breakdown'><b>arr.forEach((item) => {<br>&nbsp;&nbsp;console.log(item);<br>});</b></div>","'각 요소마다 이 함수를 실행해줘'라는 의미입니다."]},{"type":"code","title":"[실습 4] forEach 동작 (예측)","desc":"이 코드는 콘솔에 무엇을 출력할까요?","code":"let pets = [\"강아지\", \"고양이\"];\n\npets.forEach((pet) => {\n    console.log(\"나는 \" + pet + \"를 키운다\");\n});","answer":"정답: '나는 강아지를 키운다' / '나는 고양이를 키운다' (요소마다 콜백 1번씩 실행)"},{"type":"content","title":"🏔️ 최댓값·최솟값 찾기","items":["4차시 심화에서 배운 '기록 갱신' 패턴을 배열에 적용합니다.","최댓값 변수에 <b>현재까지 가장 큰 값</b>을 저장하고, 더 크면 교체합니다.","<div class='code-breakdown'><b>if (arr[i] > max) { max = arr[i]; }</b></div>","최솟값은 <code>&lt;</code> 로, 평균은 <code>합계 / length</code> 로 응용합니다."]},{"type":"code","title":"[실습 5] 최고 점수 찾기","desc":"배열에서 가장 높은 점수를 찾는 코드를 완성하세요.","code":"let scores = [72, 95, 88, 64];\nlet max = scores[0];\n\nfor (let i = 1; i < scores.length; i++) {\n    if (scores[i] [    ] max) {\n        max = scores[i];\n    }\n}\nconsole.log(\"최고점:\", max);","answer":"정답: > → 최고점: 95 (첫 값을 기준으로 두고 더 큰 값을 만나면 갱신)"},{"type":"content","title":"🔍 유용한 배열 메서드","items":["<code>indexOf(값)</code> → 값의 위치(인덱스) 반환, 없으면 <span class='warn'>-1</span>","<code>includes(값)</code> → 값이 있으면 <code>true</code>, 없으면 <code>false</code>","<code>join(\"-\")</code> → 배열을 문자열로 합치기 (\"a-b-c\")","<div class='tip-box'>검색·중복 체크에 <b>includes</b>가 가독성이 가장 좋습니다.</div>"]},{"type":"code","title":"[실습 6] includes 검색 (예측)","desc":"출입 명단을 확인하는 코드입니다. 결과를 예측하세요.","code":"let vipList = [\"김유저\", \"이관리\", \"박손님\"];\n\nconsole.log(vipList.includes(\"이관리\"));\nconsole.log(vipList.includes(\"최외부\"));","answer":"정답: true / false (배열에 해당 값이 존재하는지 검사)"},{"type":"content","title":"🔥 심화: 배열 + 객체 (8차시 빌드업)","items":["실무 데이터는 보통 <b>객체들을 담은 배열</b> 형태입니다.","<div class='code-breakdown'><b>let users = [<br>&nbsp;&nbsp;{ name: \"철수\", age: 20 },<br>&nbsp;&nbsp;{ name: \"영희\", age: 25 }<br>];</b></div>","<code>users[0].name</code> → \"철수\" 처럼 인덱스와 속성을 함께 사용합니다.","다음 8차시(객체)에서 본격적으로 다룹니다."]},{"type":"code","title":"[심화 1] 객체 배열 순회 (예측)","desc":"각 사용자의 이름만 출력합니다. 결과를 예측하세요.","code":"let users = [\n    { name: \"철수\", age: 20 },\n    { name: \"영희\", age: 25 }\n];\n\nusers.forEach((user) => {\n    console.log(user.name);\n});","answer":"정답: '철수' / '영희' (forEach로 각 객체를 꺼낸 뒤 .name 속성 접근)"},{"type":"content","title":"🧪 심화: 숫자 정렬의 함정","items":["<code>sort()</code>는 기본적으로 값을 <b>문자열로 보고</b> 정렬합니다.","그래서 <code>[10, 2, 1].sort()</code> → <span class='warn'>[1, 10, 2]</span> (10이 2보다 앞!)","숫자 정렬은 비교 함수를 넘겨야 합니다: <code>sort((a, b) => a - b)</code>","<div class='tip-box'>이것이 6차시 '콜백 함수'가 실제로 쓰이는 대표 사례입니다.</div>"]},{"type":"code","title":"[심화 도전] 합격자 수 집계","desc":"60점 이상만 합격으로 세는 코드입니다. 빈칸을 채우고 결과를 예측하세요.","code":"let scores = [55, 80, 60, 40, 95];\nlet passCount = 0;\n\nscores.forEach((score) => {\n    if (score [    ] 60) {\n        passCount++;\n    }\n});\nconsole.log(\"합격자 수:\", passCount);","answer":"정답: >= → 합격자 수: 3 (80, 60, 95가 60점 이상)"},{"type":"content","title":"📝 오늘의 요약","items":["<b>배열:</b> 여러 값을 [ ]로 묶고 0부터의 인덱스로 접근","<b>length / push / pop:</b> 개수 확인과 뒤쪽 추가·삭제","<b>순회:</b> for문, 그리고 콜백 기반 forEach","<b>패턴:</b> 합계·최댓값·합격자 집계 등 데이터 처리","<b>배열+객체:</b> 실무 데이터 구조 (8차시로 연결)"]},{"type":"title","title":"배열 마스터! 📦","subtitle":"<span class='highlight'>데이터를 묶고 처리하는 힘을 얻었습니다.</span><br><br><span style='color:#777;'>다음 8차시 예고: 이름표로 데이터를 묶는 '객체(Object)'와 미니 프로젝트</span>"}],"web3-2-8":[{"type":"title","title":"JavaScript 입문: 2주차 8차시","subtitle":"<span class='highlight' style='font-size:2rem;'>객체 기반 문제 풀이 & 프로젝트</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 객체 내 함수 활용 및 데이터 처리 최적화<br>2교시: 미니 프로젝트 - 도서 목록 관리 시스템</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["객체 내부의 <span class='highlight'>메서드</span>를 활용하여 데이터를 유기적으로 가공합니다.","복잡한 <span class='highlight'>비즈니스 로직(입/출금, 상태 변경)</span>을 객체 지향적으로 설계합니다.","데이터 처리 흐름을 최적화하여 <span class='highlight'>가독성 높은 코드</span>를 작성합니다.","<span class='highlight'>도서 목록 관리 시스템</span> 프로젝트를 통해 데이터 구조 설계 능력을 완성합니다."]},{"type":"content","title":"📦 객체(Object)란 무엇인가?","items":["배열이 '순서대로 줄 세운 값들'이라면, 객체는 <span class='highlight'>이름표를 붙여 묶은 값들</span>입니다.","하나의 대상이 가진 여러 정보를 <b>한 덩어리</b>로 표현합니다.","<div class='code-breakdown'>한 사람 = { 이름: \"철수\", 나이: 20, 직업: \"학생\" }</div>","현실의 사물(사용자, 상품, 자동차)을 코드로 옮기는 가장 자연스러운 방법입니다."]},{"type":"content","title":"🤔 왜 객체를 쓰는가?","items":["변수가 흩어지면 관리가 지옥: <span class='warn'>userName, userAge, userJob...</span>","관련된 데이터를 <b>하나의 이름</b>으로 묶으면 전달·관리가 쉬워집니다. (<code>user</code> 하나면 끝)","배열은 '인덱스(0,1,2)'로 찾지만, 객체는 <span class='accent'>의미 있는 이름(key)</span>으로 찾습니다.","<div class='tip-box'>순서가 중요하면 <b>배열</b>, 각 값의 '의미'가 중요하면 <b>객체</b>를 씁니다.</div>"]},{"type":"content","title":"🛠️ 객체 만들기 (key : value)","items":["중괄호 <code>{ }</code> 안에 <span class='highlight'>키(key) : 값(value)</span> 쌍을 쉼표로 나열합니다.","<div class='code-breakdown'><b>const user = {<br>&nbsp;&nbsp;name: \"철수\",   // 키: name, 값: \"철수\"<br>&nbsp;&nbsp;age: 20,<br>&nbsp;&nbsp;isStudent: true<br>};</b></div>","키는 이름표, 값은 그 자리에 담긴 데이터입니다.","값에는 문자열·숫자·불리언·배열·심지어 함수까지 넣을 수 있습니다."]},{"type":"code","title":"[기초 1] 내 프로필 객체 만들기","desc":"키와 값 형식에 맞게 빈칸을 채워 프로필 객체를 완성하세요.","code":"const profile = {\n    name: \"지민\",\n    age[  ] 25,\n    job: \"디자이너\"\n};\n\nconsole.log(profile);","answer":"정답: : (콜론) — 키와 값은 콜론으로 연결, 각 쌍은 쉼표로 구분)"},{"type":"content","title":"🔑 속성 접근: 점(.) 표기법","items":["객체 안의 값을 꺼낼 때는 <code>객체.키</code> 형태로 접근합니다.","<div class='code-breakdown'><b>user.name → \"철수\",  user.age → 20</b></div>","키 이름을 변수에 담아 동적으로 접근할 땐 대괄호: <code>user[\"name\"]</code>","없는 키에 접근하면 배열처럼 <code>undefined</code>가 나옵니다."]},{"type":"code","title":"[기초 2] 속성 접근 (결과 예측)","desc":"각 console.log가 무엇을 출력할지 예측해보세요.","code":"const car = { brand: \"현대\", year: 2024 };\n\nconsole.log(car.brand);\nconsole.log(car[\"year\"]);\nconsole.log(car.color);","answer":"정답: '현대' / 2024 / undefined (점·대괄호 모두 접근 가능, color 키는 없음)"},{"type":"content","title":"✏️ 속성 추가 · 수정 · 삭제","items":["<b>추가/수정:</b> <code>user.email = \"a@b.com\";</code> — 있으면 수정, 없으면 새로 추가","<b>삭제:</b> <code>delete user.age;</code>","객체는 만든 뒤에도 자유롭게 내용을 바꿀 수 있습니다.","<div class='tip-box'><code>const</code>로 선언해도 객체 '내부 속성'은 바꿀 수 있습니다. (재할당만 금지)</div>"]},{"type":"code","title":"[기초 3] 속성 추가·수정 (예측)","desc":"모든 작업 후 user 객체는 어떤 모습일까요?","code":"const user = { name: \"영희\", age: 20 };\n\nuser.age = 21;          // 수정\nuser.city = \"서울\";      // 추가\n\nconsole.log(user);","answer":"정답: { name: \"영희\", age: 21, city: \"서울\" } (age 수정, city 새로 추가)"},{"type":"content","title":"⚙️ 메서드와 this (다음 단계)","items":["객체의 값으로 <b>함수</b>를 넣으면, 그 함수를 <span class='highlight'>메서드(Method)</span>라 부릅니다.","메서드 안에서 <code>this</code>는 <span class='accent'>자기 자신 객체</span>를 가리킵니다.","<div class='code-breakdown'><b>const dog = {<br>&nbsp;&nbsp;name: \"바둑이\",<br>&nbsp;&nbsp;bark: function() { console.log(this.name + \": 멍멍\"); }<br>};<br>dog.bark(); // 바둑이: 멍멍</b></div>","이제 데이터(속성)와 행동(메서드)을 한 객체에 담는 실전으로 들어갑니다. 👇"]},{"type":"content","title":"1교시. 데이터 처리의 중심: 메서드","items":["객체는 단순히 데이터를 담는 '그릇'이 아닙니다.","데이터를 스스로 관리하고 가공하는 <span class='highlight'>행동(Method)</span>이 포함되어야 진짜 객체입니다.","객체 외부에서 데이터를 직접 수정하기보다, 객체 내부 메서드에 요청하는 방식이 더 안전합니다."]},{"type":"content","title":"🧐 데이터 흐름 최적화란?","items":["변수가 사방에 흩어져 있으면 코드가 꼬이기 쉽습니다.","관련된 변수와 함수를 하나의 객체로 <span class='accent'>캡슐화</span>하면 유지보수가 쉬워집니다.","이것이 현대 프로그래밍의 핵심인 <b>객체 지향적 사고(Object-Oriented Thinking)</b>입니다."]},{"type":"code","title":"[실습 1] 은행 계좌 시스템 설계","desc":"입금(deposit)과 출금(withdraw) 기능을 가진 계좌 객체를 완성하세요.","code":"const account = {\n    owner: \"제임스\",\n    balance: 10000,\n    deposit: function(amount) {\n        this.balance += amount;\n        console.log(amount + \"원 입금 완료. 잔액: \" + this.balance);\n    },\n    withdraw: function(amount) {\n        if (this.balance >= amount) {\n            this.balance [    ] amount;\n            console.log(amount + \"원 출금 완료.\");\n        } else {\n            console.log(\"잔액이 부족합니다.\");\n        }\n    }\n};\n\naccount.deposit(5000);\naccount.withdraw(3000);","answer":"정답: -= (출금 시 잔액을 차감합니다.)"},{"type":"code","title":"[실습 2] 성적 처리기 최적화","desc":"국어, 영어, 수학 점수를 합산하고 평균을 반환하는 메서드를 작성하세요.","code":"const student = {\n    name: \"에이미\",\n    scores: { kor: 80, eng: 90, math: 85 },\n    getAverage: function() {\n        const sum = this.scores.kor + this.scores.eng + this.scores.math;\n        return [     ] / 3;\n    }\n};\n\nconsole.log(student.name + \"의 평균 점수: \" + student.getAverage());","answer":"정답: sum (객체 내부 데이터를 활용해 평균을 계산합니다.)"},{"type":"content","title":"⚡ 메서드 체이닝과 가독성","items":["메서드가 실행된 후 <code>return this;</code>를 하면 연속해서 호출할 수 있습니다.","예: <code>account.deposit(100).withdraw(50);</code>","이런 방식은 코드를 더 직관적이고 아름답게 만들어 줍니다."]},{"type":"code","title":"[실습 3] 상태 메시지 생성기","desc":"메시지를 누적하고 출력하는 간단한 로직을 완성해봅시다.","code":"const logger = {\n    logs: \"\",\n    addLog: function(msg) {\n        this.logs += msg + \"\\n\";\n    },\n    printAll: function() {\n        console.log(\"=== 전체 로그 ===\\n\" + [         ]);\n    }\n};\n\nlogger.addLog(\"시스템 시작\");\nlogger.addLog(\"데이터 로드 완료\");\nlogger.printAll();","answer":"정답: this.logs"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["객체 내부에서 <code>this</code>를 활용해 데이터를 처리하는 법을 익혔습니다.","다음 시간에는 '도서 목록 관리'라는 실무 미니 프로젝트를 시작합니다."]},{"type":"content","title":"2교시. 프로젝트: 도서 목록 관리 시스템","items":["우리가 도서관의 개발자가 되었다고 상상해 봅시다.","책 한 권은 하나의 <span class='highlight'>객체</span>로 표현됩니다.","책은 제목(title), 저자(author), 대여여부(isLent)라는 속성을 가집니다.","기능: 정보 보기, 대여하기, 반납하기"]},{"type":"content","title":"📊 데이터 구조 설계 (Modeling)","items":["데이터는 어떻게 생겨야 할까요?","<pre>{\n  title: '자바스크립트 정복',\n  author: '코딩왕',\n  isLent: false\n}</pre>","이 구조가 일관되게 유지되어야 시스템을 안정적으로 운영할 수 있습니다."]},{"type":"code","title":"[프로젝트 1] 도서 객체 기본 설계","desc":"책의 정보를 한 줄로 요약해서 보여주는 메서드를 완성하세요.","code":"const book1 = {\n    title: \"어린왕자\",\n    author: \"생텍쥐페리\",\n    isLent: false,\n    getInfo: function() {\n        const status = this.isLent ? \"[대여 중]\" : \"[대여 가능]\";\n        return status + \" \" + this.title + \" - \" + this.author;\n    }\n};\n\nconsole.log(book1.getInfo());","answer":"실행 결과: [대여 가능] 어린왕자 - 생텍쥐페리"},{"type":"code","title":"[프로젝트 2] 대여 상태 스위치 만들기","desc":"대여 여부를 반전(true <-> false)시키는 메서드를 작성하세요.","code":"const book2 = {\n    title: \"해리포터\",\n    isLent: false,\n    toggleLend: function() {\n        // 현재 상태의 반대값으로 변경합니다.\n        this.isLent = [      ]this.isLent;\n        console.log(this.title + \" 상태 변경 완료!\");\n    }\n};\n\nbook2.toggleLend();\nconsole.log(\"현재 대여 여부:\", book2.isLent);","answer":"정답: ! (NOT 연산자를 통해 상태를 반전시킵니다.)"},{"type":"content","title":"🛠️ 데이터 처리 흐름의 최적화","items":["만약 도서가 3권이라면? <span class='accent'>객체 배열</span>을 활용할 수 있습니다.","반복문과 객체 메서드를 조합하면 수백 권의 책도 한 번에 관리할 수 있습니다.","이것이 우리가 지난 시간부터 배워온 모든 문법의 결합점입니다."]},{"type":"code","title":"[실습 4] 도서 목록 일괄 출력","desc":"배열에 담긴 책 객체들의 정보를 반복문으로 출력해봅시다.","code":"const library = [\n    { title: \"자바\", getInfo: function() { return \"도서: \" + this.title; } },\n    { title: \"파이썬\", getInfo: function() { return \"도서: \" + this.title; } }\n];\n\nfor (let i = 0; i < library.length; i++) {\n    console.log(library[i].[          ]());\n}","answer":"정답: getInfo (배열 안의 각 객체에 접근하여 메서드를 호출합니다.)"},{"type":"code","title":"[최종 미션] 종합 도서 관리 시스템","desc":"책의 대여 상태를 확인하고 대여해주는 시스템을 완성하세요.","code":"const myBook = {\n    title: \"클린 코드\",\n    isLent: false,\n    rentBook: function() {\n        if (this.isLent === true) {\n            console.log(\"이미 대여 중인 책입니다.\");\n        } else {\n            this.isLent = true;\n            console.log(this.title + \" 대여가 완료되었습니다.\");\n        }\n    }\n};\n\nmyBook.rentBook(); // 대여 성공\nmyBook.rentBook(); // 이미 대여 중 메시지 출력","answer":"객체 내부의 데이터(isLent)에 따라 행동이 바뀌는 로직을 이해하세요."},{"type":"content","title":"📝 오늘의 요약","items":["<b>메서드 중심 설계:</b> 데이터 수정은 객체 스스로 하도록 설계합니다.","<b>this의 활용:</b> 메서드 내부에서 자신의 속성에 접근하는 핵심 키워드입니다.","<b>모델링:</b> 현실의 문제를 책, 계좌 같은 객체 구조로 치환하는 과정입니다.","<b>최적화:</b> 캡슐화를 통해 코드의 가독성과 유지보수성을 높입니다."]},{"type":"title","title":"객체 기반 문제 풀이 완료! 🏆","subtitle":"여러분은 이제 데이터를 단순하게 다루는 것을 넘어 '시스템'을 설계하기 시작했습니다.<br><br><span style='color:#777;'>2주차 완료! 수고하셨습니다.</span>"}],"web3-3-9":[{"type":"title","title":"JavaScript 입문: 3주차 9차시","subtitle":"<span class='highlight' style='font-size:2rem;'>제이쿼리(jQuery) 도입 및 선택자</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: JS의 구원자, 제이쿼리 시작하기 (연동 & 기본 선택자)<br>2교시: 더 정교한 타격 (필터 선택자 & DOM 탐색)</span>"},{"type":"content","title":"🎯 오늘의 학습 목표","items":["제이쿼리 라이브러리를 웹 페이지에 <span class='highlight'>연동</span>하는 다양한 방법을 익힙니다.","짧고 강력한 <span class='highlight'>$() 문법</span>과 CSS 선택자 활용법을 마스터합니다.","다양한 <span class='highlight'>필터 선택자</span>를 통해 원하는 요소만 정확히 골라냅니다.","복잡한 HTML 구조 속에서 <span class='highlight'>DOM 접근</span>을 최적화하는 기초를 다집니다."]},{"type":"content","title":"1교시. 'Write Less, Do More': 제이쿼리란?","items":["자바스크립트의 길고 복잡한 코드를 짧게 줄여주는 라이브러리입니다.","브라우저 간의 호환성 문제를 해결해줍니다.","HTML 요소 선택, 이벤트 처리, 애니메이션 구현에 매우 강력합니다.","전 세계 수많은 웹사이트가 여전히 제이쿼리를 기반으로 동작합니다."]},{"type":"content","title":"🔗 라이브러리 연동 (CDN 방식)","items":["직접 파일을 다운로드하지 않고 주소(URL)로 연결하는 방식입니다.","HTML의 <code>&lt;head&gt;</code> 또는 <code>&lt;body&gt;</code> 하단에 <code>&lt;script&gt;</code> 태그를 추가합니다.","<div class='code-breakdown'><b>&lt;script src='https://code.jquery.com/jquery-3.7.1.min.js'&gt;&lt;/script&gt;</b></div>","이 한 줄로 이제 우리는 <span class='accent'>$</span> 마법을 사용할 수 있습니다."]},{"type":"content","title":"🏗️ 제이쿼리의 기본 구조","items":["모든 제이쿼리 코드는 HTML 문서가 준비된 후 실행되어야 안전합니다.","<pre>$(document).ready(function() {\n  // 여기에 코드를 작성합니다.\n});\n\n// 축약형 (권장)\n$(function() {\n  // 실행할 코드\n});</pre>"]},{"type":"content","title":"🎯 핵심 문법: $(선택자).동작()","items":["<b>$</b>: 제이쿼리를 호출하는 식별자입니다.","<b>(선택자)</b>: CSS와 동일한 방식으로 HTML 요소를 지목합니다.","<b>.동작()</b>: 선택한 요소에 수행할 기능(메서드)입니다.","<div class='code-breakdown'><b>$('#title').hide();</b> // 아이디가 title인 요소를 숨겨라</div>"]},{"type":"code","title":"[실습 1] 기본 선택자 활용하기","desc":"아래 HTML 구조에 맞춰 제이쿼리 코드를 완성하세요.","code":"<!-- HTML 구조 -->\n<h1>제이쿼리 실습</h1>\n<div class=\"box\">저는 박스입니다</div>\n<button id=\"btn\">색상 변경</button>\n\n<!-- jQuery 코드 -->\n<script>\n  // 1. 모든 h1 태그의 글자색을 파란색으로!\n  $(\"h1\").css(\"color\", \"blue\");\n\n  // 2. 클래스가 'box'인 요소를 숨기세요.\n  $(\".box\").[      ]();\n\n  // 3. 아이디가 'btn'인 버튼의 배경색을 노란색으로!\n  $(\"#btn\").css(\"background\", \"yellow\");\n<\/script>","answer":"정답: hide (가시성 제어)"},{"type":"content","title":"계층 선택자 (Hierarchy)","items":["<b>자식 선택자:</b> <code>$('ul > li')</code> - ul 바로 아래 li만 선택","<b>후손 선택자:</b> <code>$('div p')</code> - div 안의 모든 p 선택","<b>인접 형제:</b> <code>$('h1 + p')</code> - h1 바로 다음에 오는 p 선택","CSS의 문법을 그대로 사용하므로 매우 직관적입니다."]},{"type":"code","title":"[실습 2] 계층 구조 타격","desc":"특정 영역 안의 요소만 선택하여 스타일을 입혀봅시다.","code":"<!-- HTML 구조 -->\n<div id=\"menu\">\n  <ul>\n    <li>Coffee</li>\n    <li>Tea</li>\n  </ul>\n</div>\n<p>메뉴 밖의 문장</p>\n\n<!-- jQuery 코드 -->\n<script>\n  // #menu 안의 li들만 글자 크기를 20px로 키우세요.\n  $(\"[         ] li\").css(\"font-size\", \"20px\");\n<\/script>","answer":"정답: #menu (공백을 사용하여 후손 요소를 지목합니다.)"},{"type":"content","title":"☕ 쉬는 시간 (10분)","items":["제이쿼리의 강력한 선택자 기초를 익혔습니다.","다음 시간에는 더 정밀하게 요소를 골라내는 '필터'를 배웁니다."]},{"type":"content","title":"2교시. 더 정교한 타격: 필터 선택자","items":["단순한 태그나 클래스 외에 요소의 상태나 순서를 이용해 선택합니다.","<b>:first / :last</b> - 첫 번째나 마지막 요소","<b>:even / :odd</b> - 짝수번째나 홀수번째 요소","<b>:eq(index)</b> - 특정 번호(0부터 시작)의 요소"]},{"type":"content","title":"🔍 속성 및 상태 필터","items":["<b>[attr]</b>: 특정 속성이 있는 요소 (예: <code>[href]</code>)","<b>:contains('텍스트')</b>: 특정 글자가 포함된 요소","<b>:visible / :hidden</b>: 화면에 보이는지 숨겨져 있는지 여부","<b>:checked / :selected</b>: 폼 요소의 상태"]},{"type":"code","title":"[실습 3] 순서 필터 활용","desc":"목록 중 특정 항목만 골라서 강조해보세요.","code":"<!-- HTML 구조 -->\n<ul>\n  <li>사과</li>\n  <li>바나나</li>\n  <li>포도</li>\n  <li>멜론</li>\n</ul>\n\n<!-- jQuery 코드 -->\n<script>\n  // 1. 첫 번째 li의 배경색을 연두색으로!\n  $(\"li:[      ]\").css(\"background\", \"lime\");\n\n  // 2. 인덱스 기준 짝수 번째 li만 글자색 빨간색으로!\n  $(\"li:[      ]\").css(\"color\", \"red\");\n<\/script>","answer":"정답: first / even"},{"type":"content","title":"🌳 DOM 탐색 (Traversal)","items":["선택한 요소를 기준으로 주변 요소로 이동하는 방법입니다.","<b>.parent()</b>: 바로 위 부모 요소","<b>.children()</b>: 바로 아래 자식 요소들","<b>.find('선택자')</b>: 자손들 중 특정 요소 찾기","<b>.siblings()</b>: 같은 층의 모든 형제 요소들"]},{"type":"content","title":"✨ 탐색 메서드의 장점","items":["중간에 다른 동작을 추가하거나 <span class='accent'>체이닝</span>하기 좋습니다.","<div class='tip-box'><b>$('div').addClass('on').find('p').hide();</b><br>div에 클래스를 넣고, '그 안의' p를 찾아 숨기는 연속 작업!</div>"]},{"type":"code","title":"[실습 4] 부모와 형제 찾기","desc":"기준 요소를 중심으로 주변 HTML 구조를 조작하세요.","code":"<!-- HTML 구조 -->\n<div class=\"wrap\">\n  <p>형제 1</p>\n  <p class=\"active\">나 (기준)</p>\n  <p>형제 2</p>\n</div>\n\n<!-- jQuery 코드 -->\n<script>\n  // 1. 기준 요소의 부모(.wrap)에 빨간 테두리를 만듭니다.\n  $(\".active\").[        ]().css(\"border\", \"1px solid red\");\n\n  // 2. 기준 요소를 제외한 나머지 형제들(p)을 숨깁니다.\n  $(\".active\").[          ]().hide();\n<\/script>","answer":"정답: parent / siblings"},{"type":"content","title":"3교시. 실전 선택자 다지기 🎯","items":["지금까지 배운 기본/계층/필터/탐색 선택자를 <span class='highlight'>실제 UI 상황</span>에 적용합니다.","<b>실습 환경:</b> 이제부터 jQuery는 <span class='accent'>jsFiddle</span>에서 연습합니다.","<div class='tip-box'>jsFiddle은 화면이 <b>HTML / CSS / JavaScript</b> 3칸으로 나뉩니다.<br>HTML은 HTML칸에, <code>$(...)</code> 코드는 JavaScript칸에 넣으세요. (jQuery는 좌측 Settings에서 추가)</div>","코드블록 우측 <b>보라색 jsFiddle 버튼</b>으로 바로 이동할 수 있습니다."]},{"type":"content","title":"🔗 그룹 선택자 (콤마)","items":["쉼표<code>,</code>로 여러 선택자를 한 번에 지목할 수 있습니다.","<div class='code-breakdown'><b>$('h1, .box, #btn').css('color', 'red');</b></div>","서로 다른 종류의 요소에 같은 스타일을 적용할 때 코드가 짧아집니다."]},{"type":"code","title":"[실습 5] 그룹 선택자로 한 번에","desc":"제목과 강조 문단을 한 줄의 선택자로 동시에 노란 배경 처리하세요.","code":"<!-- HTML (HTML칸) -->\n<h1>공지사항</h1>\n<p>일반 문단입니다.</p>\n<p class=\"important\">중요! 꼭 읽으세요.</p>\n\n<!-- jQuery (JavaScript칸) -->\n<script>\n  // h1 과 .important 를 한 번에 선택해 배경을 yellow로!\n  $(\"[                 ]\").css(\"background\", \"yellow\");\n<\/script>","answer":"정답: h1, .important (쉼표로 그룹 선택 — 공백은 후손, 쉼표는 동시 선택!)"},{"type":"code","title":"[실습 6] 순서 필터 종합 (:eq / :last / :odd)","desc":"리스트에서 지정한 항목들만 정확히 골라 스타일을 입히세요.","code":"<!-- HTML칸 -->\n<ul>\n  <li>1번 메뉴</li>\n  <li>2번 메뉴</li>\n  <li>3번 메뉴</li>\n  <li>4번 메뉴</li>\n</ul>\n\n<!-- JavaScript칸 -->\n<script>\n  // 1. 인덱스 2번(세 번째) li만 글자 굵게\n  $(\"li:[      ](2)\").css(\"font-weight\", \"bold\");\n  // 2. 맨 마지막 li 배경을 회색으로\n  $(\"li:[    ]\").css(\"background\", \"#ddd\");\n<\/script>","answer":"정답: eq / last (:eq(2)는 0부터 세어 세 번째, :last는 마지막 요소)"},{"type":"content","title":"🌿 .find() vs .children()","items":["<b>.children():</b> <span class='accent'>바로 아래</span> 자식만 (1단계)","<b>.find():</b> <span class='highlight'>모든 자손</span>을 깊이 상관없이 탐색 (n단계)","<div class='code-breakdown'>$('.box').children('p') → .box 직속 p만<br>$('.box').find('p')     → .box 안 모든 깊이의 p</div>","구조가 깊을 때 둘의 결과가 달라지므로 의도에 맞게 선택해야 합니다."]},{"type":"code","title":"[과제 1] 줄무늬(Zebra) 표 만들기","desc":"필터 선택자로 짝/홀 행에 다른 배경색을 줘 가독성 좋은 표를 만드세요.","code":"<!-- HTML칸 -->\n<table border=\"1\">\n  <tr><td>홍길동</td><td>90</td></tr>\n  <tr><td>김영희</td><td>85</td></tr>\n  <tr><td>이철수</td><td>70</td></tr>\n  <tr><td>박지민</td><td>95</td></tr>\n</table>\n\n<!-- JavaScript칸 -->\n<script>\n  // 짝수번째 행은 연회색, 홀수번째 행은 흰색\n  $(\"tr:even\").css(\"background\", \"#f0f0f0\");\n  $(\"tr:[   ]\").css(\"background\", \"#ffffff\");\n<\/script>","answer":"정답: odd (:even/:odd로 행마다 번갈아 배경 → 실무 테이블의 기본 패턴)"},{"type":"code","title":"[과제 2] 내비게이션 활성 메뉴 표시","desc":"현재 위치(2번째 메뉴)를 강조하고, 나머지는 흐리게 만드세요.","code":"<!-- HTML칸 -->\n<nav>\n  <a href=\"#\">홈</a>\n  <a href=\"#\">소개</a>\n  <a href=\"#\">문의</a>\n</nav>\n\n<!-- JavaScript칸 -->\n<script>\n  // 1. 인덱스 1번(소개) 링크를 파란 글씨 + 굵게\n  $(\"nav a:eq(1)\").css({ color: \"blue\", fontWeight: \"bold\" });\n  // 2. '소개'를 제외한 나머지 a는 흐리게(opacity 0.4)\n  $(\"nav a\").not(\":[    ](1)\").css(\"opacity\", \"0.4\");\n<\/script>","answer":"정답: eq → .not(':eq(1)') (선택 + 제외 조합. css에 객체 { }로 여러 속성 동시 지정 가능!)"},{"type":"code","title":"[도전 과제] 실시간 검색 결과 하이라이트","desc":"'서울'이 포함된 항목만 강조하고, 아닌 항목은 숨기는 필터 UI를 구현하세요.","code":"<!-- HTML칸 -->\n<ul id=\"list\">\n  <li>서울 강남구</li>\n  <li>부산 해운대구</li>\n  <li>서울 마포구</li>\n  <li>대구 수성구</li>\n</ul>\n\n<!-- JavaScript칸 -->\n<script>\n  // 1. '서울' 포함 li: 굵게 + 연두 배경\n  $(\"#list li:[              ]('서울')\").css({ fontWeight:\"bold\", background:\"#d4f8d4\" });\n  // 2. '서울' 미포함 li: 화면에서 숨김\n  $(\"#list li\").not(\":contains('서울')\").[    ]();\n<\/script>","answer":"정답: contains / hide (:contains는 텍스트 부분일치 검색. 실제 검색 필터 UI의 축소판!)"},{"type":"content","title":"📝 9차시 핵심 요약","items":["<b>$() 선택자:</b> CSS 문법을 사용하여 HTML 요소를 지목","<b>필터 선택자:</b> 순서(:eq), 상태, 내용(:contains) 기반 정밀 선택","<b>DOM 탐색:</b> parent, find, siblings 등으로 유연한 이동","<div class='tip-box'>제이쿼리는 <b>'어떤 요소를 잡아서(Selector) 어떻게 요리할까(Method)'</b>의 싸움입니다.</div>"]},{"type":"code","title":"[최종 미션] 데이터 필터링 UI 기초","desc":"특정 텍스트를 포함한 리스트만 골라내는 로직입니다.","code":"<!-- HTML 구조 -->\n<ul>\n  <li>사과 (과일)</li>\n  <li>바나나 (과일)</li>\n  <li>오이 (채소)</li>\n  <li>당근 (채소)</li>\n</ul>\n\n<!-- jQuery 코드 -->\n<script>\n  // '과일'이라는 글자가 들어간 li만 굵게 표시하세요.\n  $(\"li:contains('과일')\").css(\"font-weight\", \"bold\");\n\n  // '과일'이 포함되지 않은 나머지 li들은 투명도를 낮추세요.\n  $(\"li\").not(\":contains('과일')\").css(\"opacity\", \"0.5\");\n<\/script>","answer":"미션 완료! :contains와 .not()의 조합을 기억하세요."},{"type":"title","title":"3주차 9차시 종료! 🎉","subtitle":"<span class='highlight'>이제 화면의 어떤 요소든 마음대로 잡을 수 있습니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 클릭하고 움직이는 '제이쿼리 이벤트와 효과'</span>"}],"web3-3-10":[{"type":"title","title":"JavaScript 입문: 3주차 10차시","subtitle":"<span class='highlight' style='font-size:2rem;'>클래스 제어 메서드</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: CSS와 스크립트의 분리 (addClass, removeClass)<br>2교시: 상태 기반 UI 제어 (toggleClass, hasClass)</span>"},{"type":"content","title":"🎯
