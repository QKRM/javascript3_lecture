<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 1주차 2차시 - 연산자와 수치 논리 (퀴즈 모드)</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1, h2 { margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.2rem; font-size: 1.2rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.5rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 1.1rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 1rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .practice-box { background: rgba(250, 204, 21, 0.05); border: 1px solid #facc15; padding: 1.2rem; border-radius: 12px; margin-top: 1rem; }
  .answer-box { background: rgba(74, 222, 128, 0.1); border: 1px solid #4ade80; padding: 1.2rem; border-radius: 12px; margin-top: 1rem; }
  
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  .quiz-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
  .tag-problem { background: #facc15; color: #000; }
  .tag-answer { background: #4ade80; color: #000; }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  // --- 인트로 ---
  { 
    type: "title", 
    title: "JavaScript 입문: 1주차 2차시", 
    subtitle: "<span class='highlight' style='font-size:2rem;'>연산자와 수치 논리</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 숫자 가공하기 (산술 & 대입 연산자)<br>2교시: 똑똑한 판단하기 (관계 & 논리 연산자)</span>" 
  },
  {
    type: "content",
    title: "🎯 오늘의 학습 목표",
    items: [
      "데이터를 더하고 빼는 <span class='highlight'>산술 연산자</span>의 종류와 우선순위를 이해합니다.",
      "변수에 값을 효율적으로 넣는 <span class='highlight'>대입 연산자</span> 활용법을 배웁니다.",
      "데이터가 같은지 다른지 비교하는 <span class='highlight'>일치 연산자(===)</span>를 마스터합니다.",
      "여러 조건을 조합하여 <span class='highlight'>UI 상태</span>를 판단하는 논리를 구축합니다."
    ]
  },

  // --- 1교시 기초 이론 ---
  { 
    type: "content", 
    title: "1교시. 숫자 가공하기: 산술 연산자", 
    items: [
      "자바스크립트는 강력한 계산기입니다.",
      "사칙연산: <code>+</code> (더하기), <code>-</code> (빼기), <code>*</code> (곱하기), <code>/</code> (나누기)",
      "나머지 연산: <span class='accent'>%</span> (나눈 후 남은 나머지 값을 반환)"
    ]
  },
  { 
    type: "content", 
    title: "🧩 나머지 연산자(%)의 마법", 
    items: [
      "나머지 연산자는 프로그래밍에서 매우 자주 쓰입니다.",
      "<b>홀수/짝수 판별:</b> <code>number % 2</code>가 0이면 짝수, 1이면 홀수",
      "<b>배수 확인:</b> <code>number % 3 === 0</code>이면 3의 배수",
      "<b>순환 처리:</b> 일정 숫자 안에서 숫자가 뱅글뱅글 돌게 만들 때 유용합니다."
    ]
  },

  // --- 실습 1: 분리 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[실습 1] 쇼핑몰 장바구니 계산", 
    desc: "상품 가격과 수량을 곱해 총액을 계산하고 수량을 업데이트 하세요.", 
    code: `const price = 15000;
let quantity = 3;

// 1. 총 가격을 계산하여 total에 담으세요.
let total = [          ];

// 2. 상품이 하나 더 추가되었습니다. 복합 대입 연산자를 써보세요.
quantity [      ] 1;`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 1] 쇼핑몰 장바구니 계산", 
    desc: "사칙연산자와 복합 대입 연산자를 활용한 예제입니다.", 
    code: `const price = 15000;
let quantity = 3;

let total = price * quantity; // 곱하기 연산
quantity += 1;                // 복합 대입 (quantity = quantity + 1)

console.log("결제 예정 금액:", price * quantity);`, 
    answer: "정답: price * quantity / +=" 
  },

  // --- 실습 2: 분리 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[실습 2] 홀수 짝수 판별 논리", 
    desc: "나머지 연산자를 사용하여 숫자가 짝수인지 확인하는 코드를 완성하세요.", 
    code: `let num = 24;

// num을 2로 나눈 나머지가 0인지 확인합니다.
let isEven = (num [   ] 2 === 0);

console.log("이 숫자는 짝수인가요?", isEven);`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 2] 홀수 짝수 판별 논리", 
    desc: "나머지(%)가 0이면 나누어 떨어진다는 의미입니다.", 
    code: `let num = 24;

let isEven = (num % 2 === 0);

console.log("이 숫자는 짝수인가요?", isEven); // true`, 
    answer: "정답: % (설명: 2로 나눈 나머지가 0이면 짝수, 1이면 홀수입니다.)" 
  },

  // --- 2교시 기초 이론 ---
  { 
    type: "content", 
    title: "2교시. 똑똑한 판단하기: 관계 연산자", 
    items: [
      "두 값을 비교하여 <span class='highlight'>true</span>(참) 또는 <span class='warn'>false</span>(거짓)를 반환합니다.",
      "<code>> , < , >= , <=</code> : 크기 비교",
      "<code>===</code> : 일치 연산자 (값과 <b>타입</b>이 모두 같아야 함)",
      "<code>!==</code> : 불일치 연산자"
    ]
  },
  { 
    type: "content", 
    title: "🧠 논리 연산자 (Logical)", 
    items: [
      "여러 조건을 조합할 때 사용합니다.",
      "<b>&& (AND):</b> 모든 조건이 true여야 결과가 true",
      "<b>|| (OR):</b> 하나만 true여도 결과가 true",
      "<b>! (NOT):</b> 결과를 반대로 뒤집음 (true -> false)"
    ]
  },

  // --- 실습 3: 분리 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[실습 3] 회원가입 자격 검사", 
    desc: "나이가 20세 이상이고, 약관에 동의한 경우에만 가입이 가능하도록 코드를 짜보세요.", 
    code: `let age = 25;
let isAgreed = true;

// 나이가 20 이상 '이면서' 약관동의가 true여야 합니다.
let canJoin = (age [    ] 20) [    ] isAgreed;

console.log("회원가입 가능 여부:", canJoin);`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 3] 회원가입 자격 검사", 
    desc: "비교 연산자와 AND(&&) 연산자의 조합입니다.", 
    code: `let age = 25;
let isAgreed = true;

let canJoin = (age >= 20) && isAgreed;

console.log("회원가입 가능 여부:", canJoin);`, 
    answer: "정답: >= / && (두 조건이 모두 참이어야 합니다.)" 
  },

  // --- 실습 4: 분리 ---
  { 
    type: "code", 
    isQuiz: true,
    title: "[실습 4] 복합 논리 테스트", 
    desc: "구매액 5만원 이상 혹은 멤버십 등급이 'Gold'인 경우를 판단해보세요.", 
    code: `let price = 30000;
let grade = "Gold";

// 50000원 이상이거나 등급이 Gold여야 합니다.
let freeShipping = (price >= 50000) [    ] (grade === "Gold");

console.log("무료 배송 대상인가요?", freeShipping);`, 
    answer: "????" 
  },
  { 
    type: "code", 
    isQuiz: false,
    title: "[해설 4] 복합 논리 테스트", 
    desc: "둘 중 하나만 만족해도 되는 경우 OR(||) 연산자를 사용합니다.", 
    code: `let price = 30000;
let grade = "Gold";

let freeShipping = (price >= 50000) || (grade === "Gold");

console.log("무료 배송 대상인가요?", freeShipping); // true`, 
    answer: "정답: || (OR 연산자)" 
  },

  { 
    type: "content", 
    title: "📝 오늘의 요약", 
    items: [
      "<b>산술 연산자:</b> 사칙연산과 나머지(%)를 통한 데이터 가공",
      "<b>복합 대입:</b> <code>+=, -=</code> 등으로 변수 업데이트 간소화",
      "<b>일치 연산자(===):</b> 값과 타입을 모두 따지는 엄격한 비교",
      "<b>논리 연산자:</b> <code>&&, ||, !</code>를 활용한 복합적인 상태 판단"
    ]
  },
  { 
    type: "title", 
    title: "수고하셨습니다! 👏", 
    subtitle: "다음 차시: <span class='highlight'>조건문과 흐름 제어 (If / Switch)</span><br><br><span style='color:#777;'>연산자는 조건문의 핵심 재료가 됩니다. 꼭 복습하세요!</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem; margin-bottom:1.5rem; color:#61dafb; line-height:1.2;">${data.title}</h1>
        <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.6rem; line-height:1.6; color:#ccc; margin-top:2rem;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2.5rem; margin-top:0;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  } else if (data.type === 'code') {
    const tagClass = data.isQuiz ? 'tag-problem' : 'tag-answer';
    const tagText = data.isQuiz ? 'PRACTICE : 문제' : 'SOLUTION : 해설';
    const boxClass = data.isQuiz ? 'practice-box' : 'answer-box';
    const accentColor = data.isQuiz ? '#facc15' : '#4ade80';

    contentHtml = `
      <div class="fade-in">
        <div class="quiz-tag ${tagClass}">${tagText}</div>
        <h2 style="font-size:2.2rem; color:${accentColor}; border-bottom:1px solid #333; padding-bottom:1.2rem; margin-bottom:1.2rem; margin-top:0;">${data.title}</h2>
        <p style="font-size:1.2rem; margin-bottom:1rem; color:#aaa;">${data.desc}</p>
        <div style="position:relative;">
          <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        </div>
        <div class="${boxClass}">
          <p style="font-weight:bold; color:${data.isQuiz ? '#f87171' : '#e5e7eb'}; font-size:1.15rem; margin:0;">${data.isQuiz ? '💡 빈칸에 알맞은 코드는?' : '✅ 정답 확인'} : ${data.answer}</p>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide();
  } else if (e.key === 'ArrowLeft') {
    prevSlide();
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
