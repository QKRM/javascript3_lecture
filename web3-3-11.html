<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 3주차 11차시 - 논리 기반 상태 전환 실습</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1 { font-size: 3.5rem; color: #61dafb; line-height: 1.2; margin-bottom: 1rem; }
  h2 { font-size: 2.4rem; color: #4ade80; border-bottom: 1px solid #333; padding-bottom: 1.5rem; margin-bottom: 2rem; margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.1rem; font-size: 1.15rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.2rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 1.05rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 0.5rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .code-breakdown { background: #252525; padding: 1.2rem; border-left: 5px solid #61dafb; margin: 1.1rem 0; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
  .practice-box { background: rgba(250, 204, 21, 0.05); border: 1px solid #facc15; padding: 1.1rem; border-radius: 12px; margin-top: 0.8rem; }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  // --- 인트로 ---
  { 
    type: "title", 
    title: "JavaScript 입문: 3주차 11차시",

  },
  {
    type: "content",

      "각 미션은 <span class='highlight'>요구사항 확인 → 구조 설계 → 로직 구현</span> 순으로 진행됩니다.",
      "단순한 클래스 제어를 넘어 <span class='accent'>부모/자식/형제 관계</span>를 활용한 논리를 구축합니다.",

  // --- MISSION 01 ---
  { 
    type: "content", 
    title: "Mission 01. 야간 모드 토글 스위치", 
    items: [
      "<b>요구사항:</b> 버튼 클릭 시 사이트 전체의 배경과 글자색을 반전시킵니다.",
      "<b>구조:</b> <code>body</code> 태그에 'dark' 클래스를 토글하는 방식을 사용합니다.",

  {

  // --- MISSION 02 ---
  {

      "<b>핵심:</b> <code>hasClass</code>를 사용해 현재 상태를 먼저 파악하세요."
    ]
  },
  { 
    type: "code", 
    title: "[2-1] 알림 배지 구조 설계", 
    desc: "읽지 않은 상태와 읽은 상태의 시각적 차이를 만듭니다.", 
    code: `<style>
  .badge { width: 10px; height: 10px; background: red; border-radius: 50%; }
  /* 읽음(checked) 클래스가 붙으면 배지를 숨깁니다. */
  .badge.[          ] { display: none; }
</style>

<div class="alarm">새 소식이 도착했습니다! <span class="badge"></span></div>
<button id="check-btn">읽음 처리</button>`, 
    answer: "정답: checked (또는 read)" 
  },
  { 
    type: "code", 
    title: "[2-2] 알림 배지 로직 구현", 
    desc: "if문과 hasClass를 조합해 스마트한 로직을 짭니다.", 
    code: `<script>
  $("#check-btn").click(function() {
      // 1. 배지에 이미 'checked' 클래스가 있는지 확인하세요.
      if ( $(".badge").[          ]("checked") ) {
          alert("이미 읽은 알림입니다.");
      } else {
          // 2. 클래스가 없다면 'checked'를 추가하세요.
          $(".badge").[         ]("checked");
      }
  });
<\/script>`, 
    answer: "정답: hasClass / addClass" 
  },

  // --- MISSION 04 (NEW) ---
  { 
    type: "content", 
    title: "Mission 03. 인스타그램 좋아요 버튼", 
    items: [
      "<b>요구사항:</b> 하트 아이콘을 누르면 빨간색으로 변하고, 다시 누르면 돌아옵니다.",
      "<b>추가 기능:</b> 좋아요 상태일 때는 '좋아요 취소' 텍스트를, 아닐 때는 '좋아요'라고 텍스트도 바꿉니다.",
      "<b>힌트:</b> <code>toggleClass</code>와 <code>hasClass</code>를 모두 사용해 보세요."
    ]
  },
  { 
    type: "code", 
    title: "[3-1] 좋아요 구조 설계", 
    desc: "폰트어썸 아이콘을 활용한 구조입니다.", 
    code: `<style>
  .btn-like { color: #ccc; cursor: pointer; font-size: 2rem; }
  /* active 클래스가 붙으면 빨간 하트로 변신! */
  .btn-like.[        ] { color: red; }
</style>

<div class="btn-like">♥</div>
<p id="like-text">좋아요</p>`, 
    answer: "정답: active" 
  },
  { 
    type: "code", 
    title: "[3-2] 좋아요 로직 구현", 
    desc: "상태 전환과 텍스트 변경을 동시에 처리하세요.", 
    code: `<script>
  $(".btn-like").click(function() {
      // 1. 하트의 색상을 토글합니다.
      $(this).toggleClass("active");
      
      // 2. 현재 active 상태인지 체크하여 글자를 바꿔줍니다.
      if ( $(this).[          ]("active") ) {
          $("#like-text").text("좋아요 취소");
      } else {
          $("#like-text").text("좋아요");
      }
  });
<\/script>`, 
    answer: "정답: hasClass" 
  },

  // --- MISSION 03 (Renumbered) ---
  { 
    type: "content", 
    title: "Mission 04. 아코디언 (단일 선택 모드)", 
    items: [
      "<b>요구사항:</b> 여러 질문 중 하나를 클릭하면 답변이 열립니다.",
      "<b>핵심 논리:</b> 내가 열릴 때, 이미 열려있던 다른 답변들은 닫혀야 합니다.",
      "<b>힌트:</b> <code>siblings()</code>로 형제들을 먼저 초기화한 뒤 나를 켭니다."
    ]
  },
  { 
    type: "code", 
    title: "[4-1] 아코디언 구조 설계", 
    desc: "부모 요소에 상태를 주는 방식이 유리합니다.", 
    code: `<style>
  .item .ans { display: none; }
  /* item에 on 클래스가 있을 때만 ans를 보여줍니다. */
  .item.[    ] .ans { display: block; }
</style>

<div class="item">
  <div class="q">질문 1</div><div class="ans">답변 1</div>
</div>
<div class="item">
  <div class="q">질문 2</div><div class="ans">답변 2</div>
</div>`, 
    answer: "정답: on (또는 open)" 
  },
  { 
    type: "code", 
    title: "[4-2] 아코디언 로직 구현", 
    desc: "나만 빼고 모두 닫는 배타적 로직을 구현하세요.", 
    code: `<script>
  $(".q").click(function() {
      let parent = $(this).parent(); // 클릭한 q의 부모 .item
      
      // 1. 다른 모든 형제 item에서 'on' 클래스를 제거하세요.
      parent.[            ]().removeClass("on");
      
      // 2. 클릭한 부모에게 'on' 클래스를 토글하세요.
      parent.[             ]("on");
  });
<\/script>`, 
    answer: "정답: siblings / toggleClass" 
  },

  // --- MISSION 05 (NEW) ---
  { 
    type: "content", 
    title: "Mission 05. 탭 메뉴와 콘텐츠 전환", 
    items: [
      "<b>요구사항:</b> 버튼(Tab)을 누르면 그에 맞는 내용(Panel)이 나타납니다.",
      "<b>논리:</b> 버튼과 패널의 <b>순서(index)</b>가 일치해야 합니다.",
      "<b>활용:</b> <code>eq()</code> 필터와 <code>index()</code> 메서드를 사용해 보세요."
    ]
  },
  { 
    type: "code", 
    title: "[5-1] 탭 구조 설계", 
    desc: "버튼과 내용이 분리된 전형적인 탭 구조입니다.", 
    code: `<style>
  .panel { display: none; padding: 50px; background: #222; }
  .panel.active { display: block; } /* 선택된 내용만 노출 */
  .tab.active { color: #61dafb; border-bottom: 2px solid; }
</style>

<div class="tabs">
  <button class="tab active">공지사항</button>
  <button class="tab">자유게시판</button>
</div>
<div class="panels">
  <div class="panel active">공지 리스트...</div>
  <div class="panel">자유글 리스트...</div>
</div>`, 
    answer: "정답: active (CSS 상태 설계)" 
  },
  { 
    type: "code", 
    title: "[5-2] 탭 로직 구현", 
    desc: "클릭한 버튼의 번호를 찾아 해당 패널을 보여줍니다.", 
    code: `<script>
  $(".tab").click(function() {
      // 1. 몇 번째 탭을 눌렀는지 번호를 가져옵니다.
      let idx = $(this).[         ](); 
      
      // 2. 모든 탭과 패널에서 active를 제거(초기화)합니다.
      $(".tab, .panel").removeClass("active");
      
      // 3. 누른 탭(this)과 그 번호에 맞는 패널(eq)에 active를 줍니다.
      $(this).addClass("active");
      $(".panel").[      ](idx).addClass("active");
  });
<\/script>`, 
    answer: "정답: index / eq" 
  },

  // --- 최종 실습 미션 ---
  { 
    type: "content", 
    title: "🔥 Final Mission: 사이드바 풀다운 메뉴", 
    items: [
      "<b>미션 내용:</b> 햄버거 버튼을 누르면 사이드바가 슬라이드하며 나타납니다.",
      "<b>요구사항:</b> 사이드바가 이미 열려있다면 닫고, 닫혀있다면 엽니다.",

  /* 'open' 클래스가 있을 때 화면 안으로 들어옵니다. */

</style>

<button id="toggle-btn">☰</button>
<div class="sidebar">메뉴 리스트...</div>`,

  },
  { 
    type: "code", 
    title: "[최종-2] 사이드바 로직 구현", 
    desc: "메서드를 총동원해 기능을 완성하세요.", 
    code: `<script>
  $("#toggle-btn").click(function() {
      // 1. 사이드바의 open 클래스를 토글하세요.
      $(".sidebar").[             ]("open");
      
      // 2. 현재 사이드바가 열렸는지(hasClass) 체크해 콘솔을 찍으세요.
      if ( $(".sidebar").[          ]("open") ) {
          console.log("메뉴가 열렸습니다.");
      }
  });
<\/script>`, 
    answer: "정답: toggleClass / hasClass" 
  },
  { 
    type: "content", 
    title: "📝 11차시 실습 총정리", 
    items: [
      "<b>Event-Driven:</b> 모든 동작은 '클릭' 같은 사용자의 행동에서 시작됩니다.",
      "<b>State Control:</b> JS로 모든 디자인을 바꾸려 하지 말고 '클래스'를 갈아 끼우세요.",
      "<b>Traversal:</b> <code>parent</code>, <code>siblings</code>를 알면 HTML 구조를 정복할 수 있습니다.",
      "<b>Condition:</b> <code>hasClass</code>는 복잡한 UI 시나리오를 만드는 핵심 열쇠입니다."
    ]
  },
  { 
    type: "title", 
    title: "실습 과정 완료! 🎖️", 
    subtitle: "<span class='highlight'>이제 여러분은 기획안을 코드로 옮기는 '진짜 개발'을 시작했습니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 실시간 데이터 조작 '콘텐츠 제어 메서드'</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem; margin-bottom:1.5rem; color:#61dafb; line-height:1.2;">${data.title}</h1>
        <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.6rem; line-height:1.6; color:#ccc; margin-top:2rem;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2.2rem; margin-top:0;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  } else if (data.type === 'code') {
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.1rem; color:#facc15; border-bottom:1px solid #333; padding-bottom:1rem; margin-bottom:1rem; margin-top:0;">${data.title}</h2>
        <p style="font-size:1.15rem; margin-bottom:1rem; color:#aaa;">${data.desc}</p>
        <div style="position:relative;">
          <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        </div>
        <div class="practice-box">
          <p style="font-weight:bold; color:#f87171; font-size:1.1rem; margin:0;">💡 ${data.answer}</p>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide();
  } else if (e.key === 'ArrowLeft') {
    prevSlide();
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
