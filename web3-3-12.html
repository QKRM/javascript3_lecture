      // body에 클래스를 추가하여 뒷배경 스크롤을 물리적으로 잠금
      $("body").addClass("no-scroll"); 
  });

  // 2. 모달 본문 영역을 클릭했을 때의 보호 기능 (중요!)
  $(".modal-content").click(function(e) {
      // 클릭 신호가 부모인 배경(.modal-bg)으로 전달되는 것을 가로막음
      e.stopPropagation(); 
  });

  // 3. 배경 영역 혹은 X 버튼을 클릭하여 모달을 닫는 기능
  $(".modal-bg, .close-x").click(function() {
      // 배경을 서서히 사라지게 함 (닫기)
      $(".modal-bg").fadeOut(); 
      // body에서 스크롤 잠금 클래스를 제거하여 다시 스크롤 허용
      $("body").removeClass("no-scroll"); 
  });
<\/script>`, 
    answer: "완성: 실제 서비스에서 즉시 사용 가능한 수준의 모달 시스템입니다." 
  },
  { 
    type: "content", 
    title: "📝 12차시 핵심 총정리", 
    items: [
      "<b>Modal Layout:</b> <code>fixed</code> 배경과 <code>absolute</code> 본문의 부모-자식 관계 설계",
      "<b>Content Control:</b> 열기 직전에 <code>.text()</code> 등을 사용해 내용을 실시간 가공",
      "<b>Event Bubbling:</b> 자식의 사건이 부모에게 보고되는 웹 브라우저의 기본 특성",
      "<b>stopPropagation:</b> 사건의 상위 전달을 막아 UI 오작동(버그)을 해결하는 도구",
      "<b>UX Manner:</b> 팝업 오픈 시 <code>body</code> 스크롤 제어는 필수"
    ]
  },
  { 
    type: "title", 
    title: "12차시 마스터! 🏆", 
    subtitle: "<span class='highlight'>여러분은 이제 복잡한 UI의 사건 전파를 완벽히 지배합니다.</span><br><br><span style='color:#777;'>수고하셨습니다. 이제 나만의 프로젝트를 시작할 준비가 되었습니다!</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `<div style="text-align:center;" class="fade-in">
      <h1 style="font-size:3.5rem;">${data.title}</h1>
      <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
      <p style="font-size:1.6rem;">${data.subtitle}</p>
    </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `<div class="fade-in">
      <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem;">${data.title}</h2>
      <ul>${lis}</ul>
    </div>`;
  } else if (data.type === 'code') {
    contentHtml = `<div class="fade-in">
      <h2 style="font-size:2.1rem; color:#facc15; border-bottom:1px solid #333; padding-bottom:0.8rem;">${data.title}</h2>
      <p style="font-size:1.05rem; color:#aaa; margin-bottom:0.8rem;">${data.desc}</p>
      <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
      <div class="practice-box"><p style="font-weight:bold; color:#61dafb; margin:0;">💡 완성된 예시 코드입니다. 한 줄씩 주석을 분석하며 전체 흐름을 파악하세요.</p></div>
    </div>`;
  }

  app.innerHTML = `<div class="slide-content">${contentHtml}</div><div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>`;
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() { if (currentIndex < slideData.length - 1) { currentIndex++; renderSlide(currentIndex); } }
function prevSlide() { if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); } }
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight' || e.key === ' ') nextSlide(); else if (e.key === 'ArrowLeft') prevSlide(); });
renderSlide(currentIndex);
</script>
