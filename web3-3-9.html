<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 3주차 9차시 - 제이쿼리 도입 및 선택자</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1100px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3.5rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 620px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1 { font-size: 3.5rem; color: #61dafb; line-height: 1.2; margin-bottom: 1rem; }
  h2 { font-size: 2.4rem; color: #4ade80; border-bottom: 1px solid #333; padding-bottom: 1.5rem; margin-bottom: 2rem; margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.1rem; font-size: 1.15rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.2rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 0.95rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.5;
    margin: 0.8rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .code-breakdown { background: #252525; padding: 1.2rem; border-left: 5px solid #61dafb; margin: 1.1rem 0; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
  .practice-box { background: rgba(250, 204, 21, 0.05); border: 1px solid #facc15; padding: 1.1rem; border-radius: 12px; margin-top: 0.8rem; }
  .tip-box { background: rgba(97, 218, 251, 0.05); border: 1px solid #61dafb; padding: 1.5rem; border-radius: 12px; margin-top: 1rem; }

  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  // --- 인트로 ---
  { 
    type: "title", 
    title: "JavaScript 입문: 3주차 9차시", 
    subtitle: "<span class='highlight' style='font-size:2rem;'>제이쿼리(jQuery) 도입 및 선택자</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: JS의 구원자, 제이쿼리 시작하기 (연동 & 기본 선택자)<br>2교시: 더 정교한 타격 (필터 선택자 & DOM 탐색)</span>" 
  },
  {
    type: "content",
    title: "🎯 오늘의 학습 목표",

      "짧고 강력한 <span class='highlight'>$() 문법</span>과 CSS 선택자 활용법을 마스터합니다.",
      "다양한 <span class='highlight'>필터 선택자</span>를 통해 원하는 요소만 정확히 골라냅니다.",
      "복잡한 HTML 구조 속에서 <span class='highlight'>DOM 접근</span>을 최적화하는 기초를 다집니다."
    ]
  },

  // --- 1교시: 제이쿼리 도입 및 기본 선택자 ---
  { 
    type: "content", 
    title: "1교시. 'Write Less, Do More': 제이쿼리란?", 
    items: [
      "자바스크립트의 길고 복잡한 코드를 짧게 줄여주는 라이브러리입니다.",
      "브라우저 간의 호환성 문제를 해결해줍니다.",
      "HTML 요소 선택, 이벤트 처리, 애니메이션 구현에 매우 강력합니다.",
      "전 세계 수많은 웹사이트가 여전히 제이쿼리를 기반으로 동작합니다."
    ]
  },
  { 
    type: "content", 
    title: "🔗 라이브러리 연동 (CDN 방식)", 
    items: [
      "직접 파일을 다운로드하지 않고 주소(URL)로 연결하는 방식입니다.",
      "HTML의 <code>&lt;head&gt;</code> 또는 <code>&lt;body&gt;</code> 하단에 <code>&lt;script&gt;</code> 태그를 추가합니다.",
      "<div class='code-breakdown'><b>&lt;script src='https://code.jquery.com/jquery-3.7.1.min.js'&gt;&lt;/script&gt;</b></div>",
      "이 한 줄로 이제 우리는 <span class='accent'>$</span> 마법을 사용할 수 있습니다."
    ]
  },
  { 
    type: "content", 
    title: "🏗️ 제이쿼리의 기본 구조", 
    items: [
      "모든 제이쿼리 코드는 HTML 문서가 준비된 후 실행되어야 안전합니다.",
      "<pre>$(document).ready(function() {\n  // 여기에 코드를 작성합니다.\n});\n\n// 축약형 (권장)\n$(function() {\n  // 실행할 코드\n});</pre>"
    ]
  },
  { 
    type: "content", 
    title: "🎯 핵심 문법: $(선택자).동작()", 
    items: [
      "<b>$</b>: 제이쿼리를 호출하는 식별자입니다.",
      "<b>(선택자)</b>: CSS와 동일한 방식으로 HTML 요소를 지목합니다.",
      "<b>.동작()</b>: 선택한 요소에 수행할 기능(메서드)입니다.",
      "<div class='code-breakdown'><b>$('#title').hide();</b> // 아이디가 title인 요소를 숨겨라</div>"
    ]
  },
  { 
    type: "code", 
    title: "[실습 1] 기본 선택자 활용하기", 
    desc: "아래 HTML 구조에 맞춰 제이쿼리 코드를 완성하세요.", 
    code: `<!-- HTML 구조 -->
<h1>제이쿼리 실습</h1>
<div class="box">저는 박스입니다</div>
<button id="btn">색상 변경</button>

<!-- jQuery 코드 -->
<script>
  // 1. 모든 h1 태그의 글자색을 파란색으로!
  $("h1").css("color", "blue");

  // 2. 클래스가 'box'인 요소를 숨기세요.
  $(".box").[      ]();

  // 3. 아이디가 'btn'인 버튼의 배경색을 노란색으로!
  $("#btn").css("background", "yellow");
<\/script>`, 
    answer: "정답: hide (가시성 제어)" 
  },
  { 
    type: "content", 
    title: "계층 선택자 (Hierarchy)", 
    items: [
      "<b>자식 선택자:</b> <code>$('ul > li')</code> - ul 바로 아래 li만 선택",
      "<b>후손 선택자:</b> <code>$('div p')</code> - div 안의 모든 p 선택",
      "<b>인접 형제:</b> <code>$('h1 + p')</code> - h1 바로 다음에 오는 p 선택",
      "CSS의 문법을 그대로 사용하므로 매우 직관적입니다."
    ]
  },
  { 
    type: "code", 
    title: "[실습 2] 계층 구조 타격", 
    desc: "특정 영역 안의 요소만 선택하여 스타일을 입혀봅시다.", 
    code: `<!-- HTML 구조 -->
<div id="menu">
  <ul>
    <li>Coffee</li>
    <li>Tea</li>
  </ul>
</div>
<p>메뉴 밖의 문장</p>

<!-- jQuery 코드 -->
<script>
  // #menu 안의 li들만 글자 크기를 20px로 키우세요.
  $("[         ] li").css("font-size", "20px");
<\/script>`, 
    answer: "정답: #menu (공백을 사용하여 후손 요소를 지목합니다.)" 
  },
  { 
    type: "content", 
    title: "☕ 쉬는 시간 (10분)", 
    items: [
      "제이쿼리의 강력한 선택자 기초를 익혔습니다.",
      "다음 시간에는 더 정밀하게 요소를 골라내는 '필터'를 배웁니다."
    ]
  },

  // --- 2교시: 필터 선택자 및 DOM 탐색 ---
  { 
    type: "content", 
    title: "2교시. 더 정교한 타격: 필터 선택자", 
    items: [
      "단순한 태그나 클래스 외에 요소의 상태나 순서를 이용해 선택합니다.",
      "<b>:first / :last</b> - 첫 번째나 마지막 요소",
      "<b>:even / :odd</b> - 짝수번째나 홀수번째 요소",
      "<b>:eq(index)</b> - 특정 번호(0부터 시작)의 요소"
    ]
  },
  { 
    type: "content", 
    title: "🔍 속성 및 상태 필터", 
    items: [
      "<b>[attr]</b>: 특정 속성이 있는 요소 (예: <code>[href]</code>)",
      "<b>:contains('텍스트')</b>: 특정 글자가 포함된 요소",
      "<b>:visible / :hidden</b>: 화면에 보이는지 숨겨져 있는지 여부",
      "<b>:checked / :selected</b>: 폼 요소의 상태"
    ]
  },
  { 
    type: "code", 
    title: "[실습 3] 순서 필터 활용", 
    desc: "목록 중 특정 항목만 골라서 강조해보세요.", 
    code: `<!-- HTML 구조 -->
<ul>
  <li>사과</li>
  <li>바나나</li>
  <li>포도</li>
  <li>멜론</li>
</ul>

<!-- jQuery 코드 -->
<script>
  // 1. 첫 번째 li의 배경색을 연두색으로!
  $("li:[      ]").css("background", "lime");

  // 2. 인덱스 기준 짝수 번째 li만 글자색 빨간색으로!
  $("li:[      ]").css("color", "red");
<\/script>`, 
    answer: "정답: first / even" 
  },
  { 
    type: "content", 
    title: "🌳 DOM 탐색 (Traversal)", 
    items: [
      "선택한 요소를 기준으로 주변 요소로 이동하는 방법입니다.",
      "<b>.parent()</b>: 바로 위 부모 요소",
      "<b>.children()</b>: 바로 아래 자식 요소들",
      "<b>.find('선택자')</b>: 자손들 중 특정 요소 찾기",
      "<b>.siblings()</b>: 같은 층의 모든 형제 요소들"
    ]
  },
  { 
    type: "content", 
    title: "✨ 탐색 메서드의 장점", 
    items: [
      "중간에 다른 동작을 추가하거나 <span class='accent'>체이닝</span>하기 좋습니다.",
      "<div class='tip-box'><b>$('div').addClass('on').find('p').hide();</b><br>div에 클래스를 넣고, '그 안의' p를 찾아 숨기는 연속 작업!</div>"
    ]
  },
  { 
    type: "code", 
    title: "[실습 4] 부모와 형제 찾기", 
    desc: "기준 요소를 중심으로 주변 HTML 구조를 조작하세요.", 
    code: `<!-- HTML 구조 -->
<div class="wrap">
  <p>형제 1</p>
  <p class="active">나 (기준)</p>
  <p>형제 2</p>
</div>

<!-- jQuery 코드 -->
<script>
  // 1. 기준 요소의 부모(.wrap)에 빨간 테두리를 만듭니다.
  $(".active").[        ]().css("border", "1px solid red");

  // 2. 기준 요소를 제외한 나머지 형제들(p)을 숨깁니다.
  $(".active").[          ]().hide();
<\/script>`, 
    answer: "정답: parent / siblings" 
  },
  { 
    type: "content", 
    title: "📝 9차시 핵심 요약", 
    items: [
      "<b>$() 선택자:</b> CSS 문법을 사용하여 HTML 요소를 지목",
      "<b>필터 선택자:</b> 순서(:eq), 상태, 내용(:contains) 기반 정밀 선택",
      "<b>DOM 탐색:</b> parent, find, siblings 등으로 유연한 이동",
      "<div class='tip-box'>제이쿼리는 <b>'어떤 요소를 잡아서(Selector) 어떻게 요리할까(Method)'</b>의 싸움입니다.</div>"
    ]
  },
  { 
    type: "code", 
    title: "[최종 미션] 데이터 필터링 UI 기초", 
    desc: "특정 텍스트를 포함한 리스트만 골라내는 로직입니다.", 
    code: `<!-- HTML 구조 -->
<ul>
  <li>사과 (과일)</li>
  <li>바나나 (과일)</li>
  <li>오이 (채소)</li>
  <li>당근 (채소)</li>
</ul>

<!-- jQuery 코드 -->
<script>
  // '과일'이라는 글자가 들어간 li만 굵게 표시하세요.
  $("li:contains('과일')").css("font-weight", "bold");

  // '과일'이 포함되지 않은 나머지 li들은 투명도를 낮추세요.
  $("li").not(":contains('과일')").css("opacity", "0.5");
<\/script>`, 
    answer: "미션 완료! :contains와 .not()의 조합을 기억하세요." 
  },
  { 
    type: "title", 
    title: "3주차 9차시 종료! 🎉", 
    subtitle: "<span class='highlight'>이제 화면의 어떤 요소든 마음대로 잡을 수 있습니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 클릭하고 움직이는 '제이쿼리 이벤트와 효과'</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `
      <div style="text-align:center;" class="fade-in">
        <h1 style="font-size:3.5rem; margin-bottom:1.5rem; color:#61dafb; line-height:1.2;">${data.title}</h1>
        <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
        <p style="font-size:1.6rem; line-height:1.6; color:#ccc; margin-top:2rem;">${data.subtitle}</p>
      </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem; margin-bottom:2.2rem; margin-top:0;">${data.title}</h2>
        <ul>${lis}</ul>
      </div>`;
  } else if (data.type === 'code') {
    contentHtml = `
      <div class="fade-in">
        <h2 style="font-size:2.1rem; color:#facc15; border-bottom:1px solid #333; padding-bottom:1rem; margin-bottom:1rem; margin-top:0;">${data.title}</h2>
        <p style="font-size:1.15rem; margin-bottom:1rem; color:#aaa;">${data.desc}</p>
        <div style="position:relative;">
          <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
        </div>
        <div class="practice-box">
          <p style="font-weight:bold; color:#f87171; font-size:1.1rem; margin:0;">💡 ${data.answer}</p>
        </div>
      </div>`;
  }

  app.innerHTML = `
    <div class="slide-content">
      ${contentHtml}
    </div>
    <div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>
  `;
  
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() {
  if (currentIndex < slideData.length - 1) {
    currentIndex++;
    renderSlide(currentIndex);
  }
}

function prevSlide() {
  if (currentIndex > 0) {
    currentIndex--;
    renderSlide(currentIndex);
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ') {
    nextSlide();
  } else if (e.key === 'ArrowLeft') {
    prevSlide();
  }
});

renderSlide(currentIndex);
</script>
</body>
</html>
