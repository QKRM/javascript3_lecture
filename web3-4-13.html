<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS 4주차 13차시 - 아코디언 메뉴 기초 및 심화</title>
<style>
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #121212; 
    color: #e5e7eb; 
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif; 
  }
  .slide-container { 
    height: 100vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 2rem; 
    position: relative;
  }
  .slide-content { 
    max-width: 1150px; 
    width: 100%; 
    background: #1e1e1e; 
    padding: 3rem; 
    border-radius: 24px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
    box-sizing: border-box;
    min-height: 650px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border: 1px solid #333;
    transition: all 0.3s ease;
  }
  h1 { font-size: 3.2rem; color: #61dafb; line-height: 1.2; margin-bottom: 1rem; }
  h2 { font-size: 2.2rem; color: #4ade80; border-bottom: 1px solid #333; padding-bottom: 1.5rem; margin-bottom: 2rem; margin-top: 0; }
  ul { list-style-type: none; padding-left: 0; }
  li { position: relative; padding-left: 2rem; margin-bottom: 1.1rem; font-size: 1.15rem; line-height: 1.6; color: #d1d5db; }
  li::before { content: '→'; position: absolute; left: 0; color: #61dafb; font-weight: bold; }
  
  pre { 
    background: #0d0d0d; 
    padding: 1.2rem; 
    border-radius: 12px; 
    overflow-x: auto; 
    font-family: 'Fira Code', 'Consolas', monospace; 
    font-size: 0.9rem; 
    color: #9cdcfe; 
    border: 1px solid #2d2d2d; 
    line-height: 1.4;
    margin: 0.5rem 0;
  }
  
  .nav-btn { 
    position: absolute; 
    top: 50%; 
    transform: translateY(-50%); 
    background: rgba(255,255,255,0.03); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; 
    font-size: 1.5rem; 
    width: 54px;
    height: 54px;
    cursor: pointer; 
    border-radius: 50%; 
    transition: all 0.3s; 
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover { background: #61dafb; color: #000; border-color: #61dafb; transform: translateY(-50%) scale(1.1); }
  #prevBtn { left: 2.5rem; }
  #nextBtn { right: 2.5rem; }
  
  .page-num { position: absolute; bottom: 2.5rem; right: 4rem; font-size: 1.1rem; color: #555; font-weight: 600; letter-spacing: 2px; }
  .highlight { color: #61dafb; font-weight: 700; }
  .accent { color: #4ade80; font-weight: 700; }
  .warn { color: #f87171; font-weight: 700; }
  
  .practice-box { background: rgba(97, 218, 251, 0.05); border: 1px solid #61dafb; padding: 1.1rem; border-radius: 12px; margin-top: 0.8rem; }
  .fade-in { animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<button id="prevBtn" class="nav-btn" onclick="prevSlide()">&#10094;</button>
<div class="slide-container" id="app"></div>
<button id="nextBtn" class="nav-btn" onclick="nextSlide()">&#10095;</button>

<script>
const slideData = [
  // --- Intro ---
  { 
    type: "title", 
    title: "JavaScript 입문: 4주차 13차시", 
    subtitle: "<span class='highlight' style='font-size:2rem;'>아코디언 메뉴: 설계부터 심화까지</span><br><br><span style='color:#888; font-size:1.1rem;'>1교시: 높이 기반 애니메이션과 구조 설계<br>2교시: 상호 배타적 로직과 UI 피드백(Icon Control)</span>" 
  },
  {
    type: "content",
    title: "🎯 오늘의 학습 목표",
    items: [
      "높이(height)를 부드럽게 조절하는 <span class='highlight'>slide계열 메서드</span>의 원리를 이해합니다.",
      "콘텐츠를 숨기고 펼치는 <span class='highlight'>아코디언 UI</span>의 표준 마크업을 구축합니다.",
      "동시에 하나만 열리는 <span class='highlight'>상호 배타적 로직(Mutual Exclusion)</span>을 설계합니다.",
      "<span class='highlight'>CSS Transform</span>과 연동하여 상태에 따라 회전하는 아이콘 기능을 구현합니다.",
      "<span class='highlight'>.is(':visible')</span> 상태 체크를 통해 지능적인 분기 처리를 실습합니다."
    ]
  },

  // --- 1교시 ---
  { 
    type: "content", 
    title: "1교시. 아코디언 메뉴의 핵심 원리", 
    items: [
      "<b>메커니즘:</b> 사용자가 제목을 클릭하면, 숨겨져 있던 자식 요소의 높이가 실시간으로 계산되며 노출됩니다.",
      "<b>UX 장점:</b> 한정된 모바일 화면에서 방대한 양의 정보를 효율적으로 노출할 수 있습니다.",
      "<b>주의사항:</b> 초기 상태에서 내용 영역은 반드시 <code>display: none;</code> 이어야 합니다."
    ]
  },
  { 
    type: "code", 
    title: "[실습 1-1] 아코디언 기본 구조 (CSS)", 
    desc: "내용 영역을 감추고 아이템 간의 경계를 구분합니다.", 
    code: `<style>
  /* 메뉴 전체 컨테이너 */
  .accordion { width: 400px; border-top: 1px solid #444; }
  
  /* 각 질문(제목) 박스 */
  .title { 
    padding: 20px; background: #2c2c2c; cursor: pointer; 
    border-bottom: 1px solid #444; position: relative;
  }
  
  /* [중요] 답변 영역 - 초기값은 무조건 숨김 */
  .content { 
    padding: 20px; background: #1a1a1a; color: #bbb;
    display: none; /* 슬라이드 동작을 위해 필수 */
    border-bottom: 1px solid #444;
  }
</style>`, 
    answer: "설명: display: none이 없다면 페이지 로딩 시 모든 답변이 펼쳐져 보입니다." 
  },
  { 
    type: "code", 
    title: "[실습 1-2] 기초 슬라이드 로직 (JS)", 
    desc: "가장 단순한 토글 기능을 주석과 함께 확인하세요.", 
    code: `<script>
  // 모든 .title 요소를 감시합니다.
  $(".title").click(function() {
      // 1. 클릭한 제목 바로 다음에 위치한(.next) 요소를 선택합니다.
      // 2. 해당 요소의 상태에 따라 slideDown/Up을 자동 실행합니다.
      $(this).next(".content").slideToggle(300);
      
      // [한계] 지금은 여러 개를 누르면 누르는 대로 다 열려버립니다.
  });
<\/script>`, 
    answer: "핵심: next() 메서드는 형제 관계에서 바로 아래에 있는 요소를 지목합니다." 
  },

  // --- 2교시 시작 ---
  { 
    type: "content", 
    title: "☕ 쉬는 시간 (10분)", 
    items: [
      "기본적인 열기/닫기 기능을 마스터했습니다.",
      "다음 시간에는 '하나가 열리면 나머지는 닫히는' 실무형 로직을 배웁니다."
    ]
  },
  { 
    type: "content", 
    title: "2교시. 상호 배타적 로직 (하나만 열기)", 
    items: [
      "사용자가 질문 A를 열었을 때, 기존에 열려있던 질문 B를 자동으로 닫아주는 기능입니다.",
      "<b>전략:</b> '나'를 열기 전에, '나를 제외한 나머지 형제들'을 먼저 초기화(Close) 시킵니다.",
      "<b>필요 메서드:</b> <code>parent()</code>, <code>siblings()</code>, <code>find()</code>"
    ]
  },
  { 
    type: "code", 
    title: "[실습 2] 배타적 아코디언 로직 (JS)", 
    desc: "나만 빼고 모두 닫는 스마트한 코드를 분석해보세요.", 
    code: `<script>
  $(".title").click(function() {
      // 1. 클릭한 제목의 부모(.item)를 기준으로 다른 형제들을 찾습니다.
      // 2. 그 형제들 안에 들어있는 .content를 모두 찾아 닫습니다.
      $(this).parent().siblings().find(".content").slideUp();
      
      // 3. 이제 나(클릭한 제목)의 다음 요소만 조심스럽게 엽니다.
      $(this).next(".content").slideDown();
  });
<\/script>`, 
    answer: "정답: siblings()를 활용해 다른 아이템들을 제어하는 것이 포인트입니다." 
  },

  // --- 심화 1: stop() ---
  { 
    type: "content", 
    title: "📈 심화 ①. 애니메이션 대기열 해결", 
    items: [
      "사용자가 제목을 빠르게 여러 번 클릭하면 애니메이션이 '예약'되어 무한히 춤추는 현상이 생깁니다.",
      "<b>해결:</b> 새로운 슬라이드를 시작하기 직전에 <code>.stop()</code>으로 진행 중인 동작을 취소합니다.",
      "<div class='code-breakdown'><b>$(target).stop().slideToggle();</b></div>"
    ]
  },

  // --- 심화 2: 아이콘 회전 ---
  { 
    type: "content", 
    title: "📈 심화 ②. UI 피드백: 아이콘 회전", 
    items: [
      "단순히 열리는 것보다, 제목 옆의 화살표가 돌아가는 등의 시각적 피드백이 중요합니다.",
      "<b>CSS Transform:</b> 회전 상태를 클래스(<code>.active</code>)로 미리 정의합니다.",
      "<b>JS 연동:</b> 슬라이드 시점에 제목 요소에 클래스를 토글합니다."
    ]
  },
  { 
    type: "code", 
    title: "[실습 3-1] 회전 아이콘 설계 (CSS)", 
    desc: "가상 요소를 활용한 화살표와 회전 애니메이션입니다.", 
    code: `<style>
  /* 제목 우측에 화살표 생성 */
  .title::after {
    content: '▼'; position: absolute; right: 20px;
    transition: 0.3s; /* 부드러운 회전을 위해 필요 */
  }
  
  /* active 클래스가 붙으면 180도 회전 시킴 */
  .title.active::after {
    transform: rotate(180deg);
    color: #61dafb;
  }
</style>`, 
    answer: "핵심: 자바스크립트는 클래스만 뗐다 붙였다 하고, 실제 움직임은 CSS가 담당합니다." 
  },
  { 
    type: "code", 
    title: "[실습 3-2] 아이콘 제어 포함 로직 (JS)", 
    desc: "슬라이드와 클래스 제어를 결합하여 UI를 완성합니다.", 
    code: `<script>
  $(".title").click(function() {
      // 1. 다른 제목들의 active 클래스 제거 및 답변 닫기
      $(".title").not(this).removeClass("active");
      $(this).parent().siblings().find(".content").stop().slideUp();

      // 2. 클릭한 제목의 클래스 토글 및 답변 슬라이드
      $(this).toggleClass("active");
      $(this).next(".content").stop().slideToggle();
  });
<\/script>`, 
    answer: "설명: .not(this)를 통해 내가 아닌 다른 요소들만 골라낼 수 있습니다." 
  },

  // --- 심화 3: 상태 체크 ---
  { 
    type: "content", 
    title: "📈 심화 ③. 지능적인 상태 체크: .is()", 
    items: [
      "현재 요소가 화면에 보이고 있는지(visible) 여부를 판단하여 다른 로직을 수행할 수 있습니다.",
      "<b>활용:</b> 이미 열려있는 메뉴를 다시 눌렀을 때만 특수한 효과를 주거나 로그를 남길 때 사용합니다.",
      "<div class='code-breakdown'><b>if( $(el).is(':visible') ) { ... }</b></div>"
    ]
  },

  // --- 최종 실습 프로젝트 ---
  { 
    type: "content", 
    title: "🔥 Final Challenge: 전문가형 FAQ 섹션", 
    items: [
      "<b>미션 내용:</b> 지금까지 배운 모든 기술을 총동원하여 완벽한 아코디언을 만듭니다.",
      "<b>필수 기능:</b> <br>1. 하나가 열리면 남은 닫힐 것 <br>2. 아이콘이 회전할 것 <br>3. <code>stop()</code>을 써서 광클 버그를 막을 것 <br>4. <code>is(':visible')</code>로 현재 상태를 콘솔에 출력할 것"
    ]
  },
  { 
    type: "code", 
    title: "[최종-1] 종합 프로젝트 구조 (HTML)", 
    desc: "더 많은 아이템을 추가하여 테스트해봅시다.", 
    code: `<div class="accordion">
  <div class="item">
    <div class="title">Q1. 환불 규정이 어떻게 되나요?</div>
    <div class="content">구매 후 7일 이내에 고객센터로 연락주시기 바랍니다.</div>
  </div>
  <div class="item">
    <div class="title">Q2. 배송은 얼마나 걸리나요?</div>
    <div class="content">영업일 기준 평균 2~3일이 소요됩니다.</div>
  </div>
  <div class="item">
    <div class="title">Q3. 회원 탈퇴는 어디서 하나요?</div>
    <div class="content">마이페이지 > 개인정보 수정 하단에서 가능합니다.</div>
  </div>
</div>`, 
    answer: "팁: 동일한 구조가 반복될 때 jQuery의 탐색 메서드가 빛을 발합니다." 
  },
  { 
    type: "code", 
    title: "[최종-2] 종합 프로젝트 로직 (JS)", 
    desc: "가장 완벽하고 정교한 아코디언 스크립트입니다.", 
    code: `<script>
  $(".title").click(function() {
      // [1] 클릭한 타겟 정의
      const $this = $(this);
      const $content = $this.next(".content");

      // [2] 상태 확인 (심화 활용)
      if ($content.is(":visible")) {
          console.log("이미 열려있는 항목을 닫습니다.");
      } else {
          console.log("새로운 항목을 펼칩니다.");
      }

      // [3] 상호 배타적 초기화 (나를 제외한 나머지)
      $(".title").not($this).removeClass("active");
      $this.parent().siblings().find(".content").stop().slideUp(200);

      // [4] 나의 상태 전환
      $this.toggleClass("active");
      $content.stop().slideToggle(200);
  });
<\/script>`, 
    answer: "완성: 변수를 활용해 코드를 더 깔끔하게 정리하는 법도 확인하세요." 
  },
  { 
    type: "content", 
    title: "📝 13차시 핵심 요약", 
    items: [
      "<b>slideDown/Up:</b> 높이를 0~Auto 사이에서 계산하며 움직이는 효과.",
      "<b>Mutual Exclusion:</b> <code>siblings()</code>를 이용해 '하나만 열기' 구현.",
      "<b>UI Detail:</b> 클래스 제어와 CSS의 결합으로 고급스러운 아이콘 회전 구현.",
      "<b>Stability:</b> <code>stop()</code>으로 중첩된 애니메이션 대기열 초기화.",
      "<b>Logical Flow:</b> 사용자의 행동 → 타겟 탐색 → 상태 확인 → 최종 액션."
    ]
  },
  { 
    type: "title", 
    title: "JS 4주차 13차시 완료! 🏆", 
    subtitle: "<span class='highlight'>이제 여러분은 단순한 웹 조작자가 아닌 UI 설계자입니다.</span><br><br><span style='color:#777;'>다음 차시 예고: 가로로 무한히 흐르는 '이미지 슬라이드 배너'</span>" 
  }
];

let currentIndex = 0;

function renderSlide(index) {
  const app = document.getElementById('app');
  const data = slideData[index];
  let contentHtml = '';

  if (data.type === 'title') {
    contentHtml = `<div style="text-align:center;" class="fade-in">
      <h1 style="font-size:3.5rem;">${data.title}</h1>
      <div style="width:100px; height:4px; background:#4ade80; margin: 2rem auto;"></div>
      <p style="font-size:1.6rem;">${data.subtitle}</p>
    </div>`;
  } else if (data.type === 'content') {
    const lis = data.items.map(item => `<li>${item}</li>`).join('');
    contentHtml = `<div class="fade-in">
      <h2 style="font-size:2.4rem; color:#4ade80; border-bottom:1px solid #333; padding-bottom:1.5rem;">${data.title}</h2>
      <ul>${lis}</ul>
    </div>`;
  } else if (data.type === 'code') {
    contentHtml = `<div class="fade-in">
      <h2 style="font-size:2.1rem; color:#facc15; border-bottom:1px solid #333; padding-bottom:0.8rem;">${data.title}</h2>
      <p style="font-size:1.05rem; color:#aaa; margin-bottom:0.8rem;">${data.desc}</p>
      <pre><code>${data.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</code></pre>
      <div class="practice-box"><p style="font-weight:bold; color:#61dafb; margin:0;">💡 완성된 예시 코드입니다. 한 줄씩 주석을 분석하며 전체 흐름을 파악하세요.</p></div>
    </div>`;
  }

  app.innerHTML = `<div class="slide-content">${contentHtml}</div><div class="page-num">${String(index + 1).padStart(2, '0')} / ${slideData.length}</div>`;
  document.getElementById('prevBtn').style.visibility = index === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.opacity = index === slideData.length - 1 ? '0.2' : '1';
}

function nextSlide() { if (currentIndex < slideData.length - 1) { currentIndex++; renderSlide(currentIndex); } }
function prevSlide() { if (currentIndex > 0) { currentIndex--; renderSlide(currentIndex); } }
document.addEventListener('keydown', (e) => { if (e.key === 'ArrowRight' || e.key === ' ') nextSlide(); else if (e.key === 'ArrowLeft') prevSlide(); });
renderSlide(currentIndex);
</script>
</body>
</html>
